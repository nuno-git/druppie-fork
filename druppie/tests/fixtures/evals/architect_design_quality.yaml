evaluation:
  name: architect_design_quality
  description: "Evaluate the quality of the architect's design document"
  target_agent: architect
  judge_model: glm-5
  context:
    - source: tool_call_result
      tool: "coding:make_design"
      as: design
    - source: session_messages
      role: user
      as: request
  rubrics:
    - name: requirement_coverage
      scoring: graded
      prompt: |
        Evaluate whether the design covers the user's requirements.

        User request: {{request}}
        Design document: {{design}}

        Score 1-5 where:
        1 = Missing most requirements
        5 = All requirements thoroughly addressed

        Respond with JSON: {"score": <1-5>, "reasoning": "<explanation>"}
    - name: language_compliance
      scoring: binary
      prompt: |
        Check if the design document is written in the required language.

        Design document: {{design}}

        Respond with JSON: {"pass": true/false, "reasoning": "<explanation>"}
