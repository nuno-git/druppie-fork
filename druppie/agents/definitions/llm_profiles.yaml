# LLM Profiles — shared provider chains for agents.
#
# Each profile is an ordered list of {provider, model} entries.
# The resolver picks the first entry whose API key is available,
# and optionally sets up the second as a FallbackLLM.
#
# Agents reference a profile by name in their YAML: llm_profile: standard

profiles:
  standard:
    - provider: litellm
      model: gpt-5-mini
    - provider: zai
      model: glm-4.7
    - provider: azure_foundry
      model: GPT-5-MINI

  cheap:
    - provider: litellm
      model: gpt-5-mini
    - provider: azure_foundry
      model: GPT-5-MINI
    - provider: zai
      model: glm-4.7
    - provider: deepinfra
      model: Qwen/Qwen3-32B

  litellm:
    - provider: litellm
      model: gpt-oss:120b
    - provider: litellm
      model: gpt-oss:20b
    - provider: litellm
      model: qwen3-coder:30b
    - provider: litellm
      model: deepseek-r1:32b
    - provider: litellm
      model: gemma3:27b
