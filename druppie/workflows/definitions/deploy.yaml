id: deploy
name: Deployment
description: Build and deploy application to target environment

inputs:
  - project_path
  - environment  # staging or production
  - image_tag

entry_point: check_status

steps:
  check_status:
    id: check_status
    type: mcp
    tool: git:status
    inputs:
      path: "{{ project_path }}"
    on_success: build_image

  build_image:
    id: build_image
    type: mcp
    tool: docker:build
    inputs:
      path: "{{ project_path }}"
      tag: "{{ image_tag }}"
    on_success: approval_check

  approval_check:
    id: approval_check
    type: agent
    agent_id: deployer
    prompt: |
      Deployment to {{ environment }} requested.
      Image: {{ image_tag }}

      If this is a PRODUCTION deployment, request approval.
      For staging, proceed directly.
    on_success: deploy_container

  deploy_container:
    id: deploy_container
    type: mcp
    tool: docker:run
    inputs:
      image: "{{ image_tag }}"
      name: "{{ image_tag }}-{{ environment }}"
      detach: "true"
    on_success: verify

  verify:
    id: verify
    type: agent
    agent_id: deployer
    prompt: |
      Verify the deployment was successful:
      - Check container logs
      - Verify the application is responding
      - Report the deployment status
