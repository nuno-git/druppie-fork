# Druppie Platform v2 - Full Stack Docker Compose
# Complete standalone setup with Keycloak on NEW PORTS to avoid conflicts
#
# Ports used:
#   - Keycloak: 8180
#   - Backend:  8100
#   - Frontend: 5273
#   - Postgres: 5533
#   - Redis:    6480

services:
  # =============================================================================
  # DATABASE
  # =============================================================================

  druppie-db:
    image: postgres:15-alpine
    container_name: druppie-new-db
    environment:
      POSTGRES_DB: druppie
      POSTGRES_USER: druppie
      POSTGRES_PASSWORD: druppie_secret
    volumes:
      - druppie_new_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "druppie"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5533:5432"
    networks:
      - druppie-new-network

  keycloak-db:
    image: postgres:15-alpine
    container_name: druppie-new-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_secret
    volumes:
      - druppie_new_keycloak_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "keycloak"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - druppie-new-network

  redis:
    image: redis:7-alpine
    container_name: druppie-new-redis
    command: redis-server --appendonly yes
    volumes:
      - druppie_new_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "6480:6379"
    networks:
      - druppie-new-network

  # =============================================================================
  # GITEA
  # =============================================================================

  gitea-db:
    image: postgres:15-alpine
    container_name: druppie-new-gitea-db
    environment:
      POSTGRES_DB: gitea
      POSTGRES_USER: gitea
      POSTGRES_PASSWORD: gitea_secret
    volumes:
      - druppie_new_gitea_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "gitea"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - druppie-new-network

  gitea:
    image: gitea/gitea:1.21
    container_name: druppie-new-gitea
    environment:
      USER_UID: 1000
      USER_GID: 1000
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: gitea-db:5432
      GITEA__database__NAME: gitea
      GITEA__database__USER: gitea
      GITEA__database__PASSWD: gitea_secret
      GITEA__server__ROOT_URL: http://localhost:3100/
      GITEA__server__HTTP_PORT: 3000
      GITEA__server__DOMAIN: localhost
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__service__DISABLE_REGISTRATION: "false"
    volumes:
      - druppie_new_gitea:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "3100:3000"
      - "2223:22"
    depends_on:
      gitea-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - druppie-new-network

  # =============================================================================
  # KEYCLOAK
  # =============================================================================

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: druppie-new-keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_secret
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8180
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY: edge
      KC_HEALTH_ENABLED: "true"
    command: start-dev
    ports:
      - "8180:8080"
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080;echo -e 'GET /health/ready HTTP/1.1\r\nhost: localhost\r\nConnection: close\r\n\r\n' >&3;if [ $? -eq 0 ]; then echo 'Healthcheck Successful';exit 0;else echo 'Healthcheck Failed';exit 1;fi;"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 60s
    networks:
      - druppie-new-network

  # =============================================================================
  # BACKEND (FastAPI)
  # =============================================================================

  druppie-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: druppie-new-backend
    environment:
      # Database
      DATABASE_URL: postgresql://druppie:druppie_secret@druppie-db:5432/druppie
      REDIS_URL: redis://redis:6379/0

      # Auth - Use DEV_MODE from .env (set to true for dev without Keycloak)
      DEV_MODE: ${DEV_MODE:-false}
      KEYCLOAK_SERVER_URL: http://keycloak:8080
      KEYCLOAK_ISSUER_URL: http://localhost:8180
      KEYCLOAK_REALM: druppie
      KEYCLOAK_CLIENT_ID: druppie-backend

      # LLM Configuration
      # Set LLM_PROVIDER to: zai, deepinfra, mock, or auto (auto-detects based on available keys)
      LLM_PROVIDER: ${LLM_PROVIDER:-auto}

      # Z.AI GLM Configuration
      ZAI_API_KEY: ${ZAI_API_KEY:-}
      ZAI_MODEL: ${ZAI_MODEL:-GLM-4.7}
      ZAI_BASE_URL: ${ZAI_BASE_URL:-https://api.z.ai/api/coding/paas/v4}

      # DeepInfra Configuration (OpenAI-compatible API)
      DEEPINFRA_API_KEY: ${DEEPINFRA_API_KEY:-}
      DEEPINFRA_MODEL: ${DEEPINFRA_MODEL:-Qwen/Qwen3-Next-80B-A3B-Instruct}
      DEEPINFRA_BASE_URL: ${DEEPINFRA_BASE_URL:-https://api.deepinfra.com/v1/openai}

      # CORS - allow new frontend port
      CORS_ORIGINS: http://localhost:5273,http://localhost:5173

      # Gitea Configuration
      GITEA_URL: http://localhost:3100
      GITEA_INTERNAL_URL: http://gitea:3000
      GITEA_ADMIN_USER: gitea_admin
      GITEA_ADMIN_PASSWORD: GiteaAdmin123
      GITEA_ADMIN_EMAIL: admin@druppie.local
      GITEA_ORG: druppie

      # Workspace
      WORKSPACE_PATH: /app/workspace

      # Internal API key for MCP servers
      INTERNAL_API_KEY: druppie-internal-secret-key

      # MCP Microservices
      USE_MCP_MICROSERVICES: "true"
      MCP_CODING_URL: http://mcp-coding:9001
      MCP_DOCKER_URL: http://mcp-docker:9002
      MCP_HITL_URL: http://mcp-hitl:9003
    volumes:
      - druppie_new_workspace:/app/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8100:8000"
    depends_on:
      druppie-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      gitea:
        condition: service_healthy
    networks:
      - druppie-new-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # =============================================================================
  # MCP SERVERS (Microservices)
  # =============================================================================

  mcp-coding:
    build:
      context: ./mcp-servers/coding
      dockerfile: Dockerfile
    container_name: druppie-mcp-coding
    environment:
      WORKSPACE_ROOT: /workspaces
      MCP_PORT: "9001"
      GITEA_INTERNAL_URL: http://gitea:3000
      GITEA_ORG: druppie
      GITEA_TOKEN: ${GITEA_TOKEN:-}
    volumes:
      - druppie_new_workspace:/workspaces
    ports:
      - "9001:9001"
    depends_on:
      gitea:
        condition: service_healthy
    networks:
      - druppie-new-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mcp-docker:
    build:
      context: ./mcp-servers/docker
      dockerfile: Dockerfile
    container_name: druppie-mcp-docker
    environment:
      MCP_PORT: "9002"
      WORKSPACE_ROOT: /workspaces
      DOCKER_NETWORK: druppie-new-network
    volumes:
      - druppie_new_workspace:/workspaces
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "9002:9002"
    networks:
      - druppie-new-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mcp-hitl:
    build:
      context: ./mcp-servers/hitl
      dockerfile: Dockerfile
    container_name: druppie-mcp-hitl
    environment:
      MCP_PORT: "9003"
      REDIS_URL: redis://redis:6379/0
      HITL_TIMEOUT: "300"
      BACKEND_URL: http://druppie-backend:8000
      INTERNAL_API_KEY: druppie-internal-secret-key
    ports:
      - "9003:9003"
    depends_on:
      redis:
        condition: service_healthy
      druppie-backend:
        condition: service_healthy
    networks:
      - druppie-new-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9003/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # =============================================================================
  # DATABASE ADMIN (Adminer)
  # =============================================================================

  adminer:
    image: adminer:latest
    container_name: druppie-adminer
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: druppie-db
      ADMINER_DESIGN: pepa-linha-dark
    depends_on:
      druppie-db:
        condition: service_healthy
    networks:
      - druppie-new-network

  # =============================================================================
  # FRONTEND (Vite + React)
  # =============================================================================

  druppie-frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8100
        VITE_KEYCLOAK_URL: http://localhost:8180
        VITE_KEYCLOAK_REALM: druppie
        VITE_KEYCLOAK_CLIENT_ID: druppie-frontend
    container_name: druppie-new-frontend
    ports:
      - "5273:5173"
    depends_on:
      - druppie-backend
    networks:
      - druppie-new-network

volumes:
  druppie_new_postgres:
    name: druppie_new_postgres
  druppie_new_keycloak_postgres:
    name: druppie_new_keycloak_postgres
  druppie_new_redis:
    name: druppie_new_redis
  druppie_new_workspace:
    name: druppie_new_workspace
  druppie_new_gitea:
    name: druppie_new_gitea
  druppie_new_gitea_postgres:
    name: druppie_new_gitea_postgres

networks:
  druppie-new-network:
    name: druppie-new-network
    driver: bridge
