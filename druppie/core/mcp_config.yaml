# MCP Server Configuration
# Defines all MCPs, their URLs, and tool approval requirements
#
# LAYERED APPROVAL SYSTEM (per goal.md):
# - This file defines GLOBAL DEFAULTS for all agents
# - Agents can OVERRIDE these defaults in their YAML files via approval_overrides
# - Use "required_role" (singular string) instead of "required_roles" (array)
# - No danger_level - keeping it simple
#
# Example override in agent YAML:
#   approval_overrides:
#     coding:write_file:
#       requires_approval: true
#       required_role: architect

mcps:
  coding:
    url: ${MCP_CODING_URL:-http://mcp-coding:9001}
    description: "File operations and git within workspace sandbox"
    tools:
      - name: read_file
        description: "Read file from workspace"
        requires_approval: false
        parameters:
          type: object
          properties:
            path:
              type: string
              description: "File path relative to workspace root"
          required:
            - path

      - name: write_file
        description: "Write file to workspace (auto-commits)"
        # DEFAULT: No approval needed for write_file
        # Agents can OVERRIDE this (e.g., architect requires architect approval)
        requires_approval: false
        parameters:
          type: object
          properties:
            path:
              type: string
              description: "File path relative to workspace root"
            content:
              type: string
              description: "File content to write"
          required:
            - path
            - content

      - name: batch_write_files
        description: "Write multiple files at once with a single git commit"
        # DEFAULT: No approval needed for batch writes
        # Agents can OVERRIDE this (e.g., architect requires architect approval)
        requires_approval: false
        parameters:
          type: object
          properties:
            files:
              type: object
              description: "Map of file path to content"
            commit_message:
              type: string
              description: "Git commit message for the batch"
          required:
            - files

      - name: list_dir
        description: "List directory contents"
        requires_approval: false
        parameters:
          type: object
          properties:
            path:
              type: string
              description: "Directory path relative to workspace root (use '.' for root)"
          required:
            - path

      - name: delete_file
        description: "Delete file from workspace"
        requires_approval: false
        parameters:
          type: object
          properties:
            path:
              type: string
              description: "File path to delete"
          required:
            - path

      - name: run_command
        description: "Execute shell command in workspace"
        requires_approval: true
        required_role: developer
        parameters:
          type: object
          properties:
            command:
              type: string
              description: "Shell command to run"
          required:
            - command

      - name: run_tests
        description: "Run tests in workspace with auto-detection of test framework"
        requires_approval: false
        parameters:
          type: object
          properties:
            test_command:
              type: string
              description: "Test command (auto-detects if not provided)"
            timeout:
              type: integer
              description: "Timeout in seconds (default 120)"
          required: []

      - name: commit_and_push
        description: "Commit and push changes to Gitea"
        requires_approval: false
        parameters:
          type: object
          properties:
            message:
              type: string
              description: "Git commit message"
          required:
            - message

      - name: create_branch
        description: "Create a new git branch"
        requires_approval: false

      - name: merge_to_main
        description: "Merge feature branch to main"
        requires_approval: true
        required_role: architect

      - name: get_git_status
        description: "Get git status for workspace"
        requires_approval: false

  docker:
    url: ${MCP_DOCKER_URL:-http://mcp-docker:9002}
    description: "Docker container operations"
    tools:
      - name: get_available_port
        description: "Get an available port for running a container (use this before docker:run)"
        requires_approval: false

      - name: build
        description: "Build Docker image from workspace"
        # GLOBAL: docker:build ALWAYS needs developer approval (per goal.md)
        requires_approval: true
        required_role: developer
        parameters:
          type: object
          properties:
            image_name:
              type: string
              description: "Name for the built image (e.g., myapp:latest)"
            workspace_id:
              type: string
              description: "Workspace ID (will resolve to path)"
            workspace_path:
              type: string
              description: "Direct path to workspace with Dockerfile"
            dockerfile:
              type: string
              description: "Dockerfile name (default: Dockerfile)"
          required:
            - image_name

      - name: run
        description: "Run Docker container"
        # GLOBAL: docker:run ALWAYS needs developer approval (per goal.md)
        requires_approval: true
        required_role: developer
        parameters:
          type: object
          properties:
            image_name:
              type: string
              description: "Docker image to run"
            container_name:
              type: string
              description: "Name for the container"
            port:
              type: integer
              description: "Host port to expose"
            container_port:
              type: integer
              description: "Container port (default: 3000)"
            port_mapping:
              type: string
              description: "Port mapping (e.g., 8080:3000)"
          required:
            - image_name
            - container_name

      - name: stop
        description: "Stop running container"
        requires_approval: false

      - name: logs
        description: "Get container logs"
        requires_approval: false

      - name: remove
        description: "Remove container"
        requires_approval: true
        required_role: developer

      - name: list_containers
        description: "List Docker containers"
        requires_approval: false

      - name: inspect
        description: "Inspect container details"
        requires_approval: false

      - name: exec_command
        description: "Execute command in running container"
        requires_approval: true
        required_role: developer

  hitl:
    # HITL tools are BUILT-IN to the backend (druppie/agents/builtin_tools.py)
    # No external MCP server needed - these tools are implemented directly
    url: builtin://hitl
    description: "Human-in-the-loop (built-in) - questions stored directly in database"
    builtin: true
    tools:
      - name: ask_question
        description: "Ask user a free-form text question"
        requires_approval: false
        parameters:
          type: object
          properties:
            question:
              type: string
              description: "The question to ask the user"
            context:
              type: string
              description: "Optional context explaining why this question is being asked"
          required:
            - question

      - name: ask_choice
        description: "Ask user a multiple choice question"
        requires_approval: false
        parameters:
          type: object
          properties:
            question:
              type: string
              description: "The question to ask the user"
            choices:
              type: array
              description: "List of choices for the user to select from"
            allow_other:
              type: boolean
              description: "Whether to allow a custom 'Other' answer (default: true)"
            context:
              type: string
              description: "Optional context explaining why this question is being asked"
          required:
            - question
            - choices
