# MCP Server Configuration
# Defines all MCPs, their URLs, and tool approval requirements
#
# LAYERED APPROVAL SYSTEM (per goal.md):
# - This file defines GLOBAL DEFAULTS for all agents
# - Agents can OVERRIDE these defaults in their YAML files via approval_overrides
# - Use "required_role" (singular string) instead of "required_roles" (array)
# - danger_level has been removed (was never used)
#
# Example override in agent YAML:
#   approval_overrides:
#     coding:write_file:
#       requires_approval: true
#       required_role: architect

mcps:
  coding:
    url: ${MCP_CODING_URL:-http://module-coding:9001}
    type: core
    # Declarative injection rules - auto-inject these params from context
    # Parameters marked hidden: true are removed from LLM-visible schemas
    inject:
      session_id:
        from: session.id
        hidden: true
        # Not injected into project discovery tools (list_projects, read_project_file, list_project_files)
        # — those use Gitea API directly, not workspaces
        tools: [read_file, write_file, make_design, batch_write_files, list_dir, delete_file, run_git, run_tests, get_test_framework, get_coverage_report, create_pull_request, merge_pull_request, install_test_dependencies, validate_tdd, get_git_status]
      project_id:
        from: project.id
        hidden: true
        tools: [read_file, write_file, make_design, batch_write_files, list_dir, delete_file, run_git, run_tests, get_test_framework, get_coverage_report, create_pull_request, merge_pull_request, install_test_dependencies, validate_tdd, get_git_status]
      repo_name:
        from: project.repo_name
        hidden: true
        tools: [read_file, write_file, make_design, batch_write_files, list_dir, delete_file, run_git, create_pull_request, merge_pull_request]
      repo_owner:
        from: project.repo_owner
        hidden: true
        tools: [read_file, write_file, make_design, batch_write_files, list_dir, delete_file, run_git, create_pull_request, merge_pull_request]
    tools:
      - name: read_file
        requires_approval: false

      - name: write_file
        # DEFAULT: No approval needed for write_file
        # Agents can OVERRIDE this (e.g., architect requires architect approval)
        requires_approval: false

      - name: make_design
        requires_approval: false

      - name: batch_write_files
        # DEFAULT: No approval needed for batch writes
        # Agents can OVERRIDE this (e.g., architect requires architect approval)
        requires_approval: false

      - name: list_dir
        requires_approval: false

      - name: delete_file
        requires_approval: false

      - name: run_git
        requires_approval: false

      - name: run_tests
        requires_approval: false

      - name: get_test_framework
        requires_approval: false

      - name: get_coverage_report
        requires_approval: false

      - name: create_pull_request
        requires_approval: false

      - name: merge_pull_request
        requires_approval: true
        required_role: developer

      - name: install_test_dependencies
        requires_approval: false

      - name: validate_tdd
        requires_approval: false

      - name: get_git_status
        requires_approval: false

      # Project discovery tools (cross-project read-only via Gitea API)
      - name: list_projects
        requires_approval: false
      - name: read_project_file
        requires_approval: false
      - name: list_project_files
        requires_approval: false

      # Internal tools (not visible to agents, callable by backend)
      - name: validate_design
        requires_approval: false
      - name: _internal_revert_to_commit
        requires_approval: false
      - name: _internal_close_pull_request
        requires_approval: false

  docker:
    url: ${MCP_DOCKER_URL:-http://module-docker:9002}
    type: core
    # Declarative injection rules for docker MCP
    inject:
      session_id:
        from: session.id
        hidden: true
        tools: [build, run, compose_up]  # Only these tools accept session_id
      repo_name:
        from: project.repo_name
        hidden: true
        tools: [build, compose_up]  # Only build needs repo info
      repo_owner:
        from: project.repo_owner
        hidden: true
        tools: [build, compose_up]
      user_id:
        from: session.user_id
        hidden: true
        tools: [run, compose_up]  # For ownership labels
      project_id:
        from: session.project_id
        hidden: true
        tools: [run, compose_up]  # For ownership labels
    tools:
      - name: build
        # GLOBAL: docker:build ALWAYS needs developer approval (per goal.md)
        requires_approval: true
        required_role: developer

      - name: run
        # GLOBAL: docker:run ALWAYS needs developer approval (per goal.md)
        requires_approval: true
        required_role: developer

      - name: stop
        requires_approval: false

      - name: logs
        requires_approval: false

      - name: remove
        requires_approval: true
        required_role: developer

      - name: list_containers
        requires_approval: false

      - name: inspect
        requires_approval: false

      - name: exec_command
        requires_approval: true
        required_role: developer

      - name: compose_up
        requires_approval: true
        required_role: developer

      - name: compose_down
        requires_approval: true
        required_role: developer

  # NOTE: HITL tools (hitl_ask_question, hitl_ask_multiple_choice_question) are
  # builtin tools defined in druppie/agents/builtin_tools.py, NOT an MCP server.
  # There is no HITL module — HITL is handled entirely in-process because it
  # needs to pause/resume the agent loop directly.

  filesearch:
    url: ${MCP_FILESEARCH_URL:-http://module-filesearch:9004}
    type: core
    tools:
      - name: search_files
        requires_approval: false
      - name: list_directory
        requires_approval: false
      - name: read_file
        requires_approval: false
      - name: get_search_stats
        requires_approval: false

  web:
    url: ${MCP_WEB_URL:-http://module-web:9005}
    type: core
    tools:
      - name: search_files
        requires_approval: false

      - name: list_directory
        requires_approval: false

      - name: read_file
        requires_approval: false

      - name: fetch_url
        requires_approval: false

      - name: search_web
        requires_approval: false

      - name: get_page_info
        requires_approval: false

  archimate:
    url: ${MCP_ARCHIMATE_URL:-http://module-archimate:9006}
    type: core
    tools:
      - name: list_models
        requires_approval: false

      - name: get_statistics
        requires_approval: false

      - name: list_elements
        requires_approval: false

      - name: get_element
        requires_approval: false

      - name: list_views
        requires_approval: false

      - name: get_view
        requires_approval: false

      - name: search_model
        requires_approval: false

      - name: get_impact
        requires_approval: false

  registry:
    url: ${MCP_REGISTRY_URL:-http://module-registry:9007}
    type: core
    tools:
      - name: list_modules
        requires_approval: false

      - name: get_module
        requires_approval: false

      - name: search_modules
        requires_approval: false

      - name: list_components
        requires_approval: false

      - name: get_agent
        requires_approval: false

      - name: get_skill
        requires_approval: false

      - name: get_mcp_server
        requires_approval: false

      - name: get_tool
        requires_approval: false

  azure-datalake:
    url: ${MCP_AZURE_DATALAKE_URL:-http://module-azure-datalake:9008}
    type: core
    inject:
      session_id:
        from: session.id
        hidden: true
        tools: [download_file]
      project_id:
        from: project.id
        hidden: true
        tools: [download_file]
      repo_name:
        from: project.repo_name
        hidden: true
        tools: [download_file]
      repo_owner:
        from: project.repo_owner
        hidden: true
        tools: [download_file]
    tools:
      - name: list_datalakes
        requires_approval: false

      - name: test_connection
        requires_approval: false

      - name: list_containers
        requires_approval: false

      - name: list_paths
        requires_approval: false

      - name: read_file
        requires_approval: false

      - name: read_file_schema
        requires_approval: false

      - name: download_file
        requires_approval: false
