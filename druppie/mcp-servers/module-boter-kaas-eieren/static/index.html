<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boter-Kaas-Eieren - Tic-Tac-Toe</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="container">
        <h1>Boter-Kaas-Eieren</h1>
        <p class="subtitle">Tic-Tac-Toe (You: X, AI: O)</p>

        <div id="status" class="status">Loading...</div>

        <div class="board" id="board">
            <!-- Cells will be generated by JavaScript -->
        </div>

        <div class="info">
            <p>You are <span class="player-x">X</span>, AI is <span class="player-o">O</span></p>
            <p>Click an empty cell to make your move. The AI will respond automatically.</p>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
