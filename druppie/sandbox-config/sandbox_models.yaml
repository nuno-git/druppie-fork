# Per-agent model chains for sandbox. Each agent/subagent name becomes a
# "profile" — a virtual model name that the LLM proxy resolves to a real
# provider chain at request time.
#
# OpenCode sees model names like "sandbox/druppie-builder" and routes
# ALL requests through a single "sandbox" provider pointing at our proxy.
# The proxy looks up the profile, picks the first healthy real provider,
# and fails over to the next on 5xx/429.
#
# Model format: just the API model name the provider expects.
# Do NOT include the provider prefix (e.g. "Qwen/Qwen3-32B" not
# "deepinfra/Qwen/Qwen3-32B").

agents:
  druppie-builder:
    - provider: deepinfra
      model: zai-org/GLM-4.7-Flash
    - provider: zai
      model: glm-4.7
  druppie-tester:
    - provider: deepinfra
      model: zai-org/GLM-4.7-Flash
    - provider: zai
      model: glm-4.7

subagents:
  explore:
    - provider: deepinfra
      model: Qwen/Qwen3-32B
    - provider: zai
      model: glm-4.7-flash
  analysis:
    - provider: deepinfra
      model: zai-org/GLM-4.7-Flash
    - provider: zai
      model: glm-4.7
