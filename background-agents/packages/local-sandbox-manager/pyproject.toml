[project]
name = "local-sandbox-manager"
version = "0.1.0"
description = "Local sandbox manager for Open-Inspect using Kata Containers"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.34.0",
    "httpx>=0.27.0",
    "pydantic>=2.0",
    "PyJWT[crypto]>=2.8.0",
    "python-dotenv>=1.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
