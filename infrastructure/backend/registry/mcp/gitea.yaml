# Gitea MCP Server
# Provides Gitea API operations for repository management

id: gitea
name: Gitea
description: Gitea repository management via API
transport: stdio
command: python3
args:
  - -m
  - druppie.mcp.servers.gitea

tools:
  - name: create_repo
    description: Create a new repository in the Druppie organization
    input_schema:
      type: object
      properties:
        name:
          type: string
          description: Repository name
        description:
          type: string
          description: Repository description
        private:
          type: boolean
          description: Whether the repository is private
          default: false
        auto_init:
          type: boolean
          description: Initialize with README
          default: true
      required:
        - name

  - name: delete_repo
    description: Delete a repository from the Druppie organization
    input_schema:
      type: object
      properties:
        name:
          type: string
          description: Repository name to delete
      required:
        - name

  - name: list_repos
    description: List all repositories in the Druppie organization
    input_schema:
      type: object
      properties: {}

  - name: get_repo
    description: Get details of a specific repository
    input_schema:
      type: object
      properties:
        name:
          type: string
          description: Repository name
      required:
        - name

  - name: create_file
    description: Create a file in a repository
    input_schema:
      type: object
      properties:
        repo:
          type: string
          description: Repository name
        path:
          type: string
          description: File path in the repository
        content:
          type: string
          description: File content
        message:
          type: string
          description: Commit message
          default: "Add file"
        branch:
          type: string
          description: Branch name
          default: "main"
      required:
        - repo
        - path
        - content

  - name: update_file
    description: Update an existing file in a repository
    input_schema:
      type: object
      properties:
        repo:
          type: string
          description: Repository name
        path:
          type: string
          description: File path in the repository
        content:
          type: string
          description: New file content
        sha:
          type: string
          description: SHA of the file to update
        message:
          type: string
          description: Commit message
          default: "Update file"
        branch:
          type: string
          description: Branch name
          default: "main"
      required:
        - repo
        - path
        - content
        - sha

  - name: get_file
    description: Get file contents and SHA from a repository
    input_schema:
      type: object
      properties:
        repo:
          type: string
          description: Repository name
        path:
          type: string
          description: File path in the repository
        branch:
          type: string
          description: Branch name
          default: "main"
      required:
        - repo
        - path

  - name: list_branches
    description: List all branches in a repository
    input_schema:
      type: object
      properties:
        repo:
          type: string
          description: Repository name
      required:
        - repo

  - name: create_branch
    description: Create a new branch in a repository
    input_schema:
      type: object
      properties:
        repo:
          type: string
          description: Repository name
        branch:
          type: string
          description: New branch name
        from_branch:
          type: string
          description: Source branch to create from
          default: "main"
      required:
        - repo
        - branch

  - name: merge_branch
    description: Merge a branch into another branch
    input_schema:
      type: object
      properties:
        repo:
          type: string
          description: Repository name
        head:
          type: string
          description: Branch to merge from (feature branch)
        base:
          type: string
          description: Branch to merge into
          default: "main"
        message:
          type: string
          description: Merge commit message
      required:
        - repo
        - head

  - name: get_branch_diff
    description: Get the diff between two branches
    input_schema:
      type: object
      properties:
        repo:
          type: string
          description: Repository name
        base:
          type: string
          description: Base branch
          default: "main"
        head:
          type: string
          description: Head branch (feature branch)
      required:
        - repo
        - head

  - name: delete_branch
    description: Delete a branch from a repository
    input_schema:
      type: object
      properties:
        repo:
          type: string
          description: Repository name
        branch:
          type: string
          description: Branch name to delete
      required:
        - repo
        - branch
