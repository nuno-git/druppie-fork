# Update Workflow - For Existing Projects
# Creates feature branch, implements changes, deploys preview, waits for approval

id: update_workflow
name: Update Workflow
description: >
  Workflow for updating existing projects. Creates a feature branch,
  implements changes using TDD, deploys to a preview URL for verification,
  and merges to main after user approval.

trigger_keywords:
  - "update project"
  - "modify existing"
  - "add feature to"
  - "fix bug in"

required_mcps:
  - filesystem
  - gitea
  - git
  - shell
  - docker

entry_point: clone_repository

steps:
  clone_repository:
    name: Clone Repository
    type: mcp
    tool: git.clone
    params:
      repo_url: "http://gitea:3000/druppie/{repo_name}.git"
      path: "/workspace/{project_id}"
    on_success: create_update_branch
    on_failure: fail_workflow

  create_update_branch:
    name: Create Update Branch
    type: mcp
    tool: gitea.create_branch
    params:
      repo: "{repo_name}"
      branch: "feature/update-{timestamp}"
      from_branch: "main"
    on_success: analyze_codebase
    on_failure: fail_workflow

  analyze_codebase:
    name: Analyze Codebase
    type: agent
    agent_id: developer
    task: |
      Analyze the existing codebase to understand its structure:

      Project: {project_name}
      Path: /workspace/{project_id}/

      Requirements:
      1. Understand the project structure
      2. Identify key files and patterns
      3. Understand existing tests
      4. Determine best approach for: {update_description}

      Provide a brief summary of findings.
    on_success: write_update_tests
    on_failure: fail_workflow

  write_update_tests:
    name: Write Tests for Update
    type: agent
    agent_id: tdd_agent
    task: |
      Write tests for the following update:

      Project: {project_name}
      Path: /workspace/{project_id}/
      Update: {update_description}
      Codebase Analysis: {step_analyze_codebase.summary}

      Requirements:
      1. Write tests that define the new expected behavior
      2. Follow existing test patterns in the codebase
      3. Tests should FAIL initially (not implemented yet)
      4. Cover edge cases

      Add tests to the existing test directory.
    on_success: implement_changes
    on_failure: fail_workflow

  implement_changes:
    name: Implement Changes
    type: agent
    agent_id: implementer_agent
    task: |
      Implement the following update:

      Project: {project_name}
      Path: /workspace/{project_id}/
      Update: {update_description}
      Codebase Analysis: {step_analyze_codebase.summary}

      Requirements:
      1. Read the new tests
      2. Implement minimum code to make tests pass
      3. Follow existing code patterns
      4. Don't break existing functionality
    on_success: run_all_tests
    on_failure: fail_workflow

  run_all_tests:
    name: Run All Tests
    type: mcp
    tool: shell.run
    params:
      command: "cd /workspace/{project_id} && make test || npm test || pytest || python -m pytest"
      timeout: "180"
    on_success: code_review
    on_failure: fix_update_code
    max_retries: 3

  fix_update_code:
    name: Fix Failing Code
    type: agent
    agent_id: implementer_agent
    task: |
      Tests are failing. Fix the code:

      Project: {project_name}
      Path: /workspace/{project_id}/
      Test output: {step_run_all_tests.error}

      Requirements:
      1. Analyze test failures
      2. Fix the implementation
      3. Don't break existing tests
    on_success: run_all_tests
    on_failure: fail_workflow

  code_review:
    name: Code Review
    type: agent
    agent_id: reviewer_agent
    task: |
      Review the update changes:

      Project: {project_name}
      Update: {update_description}
      Path: /workspace/{project_id}/

      Focus on:
      1. New code quality
      2. Integration with existing code
      3. No regressions
      4. Security

      Make minor fixes directly.
    on_success: commit_update
    on_failure: fail_workflow

  commit_update:
    name: Commit Update
    type: agent
    agent_id: git_agent
    task: |
      Commit and push the update:

      Project: {project_name}
      Path: /workspace/{project_id}/
      Branch: feature/update-{timestamp}

      Steps:
      1. Add all changed files
      2. Commit with message "feat: {update_description}"
      3. Push to feature branch
    on_success: build_preview
    on_failure: fail_workflow

  build_preview:
    name: Build Preview Image
    type: mcp
    tool: docker.build
    params:
      path: "/workspace/{project_id}"
      tag: "druppie/{repo_name}:preview"
    on_success: deploy_preview
    on_failure: fail_workflow

  deploy_preview:
    Name: Deploy Preview
    type: agent
    agent_id: devops_agent
    task: |
      Deploy the update to a preview environment:

      Project: {project_name}
      Image: druppie/{repo_name}:preview

      Requirements:
      1. Stop any existing preview container
      2. Deploy with container name druppie-{project_id}-preview
      3. Use port range 9050-9100 for preview
      4. Verify the application works
      5. Return the preview URL
    on_success: await_approval
    on_failure: fail_workflow

  await_approval:
    name: Await Approval
    type: agent
    agent_id: developer
    task: |
      Preview deployed. Return information for user approval:

      Project: {project_name}
      Preview URL: {step_deploy_preview.url}
      Branch: feature/update-{timestamp}
      Changes: {update_description}

      Inform the user they can approve to merge or reject.
    on_success: null

  fail_workflow:
    name: Workflow Failed
    type: agent
    agent_id: developer
    task: |
      The workflow has failed. Summarize what happened.
      Context: {context}
    on_success: null
