name: vergunning-vinder-agent
description: >
  AI-aangedreven zoekagent die gemeentemedewerkers helpt om met trefwoorden
  relevante vergunningen te vinden uit meerdere bronnen (overheidswebsites en SharePoint).
  Toont naam, beschrijving en bronverwijzing per resultaat. Volledig stateless —
  geen opslag van zoekgegevens.
