tool-test:
  name: coding-list-dir
  description: Router creates project, architect lists directory
  tags: [coding, filesystem]

  chain:
    - agent: router
      tool: builtin:set_intent
      arguments:
        intent: create_project
        project_name: weather-dashboard
      status: completed

    - agent: router
      tool: builtin:done
      arguments:
        summary: "Agent router: Classified intent as create_project, project 'weather-dashboard'."
      status: completed

    - agent: architect
      tool: coding:list_dir
      arguments:
        path: "."
      status: completed
      assert:
        completed: true
        result: [not_empty, no_error]

    - agent: architect
      tool: builtin:done
      arguments:
        summary: "Agent architect: Listed directory contents."
      status: completed
