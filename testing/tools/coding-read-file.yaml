tool-test:
  name: coding-read-file
  description: Router creates project, architect reads README
  tags: [coding, filesystem]

  chain:
    - agent: router
      tool: builtin:set_intent
      arguments:
        intent: create_project
        project_name: weather-dashboard
      status: completed

    - agent: router
      tool: builtin:done
      arguments:
        summary: "Agent router: create_project weather-dashboard."
      status: completed

    - agent: architect
      tool: coding:read_file
      arguments:
        path: "README.md"
      status: completed
      assert:
        completed: true
        result: [not_empty]

    - agent: architect
      tool: builtin:done
      arguments:
        summary: "Agent architect: Read README."
      status: completed
