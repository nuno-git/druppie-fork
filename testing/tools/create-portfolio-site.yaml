## End-to-end: create a portfolio website
## Flow: router → planner → BA (HITL + FD) → planner → architect (TD) → planner → builder (mock)

tool-test:
  name: create-portfolio-site
  description: "Full create_project flow for a personal portfolio website"
  tags: [e2e, create-project]

  chain:
    # --- Router ---
    - agent: router
      tool: builtin:set_intent
      arguments:
        intent: create_project
        project_name: portfolio-site
        description: "A personal portfolio website to showcase projects"

    - agent: router
      tool: builtin:done
      arguments:
        summary: "Classified as create_project for portfolio-site"

    # --- Planner ---
    - agent: planner
      tool: builtin:make_plan
      mock: true
      arguments:
        steps:
          - agent_id: business_analyst
            prompt: "Gather requirements for the portfolio site"

    - agent: planner
      tool: builtin:done
      arguments:
        summary: "Planned business_analyst"

    # --- Business Analyst ---
    - agent: business_analyst
      tool: builtin:hitl_ask_multiple_choice_question
      arguments:
        question: "Welke stijl heeft uw voorkeur voor de portfolio?"
        choices:
          - "Minimalistisch en clean"
          - "Gedurfd en kleurrijk"
          - "Professioneel en zakelijk"
      mock: true
      mock_result: "Minimalistisch en clean"

    - agent: business_analyst
      tool: coding:make_design
      approval:
        status: approved
        by: analyst
      arguments:
        path: docs/functional-design.md
        content: |
          # Functioneel Ontwerp: Portfolio Website

          ## Vereisten
          - FR-01: Homepage met persoonlijke introductie
          - FR-02: Projectenoverzicht in grid-layout
          - FR-03: Contactformulier met e-mail verzending
          - FR-04: Responsive design voor mobiel

          ## Pagina's
          - Home: hero sectie met foto en korte bio
          - Projecten: grid met projectkaarten (titel, beschrijving, link)
          - Contact: formulier met naam, e-mail, bericht

          ## Stijl
          - Minimalistisch design
          - Systeemlettertype
          - Maximale breedte 800px

    - agent: business_analyst
      tool: coding:run_git
      arguments:
        command: "add docs/functional-design.md"

    - agent: business_analyst
      tool: coding:run_git
      arguments:
        command: "commit -m 'Functioneel ontwerp portfolio'"

    - agent: business_analyst
      tool: coding:run_git
      arguments:
        command: "push"

    - agent: business_analyst
      tool: builtin:done
      arguments:
        summary: "DESIGN_APPROVED"

    # --- Planner ---
    - agent: planner
      tool: builtin:make_plan
      mock: true
      arguments:
        steps:
          - agent_id: architect
            prompt: "Create technical design for the portfolio site"

    - agent: planner
      tool: builtin:done
      arguments:
        summary: "BA approved, planned architect"

    # --- Architect ---
    - agent: architect
      tool: coding:run_git
      arguments:
        command: "pull"

    - agent: architect
      tool: coding:read_file
      arguments:
        path: docs/functional-design.md

    - agent: architect
      tool: coding:make_design
      approval:
        status: approved
        by: architect
      arguments:
        path: docs/technical-design.md
        content: |
          # Technisch Ontwerp: Portfolio

          ## Stack
          - HTML5 + CSS3, geen framework
          - Vanilla JavaScript voor interactie

          ## Layout
          - CSS Grid voor projectenoverzicht
          - Flexbox voor navigatie
          - Responsive breakpoints: 768px, 1024px

          ## Bestanden
          - index.html: hoofdpagina
          - styles.css: styling
          - script.js: formuliervalidatie

    - agent: architect
      tool: coding:run_git
      arguments:
        command: "add docs/technical-design.md"

    - agent: architect
      tool: coding:run_git
      arguments:
        command: "commit -m 'Technisch ontwerp portfolio'"

    - agent: architect
      tool: coding:run_git
      arguments:
        command: "push"

    - agent: architect
      tool: builtin:done
      arguments:
        summary: "DESIGN_APPROVED"

    # --- Planner ---
    - agent: planner
      tool: builtin:make_plan
      mock: true
      arguments:
        steps:
          - agent_id: builder
            prompt: "Build the portfolio site"

    - agent: planner
      tool: builtin:done
      arguments:
        summary: "Architect approved, planned builder"

    # --- Builder (mocked) ---
    - agent: builder
      tool: coding:execute_coding_task
      arguments:
        task: "Build the portfolio website"
      mock: true
      mock_result: "All files created"
      outcome:
        files:
          - path: index.html
            content: |
              <!DOCTYPE html>
              <html lang="en">
              <head><title>Portfolio</title><link rel="stylesheet" href="styles.css"></head>
              <body>
                <header><h1>My Portfolio</h1><nav><a href="#projects">Projects</a><a href="#contact">Contact</a></nav></header>
                <main>
                  <section id="hero"><p>Full-stack developer passionate about clean code.</p></section>
                  <section id="projects"><div class="grid"></div></section>
                  <section id="contact"><form><input name="email" type="email"><textarea name="message"></textarea><button>Send</button></form></section>
                </main>
              </body>
              </html>
          - path: styles.css
            content: |
              body { font-family: system-ui; max-width: 800px; margin: 0 auto; padding: 2rem; }
              header { border-bottom: 1px solid #eee; margin-bottom: 2rem; }
              .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1rem; }

    - agent: builder
      tool: builtin:done
      arguments:
        summary: "BUILD_COMPLETE - Portfolio built with HTML and CSS"
