## Shared base: todo-app pipeline up to builder planning
## Router → Planner → BA → Architect → Builder Planner → Planner plans Builder
## Both create-todo-app and create-todo-app-mock-deploy extend this.
## The real builder drives the full TDD cycle via OpenCode sandbox agents.

tool-test:
  name: setup-todo-app-pipeline
  description: "Shared pipeline prefix for todo-app e2e tests"
  tags: [setup, create-project]

  chain:
    # --- Router ---
    - agent: router
      tool: builtin:set_intent
      arguments:
        intent: create_project
        project_name: todo-app
        description: "A simple to-do list application"
      assert:
        result:
          - not_empty
          - { contains: "todo-app" }

    - agent: router
      tool: builtin:done
      arguments:
        summary: "Agent router: Classified as create_project for todo-app"
      assert:
        completed: true

    # --- Planner (initial) ---
    - agent: planner
      tool: builtin:make_plan
      arguments:
        steps:
          - agent_id: business_analyst
            prompt: "Gather requirements for the to-do app and create functional design"
          - agent_id: planner
            prompt: "Re-evaluate after business_analyst completes"

    - agent: planner
      tool: builtin:done
      arguments:
        summary: "Agent planner: Planned business_analyst as next step"

    # --- Business Analyst ---
    - agent: business_analyst
      tool: coding:make_design
      approval:
        status: approved
      arguments:
        path: docs/functional-design.md
        content: |
          # Functioneel Ontwerp: Todo App

          ## Vereisten
          - FR-01: Gebruiker kan taken toevoegen met een titel
          - FR-02: Gebruiker kan taken als voltooid markeren
          - FR-03: Gebruiker kan taken verwijderen
          - FR-04: Takenlijst wordt persistent opgeslagen

          ## Gebruikersinterface
          - Invoerveld bovenaan voor nieuwe taken
          - Lijst met taken, elk met checkbox en verwijderknop
          - Filter: alle / actief / voltooid
      assert:
        result:
          - not_empty
          - { contains: "functional-design.md" }

    - agent: business_analyst
      tool: coding:run_git
      arguments:
        command: "add docs/functional-design.md"

    - agent: business_analyst
      tool: coding:run_git
      arguments:
        command: "commit -m 'Functioneel ontwerp toegevoegd'"

    - agent: business_analyst
      tool: coding:run_git
      arguments:
        command: "push"

    - agent: business_analyst
      tool: builtin:done
      arguments:
        summary: "Agent business_analyst: DESIGN_APPROVED"

    # --- Planner (after BA) ---
    - agent: planner
      tool: builtin:make_plan
      arguments:
        steps:
          - agent_id: architect
            prompt: "Review functional design and create technical design for the todo app"
          - agent_id: planner
            prompt: "Re-evaluate after architect completes"

    - agent: planner
      tool: builtin:done
      arguments:
        summary: "Agent planner: BA approved, planned architect as next step"

    # --- Architect ---
    - agent: architect
      tool: coding:run_git
      arguments:
        command: "pull"

    - agent: architect
      tool: coding:read_file
      arguments:
        path: docs/functional-design.md
      assert:
        result:
          - not_empty
          - { contains: "Functioneel Ontwerp" }

    - agent: architect
      tool: coding:make_design
      approval:
        status: approved
        by: architect
      arguments:
        path: docs/technical-design.md
        content: |
          # Technisch Ontwerp: Todo App

          ## Stack
          - Frontend: React met Vite
          - State: localStorage voor persistentie
          - Styling: CSS modules

          ## Componenten
          - App: hoofdcomponent, beheert state
          - TodoInput: invoerveld voor nieuwe taken
          - TodoList: lijst van TodoItem componenten
          - TodoItem: enkele taak met checkbox en verwijderknop
          - FilterBar: alle / actief / voltooid

          ## Datamodel
          ```
          interface Todo {
            id: string
            title: string
            completed: boolean
            createdAt: string
          }
          ```
      assert:
        result:
          - { contains: "technical-design.md" }

    - agent: architect
      tool: coding:run_git
      arguments:
        command: "add docs/technical-design.md"

    - agent: architect
      tool: coding:run_git
      arguments:
        command: "commit -m 'Technisch ontwerp toegevoegd'"

    - agent: architect
      tool: coding:run_git
      arguments:
        command: "push"

    - agent: architect
      tool: builtin:done
      arguments:
        summary: "Agent architect: DESIGN_APPROVED"

    # --- Planner (after architect → builder_planner) ---
    - agent: planner
      tool: builtin:make_plan
      arguments:
        steps:
          - agent_id: builder_planner
            prompt: "Create a builder plan for the todo app"
          - agent_id: planner
            prompt: "Re-evaluate after builder_planner completes"

    - agent: planner
      tool: builtin:done
      arguments:
        summary: "Agent planner: Architect approved, planned builder_planner"

    # --- Builder Planner ---
    - agent: builder_planner
      tool: coding:run_git
      arguments:
        command: "pull"

    - agent: builder_planner
      tool: coding:read_file
      arguments:
        path: docs/functional-design.md

    - agent: builder_planner
      tool: coding:read_file
      arguments:
        path: docs/technical-design.md

    - agent: builder_planner
      tool: coding:write_file
      arguments:
        path: docs/builder-plan.md
        content: |
          # Builder Plan: Todo App

          ## Solution Strategy
          React SPA with localStorage persistence.

          ## Code Standards
          - ESM imports, functional components
          - CSS modules for styling

          ## Test Framework
          Vitest + React Testing Library

          ## Files to Create
          - src/App.jsx (main component)
          - src/components/TodoInput.jsx
          - src/components/TodoList.jsx
          - src/components/TodoItem.jsx
          - src/components/FilterBar.jsx
          - src/index.css

    - agent: builder_planner
      tool: coding:run_git
      arguments:
        command: "add docs/builder-plan.md"

    - agent: builder_planner
      tool: coding:run_git
      arguments:
        command: "commit -m 'Add builder plan'"

    - agent: builder_planner
      tool: coding:run_git
      arguments:
        command: "push"

    - agent: builder_planner
      tool: builtin:done
      arguments:
        summary: "Agent builder_planner: Created builder-plan.md with solution strategy, code standards, and file list."

    # --- Planner (after builder_planner → builder, new flow: builder owns full TDD cycle) ---
    - agent: planner
      tool: builtin:make_plan
      arguments:
        steps:
          - agent_id: builder
            prompt: "Drive the full TDD cycle for the todo app. Read functional_design.md, technical_design.md, and builder_plan.md. Write tests (druppie-test-writer), implement code (druppie-implementer), run tests (druppie-test-runner). Apply retry strategies on failure, up to 3 attempts. Signal TDD_PASSED or TDD_FAILED in done()."
          - agent_id: planner
            prompt: "Builder completed TDD cycle. Evaluate verdict and decide next step."

    - agent: planner
      tool: builtin:done
      arguments:
        summary: "Agent planner: Planned builder (full TDD cycle via OpenCode)"
