## Quick smoke test for YAML flow system
## Tests the basic execution of execute_coding_task_pi with YAML flow

tool-test:
  name: yaml-flow-smoke-test
  description: "Quick smoke test of YAML flow - verifies agent summaries are returned"
  tags: [smoke, yaml-flow, tdd, summaries]

  chain:
    # --- Agent: Developer ---
    # Quick test with mocked result to verify the format is correct
    - agent: developer
      tool: coding:execute_coding_task_pi
      arguments:
        task: "Create a simple hello.ts file with console.log('Hello')"
        repo_target: "project"
        flow: "tdd"
      mock: true
      mock_result: '{"success": true, "run_id": "smoke-test-123", "pi_coding_run_id": "456", "summaries": {"analyst": "Analyzed task to create hello.ts", "planner": "Created 1-wave plan", "wave-orchestrator": "Executed 1 wave", "verifier": "Verified compilation", "pr-author": "Skipped"}, "deliverables": {"branch": "feat/hello", "commits": [{"sha": "abc123"}]}}'
      assert:
        result:
          - { contains: "summaries" }
          - { contains: "analyst" }
          - { contains: "planner" }
          - { contains: "wave-orchestrator" }
          - { contains: "verifier" }
          - { contains: "pr-author" }

    # --- Verify legacy format still works (explore flow) ---
    - agent: developer
      tool: coding:execute_coding_task_pi
      arguments:
        task: "What files are in the src directory?"
        repo_target: "project"
        flow: "explore"
      mock: true
      mock_result: '{"success": true, "run_id": "explore-test-123", "pi_coding_run_id": "789", "answer": "The src directory contains: index.ts, main.ts"}'
      assert:
        result:
          - { contains: "answer" }
          - not_empty

    # --- Completion ---
    - agent: developer
      tool: builtin:create_message
      arguments:
        content: "YAML Flow Smoke Test Passed! TDD flow returns agent summaries, explore flow returns answer field."
      assert:
        completed: true
