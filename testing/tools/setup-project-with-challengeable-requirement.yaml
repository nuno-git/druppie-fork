## Setup: project with an FD whose rigid 5s NFR LOOKS like a BA assumption
##
## Scenario: a permit-application analyzer that must classify uploaded
## permit documents, extract structured metadata and validate against
## waterschap policy rules. The FD bakes in "response <5s" as NFR-02 —
## but the assumption list in Section 10 does NOT trace this back to any
## user statement, and the user journey suggests users happily wait for
## a thorough analysis.
##
## The architect's research will almost certainly find that a deep
## foundry-agent-style analysis (Druppie module, reusable across
## waterschappen) gives materially better accuracy but takes ~15s —
## blocked ONLY by the 5s budget. This is the textbook REQUIREMENT_CHALLENGE
## case: flag it to the BA so the user can decide whether 5s is hard.
##
## Used by: architect-challenges-blocking-requirement (agent test)

tool-test:
  name: setup-project-with-challengeable-requirement
  description: "Creates a project with FD that has a rigid NFR looking like a BA assumption — triggers architect REQUIREMENT_CHALLENGE"
  tags: [setup, requirement-challenge]

  chain:
    # --- Router ---
    - agent: router
      tool: builtin:set_intent
      arguments:
        intent: create_project
        project_name: vergunning-analyzer
        description: "Analyseert geüploade vergunningdocumenten: classificatie, metadata-extractie en beleidsvalidatie"
      assert:
        result:
          - not_empty

    - agent: router
      tool: builtin:done
      arguments:
        summary: "Agent router: Classified as create_project for vergunning-analyzer"

    # --- Planner ---
    - agent: planner
      tool: builtin:make_plan
      arguments:
        steps:
          - agent_id: business_analyst
            prompt: "Gather requirements and create functional design"
          - agent_id: planner
            prompt: "Re-evaluate after business analyst completes"

    - agent: planner
      tool: builtin:done
      arguments:
        summary: "Agent planner: Planned business_analyst to gather requirements and create functional design"

    # --- Business Analyst ---
    - agent: business_analyst
      tool: coding:make_design
      approval:
        status: approved
      arguments:
        path: docs/functional-design.md
        content: |
          # Functioneel Ontwerp: Vergunning-analyzer

          ## 1. Huidige vs Gewenste Situatie
          Medewerkers van het waterschap uploaden handmatig vergunning-
          documenten en moeten zelf classificeren, metadata overtypen en
          toetsen aan beleidsregels. Dit is foutgevoelig en traag.
          Gewenst: een tool die uploads automatisch analyseert.

          ## 2. Functionele Vereisten
          - FR-01: Gebruiker kan een vergunningdocument (PDF/scan) uploaden
          - FR-02: Systeem classificeert het documenttype (watervergunning,
            lozingsvergunning, onttrekkingsvergunning, overig)
          - FR-03: Systeem extraheert gestructureerde metadata (aanvrager,
            vergunninghouder, locatie, datums, vergunningnummer, toepasselijke
            wet)
          - FR-04: Systeem toetst tegen waterschap-beleidsregels en markeert
            afwijkingen met onderbouwing
          - FR-05: Gebruiker ziet analyse-resultaat met onderbouwing per
            metadata-veld en per beleidsregel

          ## 3. Niet-Functionele Vereisten
          - NFR-01: Analyses zijn reproduceerbaar (zelfde input → zelfde output)
          - NFR-02: Analyse-resultaat verschijnt binnen 5 seconden na upload
          - NFR-03: Alle documenten worden versleuteld opgeslagen

          ## 4. Gebruikersrollen
          - Vergunningverlener: uploadt documenten, beoordeelt analyse
          - Beheerder: beheert beleidsregels

          ## 5. Gebruikersinteractie
          - Uploadpagina met drag-and-drop
          - Resultaatpagina met classificatie, metadata-tabel en
            beleidsafwijkingen — inclusief onderbouwing per item
          - Gebruiker accepteert resultaat of corrigeert handmatig
          - Gebruikers zijn bereid te wachten op een grondige analyse;
            ze geven aan dat een goede analyse belangrijker is dan
            onmiddellijke respons.

          ## 10. Aannames & Open Vragen
          - Aanname: documenten zijn maximaal 30 pagina's.
          - Aanname: waterschap levert beleidsregels aan in gestructureerd
            formaat.
          - Open vraag: welke bronsystemen moeten uiteindelijk gekoppeld
            worden voor metadata-verrijking?

          (Geen user-uitspraak in Sectie 10 over responsetijd — NFR-02 is
          door de BA ingevuld op basis van "voelt snel genoeg".)

      assert:
        result:
          - { contains: "functional-design.md" }

    - agent: business_analyst
      tool: coding:run_git
      arguments:
        command: "add docs/functional-design.md"

    - agent: business_analyst
      tool: coding:run_git
      arguments:
        command: "commit -m 'Functioneel ontwerp vergunning-analyzer'"

    - agent: business_analyst
      tool: coding:run_git
      arguments:
        command: "push"

    - agent: business_analyst
      tool: builtin:done
      arguments:
        summary: "Agent business_analyst: DESIGN_APPROVED. Gathered requirements and wrote docs/functional-design.md with 5 functional requirements and 3 non-functional requirements."
      assert:
        completed: true
