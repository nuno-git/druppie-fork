## Test YAML-based TDD flow with execute_coding_task_pi
## Verifies that agent summaries are properly returned in tool results

tool-test:
  name: yaml-tdd-flow-summarize-results
  description: "Test YAML flow returns agent summaries in tool result"
  tags: [e2e, yaml-flow, tdd, summaries]

  chain:
    # --- Agent: Developer ---
    # Agent asks for a simple implementation using the new YAML flow
    - agent: developer
      tool: coding:execute_coding_task_pi
      arguments:
        task: "Implement a simple hello world function in TypeScript that logs 'Hello, World!' to the console"
        repo_target: "project"
        flow: "tdd"
      mock: true
      mock_result: '{"success": true, "run_id": "test-run-123", "pi_coding_run_id": "456", "summaries": {"analyst": "Analyzed the task to implement a hello world function", "planner": "Created initial build plan with 1 wave", "wave-orchestrator": "Executed 1 wave with 1 step", "verifier": "Verified hello-world.ts compiles", "pr-author": "Skipped"}, "deliverables": {"branch": "feat/hello-world", "commits": [{"sha": "abc123"}]}}'
      assert:
        result:
          - { contains: "summaries" }
          - { contains: "analyst" }
          - { contains: "planner" }
          - { contains: "wave-orchestrator" }
          - { contains: "verifier" }
          - { contains: "pr-author" }

    # --- Completion ---
    - agent: developer
      tool: builtin:create_message
      arguments:
        content: "YAML Flow Test Passed! All 5 agent summaries present in tool result."
      assert:
        completed: true
