    - agent: test_builder
      tool: coding:run_git
      arguments:
        command: "add tests/"

    - agent: test_builder
      tool: coding:run_git
      arguments:
        command: "commit -m 'Add vergunningzoeker tests (Red phase)'"

    - agent: test_builder
      tool: coding:run_git
      arguments:
        command: "push"

    - agent: test_builder
      tool: builtin:done
      arguments:
        summary: "Agent test_builder: Wrote 3 tests in tests/test_routes.py (pytest)."

    # =========================================================================
    # Planner → Builder
    # =========================================================================
    - agent: planner
      tool: builtin:make_plan
      arguments:
        steps:
          - agent_id: builder
            prompt: "Build the vergunningzoeker to pass the tests, using Druppie SDK"
          - agent_id: planner
            prompt: "Re-evaluate after builder completes"

    - agent: planner
      tool: builtin:done
      arguments:
        summary: "Agent planner: Planned builder"

    # =========================================================================
    # Builder — real code using druppie SDK for OCR + LLM classification
    # =========================================================================
    - agent: builder
      tool: coding:execute_coding_task
      arguments:
        task: "Build the vergunningzoeker to pass the tests"
      mock: true
      mock_result: "All files created successfully"
      outcome:
        files:
          - path: app/models.py
            content: |
              from datetime import datetime, timezone
              from uuid import uuid4

              from sqlalchemy import Column, DateTime, Integer, String, Text
              from sqlalchemy.dialects.postgresql import UUID

              from app.database import Base


              class Permit(Base):
                  __tablename__ = "permits"

                  id = Column(Integer, primary_key=True, autoincrement=True)
                  permit_number = Column(String(100), nullable=True)
                  applicant_name = Column(String(200), nullable=True)
                  permit_type = Column(String(100), nullable=True)
                  extracted_text = Column(Text, nullable=True)
                  source_file = Column(String(500), nullable=True)
                  upload_date = Column(DateTime, default=lambda: datetime.now(timezone.utc))
                  created_at = Column(DateTime, default=lambda: datetime.now(timezone.utc))

          - path: app/routes.py
            content: |
              import base64
              from flask import Blueprint, jsonify, request
              from druppie_sdk import DruppieClient
              from app.database import get_db
              from app.models import Permit

              api = Blueprint("api", __name__)
              druppie = DruppieClient()

              ALLOWED_EXTENSIONS = {"png", "jpg", "jpeg", "gif", "bmp", "tiff", "webp", "pdf"}


              def _allowed_file(filename):
                  return "." in filename and filename.rsplit(".", 1)[1].lower() in ALLOWED_EXTENSIONS


              @api.route("/info")
              def info():
                  from app.config import settings
                  return jsonify(app_name=settings.app_name)


              @api.route("/permits/upload", methods=["POST"])
              def upload_permit():
                  """Upload a permit document (file) — OCR + LLM classification via Druppie SDK."""
                  if "file" not in request.files:
                      return jsonify(error="Geen bestand geüpload. Selecteer een scan of foto."), 400

                  file = request.files["file"]
                  if not file.filename or not _allowed_file(file.filename):
                      return jsonify(error="Ongeldig bestandstype. Upload een afbeelding of PDF."), 400

                  # Read file and convert to base64 data URI for OCR
                  file_bytes = file.read()
                  ext = file.filename.rsplit(".", 1)[1].lower()
                  mime_map = {
                      "jpg": "image/jpeg", "jpeg": "image/jpeg", "png": "image/png",
                      "gif": "image/gif", "bmp": "image/bmp", "tiff": "image/tiff",
                      "webp": "image/webp", "pdf": "application/pdf",
                  }
                  mime = mime_map.get(ext, "application/octet-stream")
                  b64 = base64.b64encode(file_bytes).decode("utf-8")
                  data_uri = f"data:{mime};base64,{b64}"

                  # Step 1: OCR via druppie vision module
                  ocr_result = druppie.call("vision", "ocr", {"image_url": data_uri})
                  extracted_text = ocr_result.get("text", "")

                  # Step 2: Classify permit type via druppie LLM module
                  classify_result = druppie.call("llm", "chat", {
                      "prompt": f"Classificeer het type vergunning op basis van deze tekst. "
                                f"Antwoord met alleen het type (bv. watervergunning_lozing, "
                                f"watervergunning_onttrekking, keurvergunning, etc.):\n\n{extracted_text}",
                      "system": "Je bent een specialist in watervergunningen bij een Nederlands waterschap.",
                  })
                  permit_type = classify_result.get("answer", "onbekend")

                  # Step 3: Store in database
                  permit_number = request.form.get("permit_number", "")
                  applicant_name = request.form.get("applicant_name", "")

                  db = next(get_db())
                  permit = Permit(
                      permit_number=permit_number,
                      applicant_name=applicant_name,
                      permit_type=permit_type,
                      extracted_text=extracted_text,
                      source_file=file.filename,
                  )
                  db.add(permit)
                  db.commit()
                  db.refresh(permit)

                  return jsonify(
                      id=permit.id,
                      permit_number=permit.permit_number,
                      applicant_name=permit.applicant_name,
                      permit_type=permit_type,
                      extracted_text=extracted_text,
                  )


              @api.route("/permits")
              def list_permits():
                  """List all permits."""
                  db = next(get_db())
                  permits = db.query(Permit).order_by(Permit.created_at.desc()).all()
                  return jsonify([
                      {
                          "id": p.id,
                          "permit_number": p.permit_number,
                          "applicant_name": p.applicant_name,
                          "permit_type": p.permit_type,
                          "source_file": p.source_file,
                          "upload_date": p.upload_date.isoformat() if p.upload_date else None,
                      }
                      for p in permits
                  ])


              @api.route("/permits/<int:permit_id>")
              def get_permit(permit_id):
                  """Get permit details."""
                  db = next(get_db())
                  permit = db.query(Permit).filter(Permit.id == permit_id).first()
                  if not permit:
                      return jsonify(error="Vergunning niet gevonden"), 404
                  return jsonify(
                      id=permit.id,
                      permit_number=permit.permit_number,
                      applicant_name=permit.applicant_name,
                      permit_type=permit.permit_type,
                      extracted_text=permit.extracted_text,
                      source_file=permit.source_file,
                      upload_date=permit.upload_date.isoformat() if permit.upload_date else None,
                  )


              @api.route("/permits/search")
              def search_permits():
                  """Search permits by keyword."""
                  q = request.args.get("q", "")
                  db = next(get_db())
                  if q:
                      results = db.query(Permit).filter(
                          Permit.permit_number.ilike(f"%{q}%")
                          | Permit.applicant_name.ilike(f"%{q}%")
                          | Permit.permit_type.ilike(f"%{q}%")
                          | Permit.extracted_text.ilike(f"%{q}%")
                      ).all()
                  else:
                      results = db.query(Permit).all()
                  return jsonify([
                      {
                          "id": p.id,
                          "permit_number": p.permit_number,
                          "applicant_name": p.applicant_name,
                          "permit_type": p.permit_type,
                      }
                      for p in results
                  ])

          - path: frontend/src/App.tsx
            content: |
              import { useState, useEffect, useRef } from "react"
              import { Button } from "@/components/ui/button"
              import { Card, CardContent, CardHeader, CardTitle } from "@/components/ui/card"
              import { Input } from "@/components/ui/input"

              interface Permit {
                id: number
                permit_number: string
                applicant_name: string
                permit_type: string
                source_file?: string
                extracted_text?: string
                upload_date?: string
              }

              function App() {
                const [permits, setPermits] = useState<Permit[]>([])
                const [searchQuery, setSearchQuery] = useState("")
                const [permitNumber, setPermitNumber] = useState("")
                const [applicantName, setApplicantName] = useState("")
                const [selectedFile, setSelectedFile] = useState<File | null>(null)
                const [uploading, setUploading] = useState(false)
                const [uploadResult, setUploadResult] = useState<string | null>(null)
                const [selectedPermit, setSelectedPermit] = useState<Permit | null>(null)
                const [dragActive, setDragActive] = useState(false)
                const fileInputRef = useRef<HTMLInputElement>(null)

                const loadPermits = async (query = "") => {
                  const url = query ? `/api/permits/search?q=${encodeURIComponent(query)}` : "/api/permits"
                  const res = await fetch(url)
                  const data = await res.json()
                  setPermits(data)
                }

                useEffect(() => { loadPermits() }, [])

                const handleUpload = async () => {
                  if (!selectedFile) return
                  setUploading(true)
                  setUploadResult(null)
                  try {
                    const formData = new FormData()
                    formData.append("file", selectedFile)
                    if (permitNumber) formData.append("permit_number", permitNumber)
                    if (applicantName) formData.append("applicant_name", applicantName)

                    const res = await fetch("/api/permits/upload", {
                      method: "POST",
                      body: formData,
                    })
                    const data = await res.json()
                    if (res.ok) {
                      setUploadResult(`Vergunning verwerkt: type "${data.permit_type}"`)
                      setSelectedFile(null)
                      setPermitNumber("")
                      setApplicantName("")
                      if (fileInputRef.current) fileInputRef.current.value = ""
                      loadPermits()
                    } else {
                      setUploadResult(`Fout: ${data.error}`)
                    }
                  } catch (err) {
                    setUploadResult("Fout bij uploaden")
                  } finally {
                    setUploading(false)
                  }
                }

                const handleDrop = (e: React.DragEvent) => {
                  e.preventDefault()
                  setDragActive(false)
                  if (e.dataTransfer.files?.[0]) setSelectedFile(e.dataTransfer.files[0])
                }

                const handleSearch = () => loadPermits(searchQuery)

                const loadDetail = async (id: number) => {
                  const res = await fetch(`/api/permits/${id}`)
                  if (res.ok) setSelectedPermit(await res.json())
                }

                return (
                  <div className="min-h-screen bg-background">
                    <header className="border-b">
                      <div className="container mx-auto flex h-16 items-center px-4">
                        <h1 className="text-xl font-bold">Vergunningzoeker</h1>
                      </div>
                    </header>
                    <main className="container mx-auto px-4 py-8 max-w-4xl space-y-6">
                      <Card>
                        <CardHeader>
                          <CardTitle>Document uploaden</CardTitle>
                        </CardHeader>
                        <CardContent className="space-y-3">
                          <div
                            className={`border-2 border-dashed rounded-lg p-8 text-center cursor-pointer transition-colors ${dragActive ? "border-primary bg-primary/5" : "border-muted-foreground/25 hover:border-primary/50"}`}
                            onDragOver={e => { e.preventDefault(); setDragActive(true) }}
                            onDragLeave={() => setDragActive(false)}
                            onDrop={handleDrop}
                            onClick={() => fileInputRef.current?.click()}
                          >
                            <input
                              ref={fileInputRef}
                              type="file"
                              accept="image/*,.pdf"
                              className="hidden"
                              onChange={e => { if (e.target.files?.[0]) setSelectedFile(e.target.files[0]) }}
                            />
                            {selectedFile ? (
                              <p className="text-sm font-medium">{selectedFile.name} <span className="text-muted-foreground">({(selectedFile.size / 1024).toFixed(0)} KB)</span></p>
                            ) : (
                              <div>
                                <p className="text-muted-foreground">Sleep een bestand hierheen of klik om te selecteren</p>
                                <p className="text-xs text-muted-foreground mt-1">Afbeeldingen (JPG, PNG) of PDF</p>
                              </div>
                            )}
                          </div>
                          <div className="flex gap-2">
                            <Input value={permitNumber} onChange={e => setPermitNumber(e.target.value)} placeholder="Vergunningnummer (optioneel)" />
                            <Input value={applicantName} onChange={e => setApplicantName(e.target.value)} placeholder="Aanvrager (optioneel)" />
                          </div>
                          <Button onClick={handleUpload} disabled={uploading || !selectedFile} className="w-full">
                            {uploading ? "Bezig met OCR en classificatie..." : "Upload & Analyseer"}
                          </Button>
                          {uploadResult && (
                            <p className={`text-sm ${uploadResult.startsWith("Fout") ? "text-destructive" : "text-green-600"}`}>{uploadResult}</p>
                          )}
                        </CardContent>
                      </Card>

                      <Card>
                        <CardHeader>
                          <CardTitle>Zoeken</CardTitle>
                        </CardHeader>
                        <CardContent>
                          <div className="flex gap-2">
                            <Input value={searchQuery} onChange={e => setSearchQuery(e.target.value)} onKeyDown={e => e.key === "Enter" && handleSearch()} placeholder="Zoek op nummer, aanvrager, type, of tekst..." />
                            <Button onClick={handleSearch}>Zoek</Button>
                          </div>
                        </CardContent>
                      </Card>

                      <Card>
                        <CardHeader>
                          <CardTitle>Vergunningen ({permits.length})</CardTitle>
                        </CardHeader>
                        <CardContent>
                          {permits.length === 0 ? (
                            <p className="text-muted-foreground">Geen vergunningen gevonden.</p>
                          ) : (
                            <ul className="space-y-2">
                              {permits.map(p => (
                                <li key={p.id} className="flex items-center justify-between p-3 rounded border cursor-pointer hover:bg-muted" onClick={() => loadDetail(p.id)}>
                                  <div>
                                    <span className="font-medium">{p.permit_number || "Geen nummer"}</span>
                                    <span className="mx-2 text-muted-foreground">—</span>
                                    <span>{p.applicant_name || "Onbekend"}</span>
                                    {p.source_file && <span className="ml-2 text-xs text-muted-foreground">({p.source_file})</span>}
                                  </div>
                                  <span className="text-sm text-muted-foreground">{p.permit_type}</span>
                                </li>
                              ))}
                            </ul>
                          )}
                        </CardContent>
                      </Card>

                      {selectedPermit && (
                        <Card>
                          <CardHeader>
                            <CardTitle>Detail: {selectedPermit.permit_number || selectedPermit.source_file}</CardTitle>
                          </CardHeader>
                          <CardContent className="space-y-2">
                            <p><strong>Aanvrager:</strong> {selectedPermit.applicant_name || "Niet opgegeven"}</p>
                            <p><strong>Type (AI):</strong> {selectedPermit.permit_type}</p>
                            <p><strong>Bronbestand:</strong> {selectedPermit.source_file}</p>
                            <p><strong>Upload datum:</strong> {selectedPermit.upload_date}</p>
                            {selectedPermit.extracted_text && (
                              <div>
                                <strong>Geëxtraheerde tekst (OCR):</strong>
                                <pre className="mt-1 p-3 bg-muted rounded text-sm whitespace-pre-wrap max-h-64 overflow-y-auto">{selectedPermit.extracted_text}</pre>
                              </div>
                            )}
                            <Button variant="outline" onClick={() => setSelectedPermit(null)}>Sluiten</Button>
                          </CardContent>
                        </Card>
                      )}
                    </main>
                  </div>
                )
              }

              export default App

    - agent: builder
      tool: builtin:done
      arguments:
        summary: "Agent builder: BUILD_COMPLETE. Implemented vergunningzoeker with Druppie SDK — vision/ocr for document scanning, llm/chat for permit classification, PostgreSQL for storage."

    # =========================================================================
    # Planner → Test Executor
    # =========================================================================
    - agent: planner
      tool: builtin:make_plan
      arguments:
        steps:
          - agent_id: test_executor
            prompt: "Run all tests"
          - agent_id: planner
            prompt: "Re-evaluate after test_executor completes"

    - agent: planner
      tool: builtin:done
      arguments:
        summary: "Agent planner: Planned test_executor"

    # =========================================================================
    # Test Executor (mocked — tests pass)
    # =========================================================================
    - agent: test_executor
      tool: coding:run_tests
      mock: true
      mock_result: '{"success": true, "output": "3 passed, 0 failed", "exit_code": 0}'

    - agent: test_executor
      tool: coding:get_coverage_report
      mock: true
      mock_result: '{"coverage": 78, "lines_covered": 62, "lines_total": 80}'

    - agent: test_executor
      tool: builtin:test_report
      mock: true
      mock_result: '{"status": "ok"}'
      arguments:
        total: 3
        passed: 3
        failed: 0
        coverage: 78
        summary: "All 3 tests passed with 78% coverage"

    - agent: test_executor
      tool: builtin:done
      arguments:
        summary: "Agent test_executor: TEST RESULT: PASS — 3/3 tests passed, 78% coverage."

    # =========================================================================
    # Planner → Deployer
    # =========================================================================
    - agent: planner
      tool: builtin:make_plan
      arguments:
        steps:
          - agent_id: deployer
            prompt: "Deploy the vergunningzoeker from main branch"
          - agent_id: planner
            prompt: "Re-evaluate after deployer completes"

    - agent: planner
      tool: builtin:done
      arguments:
        summary: "Agent planner: Tests passed, planned deployer"

    # =========================================================================
    # Deployer (REAL — actually deploys the app)
    # =========================================================================
    - agent: deployer
      tool: docker:list_containers

    - agent: deployer
      tool: docker:compose_up
      approval:
        status: approved
        by: developer
      arguments:
        compose_project_name: vergunningzoeker
        branch: main
      assert:
        result:
          - not_empty
          - { contains: "success" }

    - agent: deployer
      tool: builtin:done
      arguments:
        summary: "Agent deployer: Deployed vergunningzoeker from main."

    # =========================================================================
    # Planner → Summarizer
    # =========================================================================
    - agent: planner
      tool: builtin:make_plan
      arguments:
        steps:
          - agent_id: summarizer
            prompt: "Summarize what was accomplished"

    - agent: planner
      tool: builtin:done
      arguments:
        summary: "Agent planner: Planned summarizer"

    # =========================================================================
    # Summarizer
    # =========================================================================
    - agent: summarizer
      tool: builtin:create_message
      arguments:
        content: |
          De vergunningzoeker is gebouwd en gedeployed!

          **Functies:**
          - Upload vergunningdocumenten (scan/foto) — OCR via Druppie module-vision
          - Automatische classificatie van vergunningtype via Druppie module-llm
          - Zoeken op vergunningnummer, aanvrager, type
          - Detail weergave met geëxtraheerde tekst

          **Techniek:** Flask + React, AI via Druppie SDK (geen hardcoded API keys)

          De app is nu actief. Controleer de deployer tool call voor de URL.

    - agent: summarizer
      tool: builtin:done
      arguments:
        summary: "Agent summarizer: Presented completion summary to user."
      assert:
        completed: true

