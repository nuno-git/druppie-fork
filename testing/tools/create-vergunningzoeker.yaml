          - app/routes.py — API endpoints met druppie SDK calls
          - frontend/src/App.tsx — upload + zoek UI

    - agent: builder_planner
      tool: coding:run_git
      arguments:
        command: "add docs/builder-plan.md"

    - agent: builder_planner
      tool: coding:run_git
      arguments:
        command: "commit -m 'Add builder plan for vergunningzoeker'"

    - agent: builder_planner
      tool: coding:run_git
      arguments:
