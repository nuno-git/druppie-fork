          ## Solution Strategy
          Flask backend met React frontend. OCR en classificatie via Druppie SDK.

          ## Module Integration
          - **SDK**: `druppie_sdk` is pre-installed (pip package)
          - **Usage**: `from druppie_sdk import DruppieClient; druppie = DruppieClient()`
          - **Modules Used**:
