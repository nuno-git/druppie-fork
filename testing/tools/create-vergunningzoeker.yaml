          - path: app/routes.py
            content: |
              import base64
              import logging
              from flask import Blueprint, jsonify, request
              from druppie_sdk import DruppieClient
              from app.database import get_db
              from app.models import Permit

              logger = logging.getLogger(__name__)
              api = Blueprint("api", __name__)
              druppie = DruppieClient()

              ALLOWED_EXTENSIONS = {"png", "jpg", "jpeg", "gif", "bmp", "tiff", "webp", "pdf"}
              MAX_FILE_SIZE = 25 * 1024 * 1024  # 25 MB


              def _allowed_file(filename):
                  return "." in filename and filename.rsplit(".", 1)[1].lower() in ALLOWED_EXTENSIONS


              def _get_ext(filename):
                  return filename.rsplit(".", 1)[1].lower() if "." in filename else ""


              @api.route("/info")
              def info():
                  from app.config import settings
                  return jsonify(app_name=settings.app_name)


              @api.route("/permits/upload", methods=["POST"])
              def upload_permit():
                  """Upload a permit document — OCR + LLM classification via Druppie SDK.

                  Accepts multipart/form-data with:
                    file: the document (image or PDF)
                    permit_number: optional
                    applicant_name: optional
                  """
                  if "file" not in request.files:
                      return jsonify(error="Geen bestand geüpload. Selecteer een scan of foto."), 400

                  file = request.files["file"]
                  if not file.filename or not _allowed_file(file.filename):
                      return jsonify(error="Ongeldig bestandstype. Upload een afbeelding (JPG, PNG) of PDF."), 400

                  file_bytes = file.read()
                  if len(file_bytes) > MAX_FILE_SIZE:
                      return jsonify(error="Bestand te groot. Maximaal 25 MB."), 400
                  if len(file_bytes) == 0:
                      return jsonify(error="Leeg bestand."), 400

                  permit_number = request.form.get("permit_number", "").strip()
                  applicant_name = request.form.get("applicant_name", "").strip()

                  # Save record immediately so user sees it in the list
                  db = next(get_db())
                  permit = Permit(
                      permit_number=permit_number,
                      applicant_name=applicant_name,
                      source_file=file.filename,
                      status="processing",
                  )
                  db.add(permit)
                  db.commit()
                  db.refresh(permit)

                  # Build base64 data URI for the vision module
                  ext = _get_ext(file.filename)
                  mime_map = {
                      "jpg": "image/jpeg", "jpeg": "image/jpeg", "png": "image/png",
                      "gif": "image/gif", "bmp": "image/bmp", "tiff": "image/tiff",
                      "webp": "image/webp", "pdf": "application/pdf",
                  }
                  mime = mime_map.get(ext, "application/octet-stream")
                  b64 = base64.b64encode(file_bytes).decode("utf-8")
                  data_uri = f"data:{mime};base64,{b64}"

                  try:
                      # Step 1: OCR via druppie vision module
                      ocr_result = druppie.call("vision", "ocr", {
                          "image_source": data_uri,
                          "prompt": "Extraheer alle tekst uit dit vergunningdocument. Bewaar de structuur.",
                      })
                      extracted_text = ocr_result.get("text", "")

                      # Step 2: Classify permit type via druppie LLM module
                      classify_result = druppie.call("llm", "chat", {
                          "prompt": (
                              "Classificeer het type vergunning op basis van onderstaande tekst. "
                              "Antwoord met alleen het type, bijvoorbeeld: "
                              "watervergunning_lozing, watervergunning_onttrekking, "
                              "keurvergunning, omgevingsvergunning, lozingsvergunning, "
                              "onttrekkingsvergunning, of 'onbekend' als je het niet kunt bepalen.\n\n"
                              + extracted_text[:3000]
                          ),
                          "system": "Je bent een specialist in watervergunningen bij een Nederlands waterschap. Antwoord alleen met het type.",
                      })
                      permit_type = classify_result.get("answer", "onbekend").strip().lower()

                      permit.extracted_text = extracted_text
                      permit.permit_type = permit_type
                      permit.status = "processed"

                  except Exception as e:
                      logger.error("OCR/classification failed for permit %s: %s", permit.id, e)
                      permit.status = "error"
                      permit.error_message = str(e)[:500]
                      permit.extracted_text = f"Error: {e}"
                      permit.permit_type = "onbekend"

                  db.commit()
                  db.refresh(permit)

                  return jsonify(_permit_to_dict(permit))


              @api.route("/permits")
              def list_permits():
                  """List all permits, newest first."""
                  db = next(get_db())
                  permits = db.query(Permit).order_by(Permit.created_at.desc()).all()
                  return jsonify([_permit_summary(p) for p in permits])


              @api.route("/permits/<int:permit_id>")
              def get_permit(permit_id):
                  """Get full permit details including extracted text."""
                  db = next(get_db())
                  permit = db.query(Permit).filter(Permit.id == permit_id).first()
                  if not permit:
                      return jsonify(error="Vergunning niet gevonden"), 404
                  return jsonify(_permit_to_dict(permit))


              @api.route("/permits/<int:permit_id>", methods=["DELETE"])
              def delete_permit(permit_id):
                  """Delete a permit."""
                  db = next(get_db())
                  permit = db.query(Permit).filter(Permit.id == permit_id).first()
                  if not permit:
                      return jsonify(error="Vergunning niet gevonden"), 404
                  db.delete(permit)
                  db.commit()
                  return jsonify(ok=True)


              @api.route("/permits/search")
              def search_permits():
                  """Search permits by keyword across all text fields."""
                  q = request.args.get("q", "").strip()
                  db = next(get_db())
                  if q:
                      like = f"%{q}%"
                      results = db.query(Permit).filter(
                          Permit.permit_number.ilike(like)
                          | Permit.applicant_name.ilike(like)
                          | Permit.permit_type.ilike(like)
                          | Permit.extracted_text.ilike(like)
                      ).order_by(Permit.created_at.desc()).all()
                  else:
                      results = db.query(Permit).order_by(Permit.created_at.desc()).all()
                  return jsonify([_permit_summary(p) for p in results])


              def _permit_summary(p):
                  return {
                      "id": p.id,
                      "permit_number": p.permit_number,
                      "applicant_name": p.applicant_name,
                      "permit_type": p.permit_type,
                      "source_file": p.source_file,
                      "status": p.status,
                      "upload_date": p.upload_date.isoformat() if p.upload_date else None,
                  }


              def _permit_to_dict(p):
                  return {
                      **_permit_summary(p),
                      "extracted_text": p.extracted_text,
                      "error_message": p.error_message,
                  }

          - path: frontend/src/App.tsx
            content: |
              import { useState, useEffect, useRef, useCallback } from "react"
              import { Button } from "@/components/ui/button"
              import { Card, CardContent, CardHeader, CardTitle, CardDescription } from "@/components/ui/card"
              import { Input } from "@/components/ui/input"

              interface PermitSummary {
                id: number
                permit_number: string
                applicant_name: string
                permit_type: string
                source_file: string
                status: string
                upload_date: string
              }

              interface PermitDetail extends PermitSummary {
                extracted_text: string | null
                error_message: string | null
              }

              const STATUS_LABELS: Record<string, { label: string; color: string }> = {
                processing: { label: "Verwerken...", color: "text-blue-600 bg-blue-50 border-blue-200" },
                processed: { label: "Verwerkt", color: "text-green-700 bg-green-50 border-green-200" },
                error: { label: "Fout", color: "text-red-700 bg-red-50 border-red-200" },
              }

              function App() {
                const [permits, setPermits] = useState<PermitSummary[]>([])
                const [searchQuery, setSearchQuery] = useState("")
                const [permitNumber, setPermitNumber] = useState("")
                const [applicantName, setApplicantName] = useState("")
                const [selectedFile, setSelectedFile] = useState<File | null>(null)
                const [uploading, setUploading] = useState(false)
                const [uploadError, setUploadError] = useState<string | null>(null)
                const [detail, setDetail] = useState<PermitDetail | null>(null)
                const [dragActive, setDragActive] = useState(false)
                const [loading, setLoading] = useState(true)
                const fileInputRef = useRef<HTMLInputElement>(null)

                const loadPermits = useCallback(async (query = "") => {
                  try {
                    const url = query
                      ? `/api/permits/search?q=${encodeURIComponent(query)}`
                      : "/api/permits"
                    const res = await fetch(url)
                    if (res.ok) setPermits(await res.json())
                  } finally {
                    setLoading(false)
                  }
                }, [])

                useEffect(() => { loadPermits() }, [loadPermits])

                // Poll for processing permits
                useEffect(() => {
                  const hasProcessing = permits.some(p => p.status === "processing")
                  if (!hasProcessing) return
                  const id = setInterval(() => loadPermits(searchQuery), 3000)
                  return () => clearInterval(id)
                }, [permits, searchQuery, loadPermits])

                const handleUpload = async () => {
                  if (!selectedFile) return
                  setUploading(true)
                  setUploadError(null)
                  try {
                    const formData = new FormData()
                    formData.append("file", selectedFile)
                    if (permitNumber) formData.append("permit_number", permitNumber)
                    if (applicantName) formData.append("applicant_name", applicantName)

                    const res = await fetch("/api/permits/upload", { method: "POST", body: formData })
                    const data = await res.json()
                    if (!res.ok) {
                      setUploadError(data.error || "Upload mislukt")
                      return
                    }
                    setSelectedFile(null)
                    setPermitNumber("")
                    setApplicantName("")
                    if (fileInputRef.current) fileInputRef.current.value = ""
                    loadPermits(searchQuery)
                  } catch {
                    setUploadError("Verbindingsfout bij uploaden")
                  } finally {
                    setUploading(false)
                  }
                }

                const handleDrop = (e: React.DragEvent) => {
                  e.preventDefault()
                  setDragActive(false)
                  const file = e.dataTransfer.files?.[0]
                  if (file) setSelectedFile(file)
                }

                const openDetail = async (id: number) => {
                  const res = await fetch(`/api/permits/${id}`)
                  if (res.ok) setDetail(await res.json())
                }

                const deletePermit = async (id: number) => {
                  if (!confirm("Weet u zeker dat u deze vergunning wilt verwijderen?")) return
                  await fetch(`/api/permits/${id}`, { method: "DELETE" })
                  setDetail(null)
                  loadPermits(searchQuery)
                }

                const handleSearch = () => { setLoading(true); loadPermits(searchQuery) }
                const clearSearch = () => { setSearchQuery(""); setLoading(true); loadPermits() }

                const formatDate = (iso: string) => {
                  try { return new Date(iso).toLocaleString("nl-NL", { dateStyle: "long", timeStyle: "short" }) }
                  catch { return iso }
                }

                return (
                  <div className="min-h-screen bg-background">
                    <header className="border-b bg-card">
                      <div className="container mx-auto flex h-16 items-center justify-between px-4">
                        <h1 className="text-xl font-bold">Vergunningzoeker</h1>
                        <span className="text-xs text-muted-foreground">{permits.length} vergunning{permits.length !== 1 ? "en" : ""}</span>
                      </div>
                    </header>

                    <main className="container mx-auto px-4 py-6 max-w-4xl space-y-6">
                      {/* Upload section */}
                      <Card>
                        <CardHeader>
                          <CardTitle>Document uploaden</CardTitle>
                          <CardDescription>Upload een scan, foto of PDF van een vergunningdocument. Het systeem extraheert automatisch de tekst (OCR) en classificeert het type vergunning.</CardDescription>
                        </CardHeader>
                        <CardContent className="space-y-3">
                          <div
                            className={`border-2 border-dashed rounded-lg p-6 text-center cursor-pointer transition-all ${
                              dragActive ? "border-primary bg-primary/5 scale-[1.01]"
                              : selectedFile ? "border-primary/50 bg-primary/5"
                              : "border-muted-foreground/25 hover:border-primary/50"
                            }`}
                            onDragOver={e => { e.preventDefault(); setDragActive(true) }}
                            onDragLeave={() => setDragActive(false)}
                            onDrop={handleDrop}
                            onClick={() => !uploading && fileInputRef.current?.click()}
                          >
                            <input ref={fileInputRef} type="file" accept="image/*,.pdf" className="hidden"
                              onChange={e => { if (e.target.files?.[0]) setSelectedFile(e.target.files[0]) }} />
                            {selectedFile ? (
                              <div>
                                <p className="font-medium">{selectedFile.name}</p>
                                <p className="text-sm text-muted-foreground">{(selectedFile.size / 1024).toFixed(0)} KB — klik om te wijzigen</p>
                              </div>
                            ) : (
                              <div>
                                <p className="font-medium text-muted-foreground">Sleep een bestand hierheen of klik om te selecteren</p>
                                <p className="text-xs text-muted-foreground mt-1">JPG, PNG of PDF — maximaal 25 MB</p>
                              </div>
                            )}
                          </div>

                          <div className="grid grid-cols-2 gap-2">
                            <Input value={permitNumber} onChange={e => setPermitNumber(e.target.value)} placeholder="Vergunningnummer (optioneel)" disabled={uploading} />
                            <Input value={applicantName} onChange={e => setApplicantName(e.target.value)} placeholder="Aanvrager (optioneel)" disabled={uploading} />
                          </div>

                          <Button onClick={handleUpload} disabled={uploading || !selectedFile} className="w-full">
                            {uploading ? "Bezig met OCR en classificatie — dit duurt even..." : "Upload & Analyseer"}
                          </Button>

                          {uploadError && (
                            <div className="text-sm text-destructive bg-destructive/10 border border-destructive/20 rounded-md p-3">{uploadError}</div>
                          )}
                        </CardContent>
                      </Card>

                      {/* Search section */}
                      <Card>
                        <CardContent className="pt-6">
                          <div className="flex gap-2">
                            <Input value={searchQuery}
                              onChange={e => setSearchQuery(e.target.value)}
                              onKeyDown={e => e.key === "Enter" && handleSearch()}
                              placeholder="Zoek op nummer, aanvrager, type of tekst..." />
                            <Button onClick={handleSearch}>Zoek</Button>
                            {searchQuery && <Button variant="outline" onClick={clearSearch}>Wis</Button>}
                          </div>
                        </CardContent>
                      </Card>

                      {/* Permits list */}
                      <Card>
                        <CardHeader>
                          <CardTitle>Vergunningen</CardTitle>
                        </CardHeader>
                        <CardContent>
                          {loading ? (
                            <p className="text-muted-foreground text-center py-4">Laden...</p>
                          ) : permits.length === 0 ? (
                            <p className="text-muted-foreground text-center py-4">
                              {searchQuery ? "Geen resultaten gevonden." : "Nog geen vergunningen geüpload."}
                            </p>
                          ) : (
                            <div className="divide-y">
                              {permits.map(p => {
                                const st = STATUS_LABELS[p.status] || STATUS_LABELS.processed
                                return (
                                  <div key={p.id}
                                    className="flex items-center gap-3 py-3 cursor-pointer hover:bg-muted/50 -mx-2 px-2 rounded transition-colors"
                                    onClick={() => openDetail(p.id)}>
                                    <div className="flex-1 min-w-0">
                                      <div className="flex items-center gap-2">
                                        <span className="font-medium truncate">{p.permit_number || p.source_file}</span>
                                        <span className={`text-xs px-1.5 py-0.5 rounded border ${st.color}`}>{st.label}</span>
                                      </div>
                                      <div className="text-sm text-muted-foreground flex gap-3 mt-0.5">
                                        {p.applicant_name && <span>{p.applicant_name}</span>}
                                        <span>{p.source_file}</span>
                                      </div>
                                    </div>
                                    <div className="text-right shrink-0">
                                      {p.permit_type && p.permit_type !== "onbekend" && (
                                        <div className="text-xs font-medium text-primary">{p.permit_type.replace(/_/g, " ")}</div>
                                      )}
                                      <div className="text-xs text-muted-foreground">{formatDate(p.upload_date)}</div>
                                    </div>
                                  </div>
                                )
                              })}
                            </div>
                          )}
                        </CardContent>
                      </Card>

                      {/* Detail modal */}
                      {detail && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4" onClick={() => setDetail(null)}>
                          <Card className="w-full max-w-3xl max-h-[85vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
                            <CardHeader>
                              <div className="flex items-center justify-between">
                                <CardTitle>{detail.permit_number || detail.source_file}</CardTitle>
                                <div className="flex gap-2">
                                  <Button variant="destructive" size="sm" onClick={() => deletePermit(detail.id)}>Verwijderen</Button>
                                  <Button variant="outline" size="sm" onClick={() => setDetail(null)}>Sluiten</Button>
                                </div>
                              </div>
                            </CardHeader>
                            <CardContent className="space-y-4">
                              <div className="grid grid-cols-2 gap-4">
                                <div>
                                  <p className="text-xs text-muted-foreground uppercase font-medium">Aanvrager</p>
                                  <p>{detail.applicant_name || "Niet opgegeven"}</p>
                                </div>
                                <div>
                                  <p className="text-xs text-muted-foreground uppercase font-medium">Type (AI)</p>
                                  <p>{detail.permit_type ? detail.permit_type.replace(/_/g, " ") : "Onbekend"}</p>
                                </div>
                                <div>
                                  <p className="text-xs text-muted-foreground uppercase font-medium">Bronbestand</p>
                                  <p>{detail.source_file}</p>
                                </div>
                                <div>
                                  <p className="text-xs text-muted-foreground uppercase font-medium">Upload datum</p>
                                  <p>{formatDate(detail.upload_date)}</p>
                                </div>
                              </div>

                              {detail.error_message && (
                                <div className="text-sm text-destructive bg-destructive/10 border border-destructive/20 rounded-md p-3">
                                  <p className="font-medium">Verwerkingsfout</p>
                                  <p>{detail.error_message}</p>
                                </div>
                              )}

                              {detail.extracted_text && !detail.extracted_text.startsWith("Error:") && (
                                <div>
                                  <p className="text-xs text-muted-foreground uppercase font-medium mb-2">Geëxtraheerde tekst (OCR)</p>
                                  <pre className="p-4 bg-muted rounded-lg text-sm whitespace-pre-wrap max-h-96 overflow-y-auto leading-relaxed">{detail.extracted_text}</pre>
                                </div>
                              )}
                            </CardContent>
                          </Card>
                        </div>
                      )}
                    </main>
                  </div>
                )
              }

              export default App

    - agent: builder
      tool: builtin:done
      arguments:
        summary: "Agent builder: BUILD_COMPLETE. Implemented vergunningzoeker with Druppie SDK — vision/ocr for document scanning, llm/chat for permit classification, PostgreSQL for storage."

    # =========================================================================
    # Planner → Test Executor
    # =========================================================================
    - agent: planner
      tool: builtin:make_plan
      arguments:
        steps:
          - agent_id: test_executor
            prompt: "Run all tests"
          - agent_id: planner
            prompt: "Re-evaluate after test_executor completes"

    - agent: planner
      tool: builtin:done
      arguments:
        summary: "Agent planner: Planned test_executor"

    # =========================================================================
    # Test Executor (mocked — tests pass)
    # =========================================================================
    - agent: test_executor
      tool: coding:run_tests
      mock: true
      mock_result: '{"success": true, "output": "3 passed, 0 failed", "exit_code": 0}'

    - agent: test_executor
      tool: coding:get_coverage_report
      mock: true
      mock_result: '{"coverage": 78, "lines_covered": 62, "lines_total": 80}'

    - agent: test_executor
      tool: builtin:test_report
      mock: true
      mock_result: '{"status": "ok"}'
      arguments:
        total: 3
        passed: 3
        failed: 0
        coverage: 78
        summary: "All 3 tests passed with 78% coverage"

    - agent: test_executor
      tool: builtin:done
      arguments:
        summary: "Agent test_executor: TEST RESULT: PASS — 3/3 tests passed, 78% coverage."

    # =========================================================================
    # Planner → Deployer
    # =========================================================================
    - agent: planner
      tool: builtin:make_plan
      arguments:
        steps:
          - agent_id: deployer
            prompt: "Deploy the vergunningzoeker from main branch"
          - agent_id: planner
            prompt: "Re-evaluate after deployer completes"

    - agent: planner
      tool: builtin:done
      arguments:
        summary: "Agent planner: Tests passed, planned deployer"

    # =========================================================================
    # Deployer (REAL — actually deploys the app)
    # =========================================================================
    - agent: deployer
      tool: docker:list_containers

    - agent: deployer
      tool: docker:compose_up
      approval:
        status: approved
        by: developer
      arguments:
        compose_project_name: vergunningzoeker
        branch: main
      assert:
        result:
          - not_empty
          - { contains: "success" }

    - agent: deployer
      tool: builtin:done
      arguments:
        summary: "Agent deployer: Deployed vergunningzoeker from main."

    # =========================================================================
    # Planner → Summarizer
    # =========================================================================
    - agent: planner
      tool: builtin:make_plan
      arguments:
        steps:
          - agent_id: summarizer
            prompt: "Summarize what was accomplished"

    - agent: planner
      tool: builtin:done
      arguments:
        summary: "Agent planner: Planned summarizer"

    # =========================================================================
    # Summarizer
    # =========================================================================
    - agent: summarizer
      tool: builtin:create_message
      arguments:
        content: |
          De vergunningzoeker is gebouwd en gedeployed!

          **Functies:**
          - Upload vergunningdocumenten (scan/foto) — OCR via Druppie module-vision
          - Automatische classificatie van vergunningtype via Druppie module-llm
          - Zoeken op vergunningnummer, aanvrager, type
          - Detail weergave met geëxtraheerde tekst

          **Techniek:** Flask + React, AI via Druppie SDK (geen hardcoded API keys)

          De app is nu actief. Controleer de deployer tool call voor de URL.

    - agent: summarizer
      tool: builtin:done
      arguments:
        summary: "Agent summarizer: Presented completion summary to user."
      assert:
        completed: true

  # Verify side-effects in Gitea
  verify:
    - gitea_repo_exists: true
    - file_exists: docs/functional-design.md
    - file_exists: docs/technical-design.md
    - file_exists: docs/builder-plan.md
    - file_not_empty: docs/functional-design.md
    - file_not_empty: docs/technical-design.md
    - file_not_empty: docs/builder-plan.md
    # Verify TD mentions Druppie modules
    - file_contains:
        path: docs/technical-design.md
        content: "druppie_sdk"
    - file_contains:
        path: docs/technical-design.md
        content: "vision"
    # Verify builder plan includes module integration
    - file_contains:
        path: docs/builder-plan.md
        content: "Module Integration"
    - file_contains:
        path: docs/builder-plan.md
        content: "vision/ocr"
