## End-to-end: create vergunningzoeker app with REAL deploy
## Extends setup-vergunningzoeker-with-fd (BA completed with FD).
## Adds: architect (TD) → build_classifier → builder_planner → test_builder
##   → builder (real code with druppie SDK for OCR + LLM) → test_executor
##   → deployer (REAL) → summarizer
##
## Tests that the full pipeline produces a working app that uses
## druppie.call("vision", "ocr", ...) and druppie.call("llm", "chat", ...)

tool-test:
  name: create-vergunningzoeker
  description: "Full vergunningzoeker pipeline with real deploy — tests SDK module integration"
  tags: [e2e, create-project, sdk, real-deploy, vergunningzoeker]
  extends: setup-vergunningzoeker-with-fd

  chain:
    # =========================================================================
    # Planner → Architect
    # =========================================================================
    - agent: planner
      tool: builtin:make_plan
      arguments:
        steps:
          - agent_id: architect
            prompt: "Create technical design for the vergunningzoeker"
          - agent_id: planner
            prompt: "Re-evaluate after architect completes"

    - agent: planner
      tool: builtin:done
      arguments:
        summary: "Agent planner: BA approved, planned architect"

    # =========================================================================
    # Architect — writes simple TD with OCR + LLM modules
    # =========================================================================
    - agent: architect
      tool: coding:run_git
      arguments:
        command: "pull"

    - agent: architect
      tool: coding:read_file
      arguments:
        path: docs/functional-design.md

    - agent: architect
      tool: coding:make_design
      approval:
        status: approved
        by: architect
      arguments:
        path: docs/technical-design.md
        content: |
          # Technisch Ontwerp: Vergunningzoeker

          ## Stack
          - Backend: Python Flask (project template)
          - Frontend: React met Vite
          - Database: PostgreSQL
          - AI: Druppie platform modules via SDK

          ## Druppie Modules
          De app gebruikt de Druppie SDK (`druppie_sdk`) om platformmodules aan te roepen.
          Geen directe API-keys of externe provider-calls in de app.

          | Module | Tool | Gebruik |
          |--------|------|---------|
          | vision | ocr | Tekst extraheren uit gescande vergunningdocumenten (PDF/afbeelding) |
          | llm | chat | Classificatie van vergunningtype op basis van geëxtraheerde tekst |

          Gebruik:
          ```python
          from druppie_sdk import DruppieClient
          druppie = DruppieClient()

          # OCR op geüpload document
          ocr_result = druppie.call("vision", "ocr", {"image_url": image_url})
          extracted_text = ocr_result["text"]

          # Classificatie van vergunningtype
          classify_result = druppie.call("llm", "chat", {
              "prompt": f"Classificeer dit vergunningdocument...\n\n{extracted_text}",
              "system": "Je bent een specialist in watervergunningen."
          })
          ```

          ## Componenten
          - UploadHandler: verwerkt document uploads, slaat op in DB
          - OCRProcessor: roept druppie vision/ocr aan voor tekstextractie
          - Classifier: roept druppie llm/chat aan voor classificatie
          - PermitStore: PostgreSQL repository voor vergunningmetadata
          - SearchHandler: zoekt in opgeslagen metadata

          ## Datamodel
          ```
          Permit:
            id: UUID (PK)
            permit_number: String
            applicant_name: String
            permit_type: String (geclassificeerd door LLM)
            extracted_text: Text (OCR output)
            source_file: String (bestandsnaam)
            upload_date: DateTime
            created_at: DateTime
          ```

          ## API Endpoints
          - POST /api/permits/upload — upload document, start OCR + classificatie
          - GET /api/permits — lijst van alle vergunningen met metadata
          - GET /api/permits/:id — details van een vergunning
          - GET /api/permits/search?q=term — zoek in metadata

          ## Belangrijk
          - GEEN hardcoded API keys in de app
          - GEEN openai package — gebruik druppie_sdk
          - DRUPPIE_URL wordt automatisch geïnjecteerd bij deploy

    - agent: architect
      tool: coding:run_git
      arguments:
        command: "add docs/technical-design.md"

    - agent: architect
      tool: coding:run_git
      arguments:
        command: "commit -m 'Technisch ontwerp vergunningzoeker met Druppie SDK'"

    - agent: architect
      tool: coding:run_git
      arguments:
        command: "push"

    - agent: architect
      tool: builtin:done
      arguments:
        summary: "Agent architect: DESIGN_APPROVED. Wrote technical_design.md with Flask + React stack, Druppie SDK for vision/ocr and llm/chat, PostgreSQL for permit storage."
        next_agent: build_classifier

    # =========================================================================
    # Build Classifier
    # =========================================================================
    - agent: build_classifier
      tool: coding:read_file
      arguments:
        path: docs/technical-design.md

    - agent: build_classifier
      tool: builtin:done
      arguments:
        summary: "Agent build_classifier: BUILD_PATH=STANDALONE. Standard project — uses druppie SDK modules (vision/ocr, llm/chat) but no core changes needed."

    # =========================================================================
    # Planner → Builder Planner
    # =========================================================================
    - agent: planner
      tool: builtin:make_plan
      arguments:
        steps:
          - agent_id: builder_planner
            prompt: "Create builder plan for the vergunningzoeker"
          - agent_id: planner
            prompt: "Re-evaluate after builder_planner completes"

    - agent: planner
      tool: builtin:done
      arguments:
        summary: "Agent planner: Build classifier routed to standalone, planned builder_planner"

    # =========================================================================
    # Builder Planner
    # =========================================================================
    - agent: builder_planner
      tool: coding:run_git
      arguments:
        command: "pull"

    - agent: builder_planner
      tool: coding:read_file
      arguments:
        path: docs/functional-design.md

    - agent: builder_planner
      tool: coding:read_file
      arguments:
        path: docs/technical-design.md

    - agent: builder_planner
      tool: coding:write_file
      arguments:
        path: docs/builder-plan.md
        content: |
          # Builder Plan: Vergunningzoeker

          ## Solution Strategy
          Flask backend met React frontend. OCR en classificatie via Druppie SDK.

          ## Module Integration
          - **SDK**: `druppie_sdk` is pre-installed (pip package)
          - **Usage**: `from druppie_sdk import DruppieClient; druppie = DruppieClient()`
          - **Modules Used**:
            - `vision/ocr` — tekst extraheren uit gescande vergunningdocumenten
            - `llm/chat` — classificatie van vergunningtype op basis van geëxtraheerde tekst
          - **Example Calls**:
            ```python
            ocr_result = druppie.call("vision", "ocr", {"image_url": url})
            classify_result = druppie.call("llm", "chat", {"prompt": text, "system": "Classificeer dit document"})
            ```
          - **No API Keys**: app gebruikt GEEN hardcoded API keys
          - **No openai package**: gebruik druppie.call() via SDK

          ## Code Standards
          - Python 3.11, Flask
          - ESM imports, React functional components
