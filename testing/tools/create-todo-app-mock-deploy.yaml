## End-to-end: create a to-do app (mock deploy)
## Extends setup-todo-app-pipeline. Builder drives full TDD cycle via OpenCode
## (druppie-test-writer → druppie-implementer → druppie-test-runner, all mocked),
## then mocked deployer + summarizer.

tool-test:
  name: create-todo-app-mock-deploy
  description: "Full pipeline with mocked deploy"
  tags: [e2e, create-project, mock-deploy]
  extends: setup-todo-app-pipeline

  chain:
    # --- Builder drives the full TDD cycle (3 execute_coding_task calls, all mocked) ---

    # STEP 1: druppie-test-writer (Red phase)
    - agent: builder
      tool: coding:execute_coding_task
      arguments:
        task: "TDD Red Phase. Read functional_design.md, technical_design.md, and builder_plan.md. Set up vitest and write tests covering todo add/toggle/delete/filter behavior. Commit and push."
        agent: druppie-test-writer
      mock: true
      mock_result: |
        ---SUMMARY---
        Framework: vitest
        Test files created: src/__tests__/App.test.jsx
        Test count: 4
        Config files added: vitest.config.js
        Coverage tool: @vitest/coverage-v8
        Git: pushed to main
        ---END SUMMARY---

    # STEP 2: druppie-implementer (Green phase)
    - agent: builder
      tool: coding:execute_coding_task
      arguments:
        task: "TDD Green Phase (initial). Implement the todo app to pass the tests. Preserve /health endpoint. Commit and push."
        agent: druppie-implementer
      mock: true
      mock_result: |
        ---SUMMARY---
        Strategy: INITIAL
        Files created: src/App.jsx, src/index.css
        Files modified: none
        Local test run: 4/4 passed
        Key decisions: Used useState + useEffect for localStorage persistence, component split into TodoInput/TodoList/FilterBar
        Git: pushed to main
        ---END SUMMARY---
      outcome:
        files:
          - path: src/App.jsx
            content: |
              import React, { useState, useEffect } from 'react';
              import TodoInput from './components/TodoInput';
              import TodoList from './components/TodoList';
              import FilterBar from './components/FilterBar';

              export default function App() {
                const [todos, setTodos] = useState(() => {
                  const saved = localStorage.getItem('todos');
                  return saved ? JSON.parse(saved) : [];
                });
                const [filter, setFilter] = useState('all');

                useEffect(() => {
                  localStorage.setItem('todos', JSON.stringify(todos));
                }, [todos]);

                const addTodo = (title) => {
                  setTodos([...todos, { id: Date.now().toString(), title, completed: false }]);
                };
                const toggleTodo = (id) => {
                  setTodos(todos.map(t => t.id === id ? { ...t, completed: !t.completed } : t));
                };
                const deleteTodo = (id) => {
                  setTodos(todos.filter(t => t.id !== id));
                };
                const filtered = todos.filter(t => {
                  if (filter === 'active') return !t.completed;
                  if (filter === 'completed') return t.completed;
                  return true;
                });

                return (
                  <div className="app">
                    <h1>Todo App</h1>
                    <TodoInput onAdd={addTodo} />
                    <FilterBar filter={filter} onFilterChange={setFilter} />
                    <TodoList todos={filtered} onToggle={toggleTodo} onDelete={deleteTodo} />
                  </div>
                );
              }
          - path: src/index.css
            content: |
              body { font-family: system-ui; max-width: 600px; margin: 0 auto; padding: 2rem; }
              .app h1 { margin-bottom: 1rem; }

    # STEP 3: druppie-test-runner (Verify)
    - agent: builder
      tool: coding:execute_coding_task
      arguments:
        task: "Run the full test suite with coverage and report a structured ---VERDICT--- block."
        agent: druppie-test-runner
      mock: true
      mock_result: |
        ---VERDICT---
        RESULT: PASS
        Framework: vitest
        Tests: 4/4 passed
        Coverage: 87%
        ---END VERDICT---

    - agent: builder
      tool: builtin:done
      arguments:
        summary: "Agent builder: TDD_PASSED — Wrote 4 tests, implementation committed, 4/4 tests passed (coverage: 87%). Attempts used: 1 of 3."

    # --- Planner → deployer (no test_executor in the new flow) ---
    - agent: planner
      tool: builtin:make_plan
      arguments:
        steps:
          - agent_id: deployer
            prompt: "Deploy the todo app from main branch"
          - agent_id: planner
            prompt: "Re-evaluate after deployer completes"

    - agent: planner
      tool: builtin:done
      arguments:
        summary: "Agent planner: TDD_PASSED, planned deployer"

    # --- Deployer (mocked) ---
    - agent: deployer
      tool: docker:list_containers
      mock: true
      mock_result: '{"containers": []}'

    - agent: deployer
      tool: docker:compose_up
      mock: true
      mock_result: '{"success": true, "containers": ["todo-app-1"], "url": "http://localhost:9101", "compose_project_name": "todo-app"}'
      arguments:
        compose_project_name: todo-app
        branch: main

    - agent: deployer
      tool: builtin:done
      arguments:
        summary: "Agent deployer: Deployed todo-app from main at http://localhost:9101 (container: todo-app-1)."

    # --- Planner (after deployer → summarizer) ---
    - agent: planner
      tool: builtin:make_plan
      arguments:
        steps:
          - agent_id: summarizer
            prompt: "Summarize what was accomplished for the user"

    - agent: planner
      tool: builtin:done
      arguments:
        summary: "Agent planner: Planned summarizer"

    # --- Summarizer ---
    - agent: summarizer
      tool: builtin:create_message
      arguments:
        content: |
          Your todo app has been built and deployed!

          **What was created:**
          - React app with add, complete, delete, and filter functionality
          - localStorage persistence
          - 4 tests, all passing (87% coverage)

          **Deployed at:** http://localhost:9101

    - agent: summarizer
      tool: builtin:done
      arguments:
        summary: "Agent summarizer: Presented completion summary to user."
      assert:
        completed: true

  # Verify side-effects in Gitea
  verify:
    - gitea_repo_exists: true
    - file_exists: docs/functional-design.md
    - file_exists: docs/technical-design.md
    - file_exists: docs/builder-plan.md
    - file_not_empty: docs/functional-design.md
    - file_not_empty: docs/technical-design.md
