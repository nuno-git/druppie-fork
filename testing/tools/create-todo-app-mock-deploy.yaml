## End-to-end: create a to-do app (mock deploy)
## Extends setup-todo-app-pipeline, adds: builder (mock) + test_executor + deployer (mock) + summarizer

tool-test:
  name: create-todo-app-mock-deploy
  description: "Full pipeline with mocked deploy"
  tags: [e2e, create-project, mock-deploy]
  extends: setup-todo-app-pipeline

  chain:
    # --- Builder (mocked — no sandbox) ---
    - agent: builder
      tool: coding:execute_coding_task
      arguments:
        task: "Build the todo app to pass the tests"
      mock: true
      mock_result: "All files created successfully"
      outcome:
        files:
          - path: src/App.jsx
            content: |
              import React, { useState, useEffect } from 'react';
              import TodoInput from './components/TodoInput';
              import TodoList from './components/TodoList';
              import FilterBar from './components/FilterBar';

              export default function App() {
                const [todos, setTodos] = useState(() => {
                  const saved = localStorage.getItem('todos');
                  return saved ? JSON.parse(saved) : [];
                });
                const [filter, setFilter] = useState('all');

                useEffect(() => {
                  localStorage.setItem('todos', JSON.stringify(todos));
                }, [todos]);

                const addTodo = (title) => {
                  setTodos([...todos, { id: Date.now().toString(), title, completed: false }]);
                };
                const toggleTodo = (id) => {
                  setTodos(todos.map(t => t.id === id ? { ...t, completed: !t.completed } : t));
                };
                const deleteTodo = (id) => {
                  setTodos(todos.filter(t => t.id !== id));
                };
                const filtered = todos.filter(t => {
                  if (filter === 'active') return !t.completed;
                  if (filter === 'completed') return t.completed;
                  return true;
                });

                return (
                  <div className="app">
                    <h1>Todo App</h1>
                    <TodoInput onAdd={addTodo} />
                    <FilterBar filter={filter} onFilterChange={setFilter} />
                    <TodoList todos={filtered} onToggle={toggleTodo} onDelete={deleteTodo} />
                  </div>
                );
              }
          - path: src/index.css
            content: |
              body { font-family: system-ui; max-width: 600px; margin: 0 auto; padding: 2rem; }
              .app h1 { margin-bottom: 1rem; }

    - agent: builder
      tool: builtin:done
      arguments:
        summary: "Agent builder: Implemented todo app with 5 components on branch main."

    # --- Planner (after builder → test_executor) ---
    - agent: planner
      tool: builtin:make_plan
      arguments:
        steps:
          - agent_id: test_executor
            prompt: "Run all tests with coverage"
          - agent_id: planner
            prompt: "Re-evaluate after test_executor completes"

    - agent: planner
      tool: builtin:done
      arguments:
        summary: "Agent planner: Planned test_executor"

    # --- Test Executor (mocked — no real tests to run) ---
    - agent: test_executor
      tool: coding:run_tests
      mock: true
      mock_result: '{"success": true, "output": "4 passed, 0 failed", "exit_code": 0}'

    - agent: test_executor
      tool: coding:get_coverage_report
      mock: true
      mock_result: '{"coverage": 87, "lines_covered": 174, "lines_total": 200}'

    - agent: test_executor
      tool: builtin:test_report
      mock: true
      mock_result: '{"status": "ok"}'
      arguments:
        total: 4
        passed: 4
        failed: 0
        coverage: 87
        summary: "Agent test_executor: All 4 tests passed with 87% coverage"

    - agent: test_executor
      tool: builtin:done
      arguments:
        summary: "Agent test_executor: TEST RESULT: PASS — 4/4 tests passed, 87% coverage."

    # --- Planner (after test_executor → deployer) ---
    - agent: planner
      tool: builtin:make_plan
      arguments:
        steps:
          - agent_id: deployer
            prompt: "Deploy the todo app from main branch"
          - agent_id: planner
            prompt: "Re-evaluate after deployer completes"

    - agent: planner
      tool: builtin:done
      arguments:
        summary: "Agent planner: Tests passed, planned deployer"

    # --- Deployer (mocked) ---
    - agent: deployer
      tool: docker:list_containers
      mock: true
      mock_result: '{"containers": []}'

    - agent: deployer
      tool: docker:compose_up
      mock: true
      mock_result: '{"success": true, "containers": ["todo-app-1"], "url": "http://localhost:9101", "compose_project_name": "todo-app"}'
      arguments:
        compose_project_name: todo-app
        branch: main

    - agent: deployer
      tool: builtin:done
      arguments:
        summary: "Agent deployer: Deployed todo-app from main at http://localhost:9101 (container: todo-app-1)."

    # --- Planner (after deployer → summarizer) ---
    - agent: planner
      tool: builtin:make_plan
      arguments:
        steps:
          - agent_id: summarizer
            prompt: "Summarize what was accomplished for the user"

    - agent: planner
      tool: builtin:done
      arguments:
        summary: "Agent planner: Planned summarizer"

    # --- Summarizer ---
    - agent: summarizer
      tool: builtin:create_message
      arguments:
        content: |
          Your todo app has been built and deployed!

          **What was created:**
          - React app with add, complete, delete, and filter functionality
          - localStorage persistence
          - 4 tests, all passing (87% coverage)

          **Deployed at:** http://localhost:9101

    - agent: summarizer
      tool: builtin:done
      arguments:
        summary: "Agent summarizer: Presented completion summary to user."
      assert:
        completed: true

  # Verify side-effects in Gitea
  verify:
    - gitea_repo_exists: true
    - file_exists: docs/functional-design.md
    - file_exists: docs/technical-design.md
    - file_exists: docs/builder-plan.md
    - file_not_empty: docs/functional-design.md
    - file_not_empty: docs/technical-design.md
