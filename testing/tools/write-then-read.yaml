tool-test:
  name: write-then-read
  description: Create a file via execute_coding_task (mocked), then read it back for real
  tags: [coding, integration]

  chain:
    - agent: router
      tool: builtin:set_intent
      arguments:
        intent: create_project
        project_name: test-write-read
      status: completed

    - agent: router
      tool: builtin:done
      arguments:
        summary: "Created project test-write-read"
      status: completed

    - agent: architect
      tool: coding:execute_coding_task
      arguments:
        task: "Create a hello.txt file with 'Hello World' content"
      status: completed
      mock: true
      mock_result: '{"status": "ok", "message": "File created"}'
      outcome:
        target: gitea
        files:
          - path: hello.txt
            content: "Hello World"

    - agent: architect
      tool: coding:read_file
      arguments:
        path: "hello.txt"
      status: completed
      assert:
        completed: true
        result:
          - not_empty
          - { contains: "Hello World" }

    - agent: architect
      tool: builtin:done
      arguments:
        summary: "Read file successfully"
      status: completed
