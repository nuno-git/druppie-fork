## End-to-end: create a recipe analyzer app with Druppie SDK
## Extends setup-sdk-recipe-app. Builder drives the full TDD cycle via OpenCode:
##   druppie-test-writer → druppie-implementer → druppie-test-runner (all mocked),
##   then signals TDD_PASSED. Planner goes straight to deployer (mocked).
##
## Validates that the full pipeline produces an app that:
## - Uses druppie_sdk (not openai or hardcoded keys)
## - Has proper module integration in the builder plan
## - TD mentions Druppie modules

tool-test:
  name: create-sdk-recipe-app
  description: "Full pipeline for SDK-aware app (mocked builder + deploy)"
  tags: [e2e, create-project, sdk, mock-deploy]
  extends: setup-sdk-recipe-app

  chain:
    # --- Builder drives the full TDD cycle via OpenCode (all three calls mocked) ---

    # STEP 1: druppie-test-writer (Red phase)
    - agent: builder
      tool: coding:execute_coding_task
      arguments:
        task: "TDD Red Phase. Read functional_design.md, technical_design.md, and builder_plan.md. Set up pytest and write comprehensive tests covering the recipe analyzer endpoints. Commit and push."
        agent: druppie-test-writer
      mock: true
      mock_result: |
        ---SUMMARY---
        Framework: pytest
        Test files created: tests/test_routes.py
        Test count: 2
        Config files added: pytest.ini, requirements.txt (pytest, pytest-cov)
        Coverage tool: pytest-cov
        Git: pushed to main
        ---END SUMMARY---

    # STEP 2: druppie-implementer (Green phase)
    - agent: builder
      tool: coding:execute_coding_task
      arguments:
        task: "TDD Green Phase (initial). Implement the recipe analyzer to pass the tests, using Druppie SDK for LLM and vision. Preserve /health endpoint. Commit and push."
        agent: druppie-implementer
      mock: true
      mock_result: |
        ---SUMMARY---
        Strategy: INITIAL
        Files created: app/routes.py
        Files modified: requirements.txt
        Local test run: 2/2 passed
        Key decisions: Used druppie.call("llm", "vision", ...) for OCR, druppie.call("llm", "chat", ...) for analysis
        Git: pushed to main
        ---END SUMMARY---
      outcome:
        files:
          - path: app/routes.py
            content: |
              from flask import Blueprint, jsonify, request
              from druppie_sdk import DruppieClient

              api = Blueprint("api", __name__)
              druppie = DruppieClient()

              @api.route("/info")
              def info():
                  from app.config import settings
                  return jsonify(app_name=settings.app_name)

              @api.route("/recipes/upload", methods=["POST"])
              def upload_recipe():
                  data = request.get_json(silent=True)
                  if not data or "image_url" not in data:
                      return jsonify(error="Missing image_url"), 400
                  result = druppie.call("vision", "ocr", {"image_source": data["image_url"]})
                  extracted_text = result.get("text", "")
                  analysis = druppie.call("llm", "chat", {
                      "prompt": f"Analyseer dit recept en geef ingredienten en stappen:\n\n{extracted_text}",
                      "system": "Je bent een ervaren chef-kok die recepten analyseert.",
                  })
                  return jsonify(
                      extracted_text=extracted_text,
                      analysis=analysis.get("answer", ""),
                  )

              @api.route("/recipes/<recipe_id>/chat", methods=["POST"])
              def chat_recipe(recipe_id):
                  data = request.get_json(silent=True)
                  if not data or "prompt" not in data:
                      return jsonify(error="Missing prompt"), 400
                  result = druppie.call("llm", "chat", {
                      "prompt": data["prompt"],
                      "system": "Je bent een behulpzame chef-kok.",
                  })
                  return jsonify(answer=result.get("answer", ""))

    # STEP 3: druppie-test-runner (Verify)
    - agent: builder
      tool: coding:execute_coding_task
      arguments:
        task: "Run the full test suite with coverage and report a structured ---VERDICT--- block. Do not modify any code or tests."
        agent: druppie-test-runner
      mock: true
      mock_result: |
        ---VERDICT---
        RESULT: PASS
        Framework: pytest
        Tests: 2/2 passed
        Coverage: 82%
        ---END VERDICT---

    - agent: builder
      tool: builtin:done
      arguments:
        summary: "Agent builder: TDD_PASSED — Wrote 2 tests, implementation committed, 2/2 tests passed (coverage: 82%). Attempts used: 1 of 3."

    # --- Planner → deployer (new flow: no test_executor, builder already ran tests internally) ---
    - agent: planner
      tool: builtin:make_plan
      arguments:
        steps:
          - agent_id: deployer
            prompt: "Deploy the recipe analyzer"
          - agent_id: planner
            prompt: "Re-evaluate after deployer completes"

    - agent: planner
      tool: builtin:done
      arguments:
        summary: "Agent planner: TDD_PASSED, planned deployer"

    # --- Deployer (mocked) ---
    - agent: deployer
      tool: docker:list_containers
      mock: true
      mock_result: '{"containers": []}'

    - agent: deployer
      tool: docker:compose_up
      mock: true
      mock_result: '{"success": true, "containers": ["recipe-analyzer-1"], "url": "http://localhost:9105", "compose_project_name": "recipe-analyzer"}'
      arguments:
        compose_project_name: recipe-analyzer
        branch: main

    - agent: deployer
      tool: builtin:done
      arguments:
        summary: "Agent deployer: Deployed recipe-analyzer at http://localhost:9105."

    # --- Planner → summarizer ---
    - agent: planner
      tool: builtin:make_plan
      arguments:
        steps:
          - agent_id: summarizer
            prompt: "Summarize what was accomplished"

    - agent: planner
      tool: builtin:done
      arguments:
        summary: "Agent planner: Planned summarizer"

    # --- Summarizer ---
    - agent: summarizer
      tool: builtin:create_message
      arguments:
        content: |
          Your recipe analyzer has been built and deployed!

          **Features:**
          - Upload recipe photos — OCR extracts text via Druppie module-vision
          - AI analysis of recipes (ingredients, steps, nutrition)
          - Chat interface for questions about recipes

          **Tech:** Flask + React, AI via Druppie SDK (no hardcoded API keys)

          The app is running at http://localhost:9105.

    - agent: summarizer
      tool: builtin:done
      arguments:
        summary: "Agent summarizer: Presented completion summary."
      assert:
        completed: true

  # Verify side-effects in Gitea
  verify:
    - gitea_repo_exists: true
    - file_exists: docs/functional-design.md
    - file_exists: docs/technical-design.md
    - file_exists: docs/builder-plan.md
    - file_not_empty: docs/functional-design.md
    - file_not_empty: docs/technical-design.md
    - file_not_empty: docs/builder-plan.md
    # Verify TD mentions Druppie modules
    - file_contains:
        path: docs/technical-design.md
        content: "druppie_sdk"
    - file_contains:
        path: docs/technical-design.md
        content: "DruppieClient"
    # Verify builder plan includes module integration
    - file_contains:
        path: docs/builder-plan.md
        content: "Module Integration"
    - file_contains:
        path: docs/builder-plan.md
        content: "vision/ocr"
