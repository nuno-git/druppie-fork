## End-to-end: create a to-do app with REAL deploy
## Extends setup-todo-app-pipeline. Builder drives full TDD cycle via OpenCode
## (druppie-test-writer → druppie-implementer → druppie-test-runner, all mocked),
## then REAL deployer + summarizer.

tool-test:
  name: create-todo-app
  description: "Full pipeline with real deploy"
  tags: [e2e, create-project, real-deploy]
  extends: setup-todo-app-pipeline

  chain:
    # --- Builder drives the full TDD cycle (3 execute_coding_task calls, all mocked) ---

    # STEP 1: druppie-test-writer (Red phase)
    - agent: builder
      tool: coding:execute_coding_task
      arguments:
        task: "TDD Red Phase. Read functional_design.md, technical_design.md, and builder_plan.md. Set up vitest and write tests covering todo add/toggle/delete/filter behavior. Do NOT implement production code. Commit and push."
        agent: druppie-test-writer
      mock: true
      mock_result: |
        ---SUMMARY---
        Framework: vitest
        Test files created: src/__tests__/App.test.jsx
        Test count: 4
        Config files added: vitest.config.js, package.json updated
        Coverage tool: @vitest/coverage-v8
        Git: pushed to main
        ---END SUMMARY---

    # STEP 2: druppie-implementer (Green phase)
    - agent: builder
      tool: coding:execute_coding_task
      arguments:
        task: "TDD Green Phase (initial). Implement the todo app to pass the vitest tests. Preserve /health endpoint. Commit and push."
        agent: druppie-implementer
      mock: true
      mock_result: |
        ---SUMMARY---
        Strategy: INITIAL
        Files created: frontend/src/App.tsx
        Files modified: none
        Local test run: 4/4 passed
        Key decisions: Used useState + useEffect for localStorage persistence
        Git: pushed to main
        ---END SUMMARY---
      outcome:
        files:
          - path: frontend/src/App.tsx
            content: |
              import { useState, useEffect } from "react"
              import { Button } from "@/components/ui/button"
              import { Card, CardContent, CardHeader, CardTitle } from "@/components/ui/card"
              import { Input } from "@/components/ui/input"

              interface Todo {
                id: string
                title: string
                completed: boolean
              }

              function App() {
                const [todos, setTodos] = useState<Todo[]>(() => {
                  const saved = localStorage.getItem("todos")
                  return saved ? JSON.parse(saved) : []
                })
                const [input, setInput] = useState("")
                const [filter, setFilter] = useState<"all" | "active" | "completed">("all")

                useEffect(() => {
                  localStorage.setItem("todos", JSON.stringify(todos))
                }, [todos])

                const addTodo = () => {
                  if (!input.trim()) return
                  setTodos([...todos, { id: Date.now().toString(), title: input.trim(), completed: false }])
                  setInput("")
                }

                const toggleTodo = (id: string) => {
                  setTodos(todos.map(t => t.id === id ? { ...t, completed: !t.completed } : t))
                }

                const deleteTodo = (id: string) => {
                  setTodos(todos.filter(t => t.id !== id))
                }

                const filtered = todos.filter(t => {
                  if (filter === "active") return !t.completed
                  if (filter === "completed") return t.completed
                  return true
                })

                const remaining = todos.filter(t => !t.completed).length

                return (
                  <div className="min-h-screen bg-background">
                    <header className="border-b">
                      <div className="container mx-auto flex h-16 items-center px-4">
                        <h1 className="text-xl font-bold">Todo App</h1>
                      </div>
                    </header>
                    <main className="container mx-auto px-4 py-8 max-w-2xl">
                      <Card>
                        <CardHeader>
                          <CardTitle>What needs to be done?</CardTitle>
                        </CardHeader>
                        <CardContent className="space-y-4">
                          <div className="flex gap-2">
                            <Input
                              value={input}
                              onChange={e => setInput(e.target.value)}
                              onKeyDown={e => e.key === "Enter" && addTodo()}
                              placeholder="Add a new todo..."
                            />
                            <Button onClick={addTodo}>Add</Button>
                          </div>

                          <div className="flex gap-2">
                            {(["all", "active", "completed"] as const).map(f => (
                              <Button
                                key={f}
                                variant={filter === f ? "default" : "outline"}
                                size="sm"
                                onClick={() => setFilter(f)}
                              >
                                {f.charAt(0).toUpperCase() + f.slice(1)}
                              </Button>
                            ))}
                          </div>

                          <ul className="space-y-2">
                            {filtered.map(todo => (
                              <li key={todo.id} className="flex items-center gap-3 p-2 rounded border">
                                <input
                                  type="checkbox"
                                  checked={todo.completed}
                                  onChange={() => toggleTodo(todo.id)}
                                  className="h-4 w-4"
                                />
                                <span className={`flex-1 ${todo.completed ? "line-through text-muted-foreground" : ""}`}>
                                  {todo.title}
                                </span>
                                <Button variant="ghost" size="sm" onClick={() => deleteTodo(todo.id)}>
                                  ✕
                                </Button>
                              </li>
                            ))}
                          </ul>

                          {todos.length > 0 && (
                            <p className="text-sm text-muted-foreground">{remaining} item{remaining !== 1 ? "s" : ""} left</p>
                          )}
                        </CardContent>
                      </Card>
                    </main>
                  </div>
                )
              }

              export default App

    # STEP 3: druppie-test-runner (Verify)
    - agent: builder
      tool: coding:execute_coding_task
      arguments:
        task: "Run the full test suite with coverage and report a structured ---VERDICT--- block."
        agent: druppie-test-runner
      mock: true
      mock_result: |
        ---VERDICT---
        RESULT: PASS
        Framework: vitest
        Tests: 4/4 passed
        Coverage: 87%
        ---END VERDICT---

    - agent: builder
      tool: builtin:done
      arguments:
        summary: "Agent builder: TDD_PASSED — Wrote 4 tests, implementation committed, 4/4 tests passed (coverage: 87%). Attempts used: 1 of 3."

    # --- Planner → deployer (no test_executor in the new flow) ---
    - agent: planner
      tool: builtin:make_plan
      arguments:
        steps:
          - agent_id: deployer
            prompt: "Deploy the todo app from main branch"
          - agent_id: planner
            prompt: "Re-evaluate after deployer completes"

    - agent: planner
      tool: builtin:done
      arguments:
        summary: "Agent planner: TDD_PASSED, planned deployer"

    # --- Deployer (REAL — actually deploys the app) ---
    - agent: deployer
      tool: docker:list_containers

    - agent: deployer
      tool: docker:compose_up
      approval:
        status: approved
        by: developer
      arguments:
        compose_project_name: todo-app
        branch: main
      assert:
        result:
          - not_empty
          - { contains: "success" }

    - agent: deployer
      tool: builtin:done
      arguments:
        summary: "Agent deployer: Deployed todo-app from main."

    # --- Planner (after deployer → summarizer) ---
    - agent: planner
      tool: builtin:make_plan
      arguments:
        steps:
          - agent_id: summarizer
            prompt: "Summarize what was accomplished for the user"

    - agent: planner
      tool: builtin:done
      arguments:
        summary: "Agent planner: Planned summarizer"

    # --- Summarizer ---
    - agent: summarizer
      tool: builtin:create_message
      arguments:
        content: |
          Your todo app has been built and deployed!

          **What was created:**
          - React app with add, complete, delete, and filter functionality
          - localStorage persistence
          - 4 tests, all passing (87% coverage)

          The app is now running. Check the deployer tool call for the URL.

    - agent: summarizer
      tool: builtin:done
      arguments:
        summary: "Agent summarizer: Presented completion summary to user."
      assert:
        completed: true

  # Verify side-effects in Gitea
  verify:
    - gitea_repo_exists: true
    - file_exists: docs/functional-design.md
    - file_exists: docs/technical-design.md
    - file_exists: docs/builder-plan.md
    - file_not_empty: docs/functional-design.md
    - file_not_empty: docs/technical-design.md
