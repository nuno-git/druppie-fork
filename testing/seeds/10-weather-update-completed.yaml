    status: completed
    tool_calls:
      - tool: builtin:make_plan
        arguments:
          steps:
            - agent_id: architect
              prompt: "Add CSS variables for dark/light theme toggle."
            - agent_id: tester
              prompt: "Tests for theme toggle and CSS variable application."
