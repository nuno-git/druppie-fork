test:
  name: router-ambiguous-request
  mode: live
  description: "Router asks clarifying question on ambiguous input"
  sessions:
    - weather-dashboard-completed
  run:
    message: "something about weather"
    real_agents: [router]
  hitl: non-technical-pm
  judge: default
  evals:
    - eval: router-correct-intent
      expected:
        intent: ["update_project", "create_project", "general_chat"]
