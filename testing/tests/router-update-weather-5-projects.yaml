test:
  name: router-update-weather-5-projects
  description: "Router picks weather-dashboard from 5 existing projects"
  sessions:
    - weather-dashboard
    - todo-app
    - calculator
    - portfolio
    - blog
  run:
    message: "update the weather dashboard to add dark mode"
