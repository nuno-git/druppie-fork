test:
  name: e2e-create-project-to-architect
  mode: live
  description: "Full pipeline: router → planner → BA → architect"
  sessions: []
  run:
    message: "build me a weather dashboard for monitoring rainfall"
    real_agents: [router, planner, business_analyst, planner, architect]
  hitl: non-technical-pm
  judges: [default]
  evals:
    - eval: router-correct-intent
      expected:
        intent: create_project
    - eval: architect-produces-design
    - eval: workflow-agent-sequence
