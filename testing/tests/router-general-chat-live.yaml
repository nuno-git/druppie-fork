## LIVE MODE
## Sends a real message to the router agent (LLM call).
## The LLM decides how to classify it. We check it got it right.
## This tests: does the router agent actually work?

test:
  name: router-general-chat-live
  mode: live
  description: "LIVE: Router classifies a question as general_chat (real LLM call)"

  # No pre-existing sessions needed
  sessions: []

  # Send this message to the real router agent
  run:
    message: "what agents do you have?"
    real_agents: [router]

  # HITL simulator answers if the router asks a question
  hitl: non-technical-pm

  # LLM judge evaluates the result
  judge: default

  # Check the result
  evals:
    - eval: router-correct-intent
      expected:
        intent: general_chat
