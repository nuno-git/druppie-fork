test:
  name: e2e-general-chat-ba
  mode: live
  description: "General chat question routed to BA"
  sessions: []
  run:
    message: "I am struggling with managing our water pump maintenance schedules, what can I do?"
    real_agents: [router, planner, business_analyst]
  hitl: non-technical-pm
  judge: default
  evals:
    - eval: router-correct-intent
      expected:
        intent: general_chat
  evaluate:
    judge:
      checks:
        - "The BA should help analyze the user's problem and suggest approaches"
