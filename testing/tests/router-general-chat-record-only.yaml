## RECORD_ONLY MODE
## Inserts DB records directly from YAML. No LLM call, no tool execution.
## The session with router results is pre-populated in the database.
## We just run assertions against that pre-populated data.
## This tests: do our assertions/evals work correctly?

test:
  name: router-general-chat-record-only
  mode: record_only
  description: "RECORD_ONLY: Check assertions against pre-populated router session (no LLM, no tools)"

  # Seed this session into the DB (just inserts records, nothing executed)
  sessions:
    - general-chat-router-done

  # No message sent, no agents run — we're just checking the seeded data
  run:
    message: ""
    real_agents: []

  # No HITL or judge needed — pure assertion check
  evals:
    - eval: router-correct-intent
      expected:
        intent: general_chat
