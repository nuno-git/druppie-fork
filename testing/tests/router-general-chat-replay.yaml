## REPLAY MODE
## Reads tool calls from YAML and executes them through the real orchestrator.
## The LLM does NOT decide anything — the tool calls (set_intent, done) come from YAML.
## But they are actually executed against the real builtin tool handlers.
## This tests: do the builtin tools (set_intent, done) actually work?

test:
  name: router-general-chat-replay
  mode: replay
  description: "REPLAY: Execute router tool calls from YAML through real orchestrator (no LLM)"

  # Seed with record_only first (fast world state setup)
  sessions: []

  # Replay this session — tool calls are executed for real
  seed_sessions:
    - session: general-chat-router-done
      mode: replay

  # No message sent — the replay already executed the tools
  run:
    message: ""
    real_agents: []

  # Check the result — same assertions, but now against real tool execution results
  evals:
    - eval: router-correct-intent
      expected:
        intent: general_chat
