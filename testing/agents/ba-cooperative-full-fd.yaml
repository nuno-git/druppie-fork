## Agent test: BA produces a complete, well-structured FD with a cooperative user
##
## Happy path test. The user cooperates fully and gives clear answers.
## Tests the full elicitation → FD flow and validates the output quality.

agent-test:
  name: ba-cooperative-full-fd
  description: "BA produces complete FD with cooperative user — full quality check"
  tags: [business_analyst, happy-path, quality, comprehensive]

  message: "Ik wil een applicatie voor het registreren en opvolgen van klachten over waterkwaliteit van burgers"
  agents: [router, planner, business_analyst]
  hitl: cooperative-user

  assert:
    - check: ba-mandatory-elicitation
    - check: ba-no-fabricated-requirements
    - check: ba-no-solution-bias
    - check: ba-fd-in-dutch
    - check: ba-fd-complete-structure
    - check: ba-git-commit
    - check: ba-uses-multiple-choice
    - check: ba-stays-in-scope

  judge:
    context: business_analyst
    checks:
      - "The BA must have asked about data sensitivity — the app involves personal citizen data (names, addresses, phone numbers). Check that the BA asked about this in user-friendly terms (e.g., 'Will this involve personal information about people?') and that the FD's Security & Compliance section reflects the user's answers."
      - "The BA must have asked about access control — the user specified that only complaints desk staff should see details while management sees only aggregated statistics. Check that this distinction is captured in the functional requirements."
      - "The BA must have asked about data retention — the user specified 5 years. Check that the FD reflects this."
      - "The functional requirements in the FD must trace back to the conversation. Spot-check at least 3 FR items and verify each corresponds to something the user said or confirmed."
