agent-test:
  name: manual-ba-custom-project
  description: "BA gathers requirements for: {{project_description}}"
  tags: [ba, manual]

  inputs:
    - name: project_description
      label: "Describe the project you want to build"
      type: textarea
      default: "A dashboard for monitoring water pump stations"
    - name: hitl_persona
      label: "Who are you? (the HITL simulator will act as this person)"
      type: select
      options: [non-technical-pm, dutch-water-authority, developer]
      default: non-technical-pm

  message: "{{project_description}}"
  agents: [router, planner, business_analyst]
  hitl: "{{hitl_persona}}"

  assert:
    - check: ba-asks-questions
    - check: router-correct-intent
      expected:
        intent: create_project
