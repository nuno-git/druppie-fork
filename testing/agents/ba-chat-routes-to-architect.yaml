## Agent test: BA correctly routes architecture questions to the architect
##
## The user asks a question that falls under the architect's expertise.
## The BA should recognize this and signal CHAT_ROUTE_AGENT with
## the architect as the suggested agent.

agent-test:
  name: ba-chat-routes-to-architect
  description: "BA routes an architecture question to the architect in general_chat"
  tags: [business_analyst, general-chat, routing]

  message: "Welke database technologie is het beste voor het opslaan van tijdreeksdata van waterkwaliteitsmetingen?"
  agents: [router, planner, business_analyst]
  hitl: non-technical-pm

  judge:
    context: [router, business_analyst]
    checks:
      - "This is a technology/architecture question (database choice for time-series data). The BA must have recognized this is outside its scope and called done() with CHAT_ROUTE_AGENT in the summary, suggesting the architect agent. The BA must NOT have tried to answer the database technology question itself."
      - "The done() summary must include enough context about the user's question so the architect can pick it up without the user having to repeat themselves."
