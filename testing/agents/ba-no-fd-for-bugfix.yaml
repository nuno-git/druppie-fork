## Agent test: BA correctly identifies a bug fix as NO_FD_CHANGE
##
## Setup creates a project with an existing FD (recipe-sharing-app).
## Then a NEW session starts with a bug report. The router should
## classify this as update_project, and the BA should signal NO_FD_CHANGE
## without writing a new functional design.

agent-test:
  name: ba-no-fd-for-bugfix
  description: "BA identifies bug report as technical change and does not write an FD"
  tags: [business_analyst, update-project, bugfix, no-fd-change]

  setup:
    - setup-project-with-fd

  message: "In de recipe sharing app werkt de zoekfunctie niet goed: als ik zoek met accenten (bijv. kanaäl) krijg ik geen resultaten, maar zonder accent (kanaal) werkt het wel"
  hitl: bugfix-reporter

  assert:
    - check: ba-no-fd-for-bugfix

  judge:
    context: business_analyst
    checks:
      - "The BA must have recognized this as a technical bug (search broken with accented characters), NOT a functional change. It should have asked a few clarifying questions about the bug (when it happens, which characters, etc.) but must NOT have started full requirements elicitation for a new feature."
      - "The BA must have called done() with NO_FD_CHANGE in the summary and included a clear technical description of the bug for the Architect."
      - "The BA must NOT have called coding:make_design. Writing or updating the functional design for a bug fix is incorrect behavior."
