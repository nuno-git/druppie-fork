scenario:
  name: create_todo_app
  description: >
    End-to-end scenario for creating a simple todo app.
    Router and planner are mocked; business_analyst and architect run under test.

  input:
    user_message: "build me a simple todo app with add, delete, and mark complete"
    user: admin

  mocked_agents:
    - agent_id: router
      status: completed
      tool_calls:
        - tool: "builtin:set_intent"
          arguments:
            intent: create_project
            project_name: todo-app
          status: completed
          result: "Intent set to create_project"
        - tool: "builtin:done"
          arguments:
            summary: "Routed to create_project for todo-app"
          status: completed
          result: "Agent completed"

    - agent_id: planner
      status: completed
      tool_calls:
        - tool: "builtin:make_plan"
          arguments:
            plan:
              - agent: business_analyst
                prompt: "Gather requirements for a simple todo app with add, delete, and mark complete features."
              - agent: architect
                prompt: "Design the architecture for the todo app based on gathered requirements."
          status: completed
          result: "Plan created"
        - tool: "builtin:done"
          arguments:
            summary: "Plan created with business_analyst and architect steps."
          status: completed
          result: "Agent completed"

  agents_under_test:
    - business_analyst
    - architect

  evaluations:
    - architect_design_quality

  assertions:
    - agent: router
      assert: completed
    - agent: planner
      assert: completed
    - agent: business_analyst
      assert: completed
    - agent: architect
      assert: completed

  user_simulator:
    mode: scripted
    scripted_answers:
      - question_contains: "features"
        answer: "I want add, delete, and mark complete. No authentication needed."
      - question_contains: "design"
        answer: "A simple React frontend with an in-memory backend is fine."
    default_answer: "Yes, that sounds good."
    max_interactions: 5

  timeout_minutes: 15
