## MANUAL TEST: Architect reviews a custom functional design
## The tester provides their own FD content and checks the architect's response.

test:
  name: manual-architect-review-fd
  mode: live
  description: "Architect reviews custom FD for: {{project_name}}"
  manual_input: true
  inputs:
    - name: project_name
      label: "Project name"
      type: text
      required: true
      default: "water-quality-monitor"
    - name: functional_design
      label: "Functional design content (markdown)"
      type: textarea
      required: true
      default: |
        # Functional Design: Water Quality Monitor

        ## Problem
        We need to monitor water quality sensors in real-time.

        ## Requirements
        - FR-01: Display sensor readings on a dashboard
        - FR-02: Alert when readings exceed thresholds
        - FR-03: Store historical data for 1 year
        - NFR-01: Dashboard loads within 2 seconds
    - name: expect_approved
      label: "Should the architect approve this design?"
      type: select
      required: true
      default: "yes"
      options:
        - "yes"
        - "no"

  sessions: []
  run:
    message: "Review this functional design for {{project_name}} and create a technical design: {{functional_design}}"
    real_agents: [router, planner, business_analyst, planner, architect]
  hitl: dutch-water-authority
  judge: default
  evals:
    - eval: architect-produces-design
