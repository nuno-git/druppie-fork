## Project where the builder failed after design was done.
## Shows: error states, partial pipeline completion.

metadata:
  id: todo-app-builder-failed
  title: "build me a to do app"
  status: failed
  user: admin
  intent: create_project
  project_name: todo-app
  hours_ago: 0.5

agents:
  - id: router
    status: completed
    tool_calls:
      - tool: builtin:set_intent
        arguments:
          intent: create_project
          project_name: todo-app
          description: "A simple to-do list app"
        status: completed
        result: "Intent set to create_project"
      - tool: builtin:done
        arguments:
          summary: "Classified as create_project for todo-app"
        status: completed

  - id: planner
    status: completed
    tool_calls:
      - tool: builtin:make_plan
        arguments:
          steps:
            - agent_id: business_analyst
              prompt: "Gather requirements"
            - agent_id: planner
              prompt: "Re-evaluate"
        status: completed
      - tool: builtin:done
        arguments:
          summary: "Planned business_analyst"
        status: completed

  - id: business_analyst
    status: completed
    tool_calls:
      - tool: coding:make_design
        arguments:
          content: "# Functional Design: Todo App\n## Requirements\n- Add/remove tasks\n- Mark as done"
        status: completed
        result: "Created docs/functional-design.md"
      - tool: builtin:done
        arguments:
          summary: "DESIGN_APPROVED"
        status: completed

  - id: builder
    status: failed
    error_message: "Sandbox execution failed: connection timeout after 120s"
    tool_calls:
      - tool: coding:execute_coding_task
        arguments:
          task: "Implement the todo app based on the design"
        status: failed
        error_message: "Sandbox execution failed: connection timeout after 120s"

messages:
  - role: user
    content: "build me a to do app"
