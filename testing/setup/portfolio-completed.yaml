## Completed project with built code files.
## Shows: outcome block with multiple source files, full build.

metadata:
  id: portfolio-completed
  title: "create a portfolio website"
  status: completed
  user: admin
  intent: create_project
  project_name: portfolio-site
  hours_ago: 120

agents:
  - id: router
    status: completed
    tool_calls:
      - tool: builtin:set_intent
        arguments:
          intent: create_project
          project_name: portfolio-site
          description: "A personal portfolio website"
        status: completed
        result: "Intent set to create_project"
      - tool: builtin:done
        arguments:
          summary: "Classified as create_project for portfolio-site"
        status: completed

  - id: business_analyst
    status: completed
    tool_calls:
      - tool: builtin:hitl_ask_multiple_choice_question
        arguments:
          question: "What style do you prefer for your portfolio?"
          choices:
            - text: "Minimalist and clean"
            - text: "Bold and colorful"
            - text: "Professional and corporate"
        status: completed
        result: "User chose: Minimalist and clean"
        answer: "Minimalist and clean"
      - tool: coding:make_design
        arguments:
          content: "# Portfolio Site\n## Pages\n- Home with intro\n- Projects grid\n- Contact form"
        status: completed
        result: "Created docs/functional-design.md"
      - tool: builtin:done
        arguments:
          summary: "DESIGN_APPROVED"
        status: completed

  - id: architect
    status: completed
    tool_calls:
      - tool: coding:make_design
        arguments:
          content: "# Technical Design\n## Stack\nHTML + CSS, no framework\n## Layout\nResponsive grid"
        status: completed
        result: "Created docs/technical-design.md"
      - tool: builtin:done
        arguments:
          summary: "DESIGN_APPROVED"
        status: completed

  - id: builder
    status: completed
    tool_calls:
      - tool: coding:execute_coding_task
        arguments:
          task: "Build the portfolio site"
        status: completed
        result: "All files created"
        outcome:
          target: gitea
          files:
            - path: index.html
              content: |
                <!DOCTYPE html>
                <html lang="en">
                <head><title>Portfolio</title><link rel="stylesheet" href="styles.css"></head>
                <body>
                  <header><h1>My Portfolio</h1></header>
                  <main id="projects"></main>
                  <footer><p>Contact: hello@example.com</p></footer>
                </body>
                </html>
            - path: styles.css
              content: |
                body { font-family: system-ui; max-width: 800px; margin: 0 auto; padding: 2rem; }
                header { border-bottom: 1px solid #eee; margin-bottom: 2rem; }
                #projects { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1rem; }
      - tool: builtin:done
        arguments:
          summary: "BUILD_COMPLETE - Portfolio site built with HTML and CSS"
        status: completed

messages:
  - role: user
    content: "create a portfolio website"
