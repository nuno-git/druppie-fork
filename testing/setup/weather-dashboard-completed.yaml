        arguments:
          content: |
            # Functional Design: Weather Dashboard
            ## Requirements
            - FR-01: Display real-time rainfall data per region
            - FR-02: Show temperature trends over 7 days
            - FR-03: Alert when rainfall exceeds threshold
            - NFR-01: Dashboard loads within 2 seconds
