## Replay session: Router creates project, then architect lists files.
## When replayed, set_intent creates a real Gitea repo, then list_dir reads it.

metadata:
  id: tool-test-list-dir
  title: "build a weather dashboard"
  status: completed
  user: admin

agents:
  # Step 1: Router sets intent → creates project + Gitea repo
  - id: router
    status: completed
    tool_calls:
      - tool: "builtin:set_intent"
        arguments:
          intent: create_project
          project_name: weather-dashboard
        status: completed
      - tool: "builtin:done"
        arguments:
          summary: "Agent router: Classified intent as create_project, project 'weather-dashboard'."
        status: completed

  # Step 2: Architect lists directory (now project + repo exist)
  - id: architect
    status: completed
    tool_calls:
      - tool: "coding:list_dir"
        arguments:
          path: "."
        status: completed
      - tool: "builtin:done"
        arguments:
          summary: "Agent architect: Listed directory contents."
        status: completed

messages:
  - role: user
    content: "build a weather dashboard"
