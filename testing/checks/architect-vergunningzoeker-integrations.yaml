## Check: architect's TD for the vergunningzoeker explicitly designs the two
## critical external-system integrations — bronsystemen (ETL) and zaaksysteem
## (migration) — and takes a position on how each connection is realised in
## Druppie (reuse / extend / new module / project-specific).
##
## The vergunningzoeker stands or falls on these two integrations:
##   1. Bronsystemen ETL — metadata is scattered across multiple legacy permit
##      databases with different numbering schemes (K/L-nummer, post-2018
##      location search). The TD must describe how that data is extracted,
##      unified and indexed (FR-01..FR-06, A-02, O-01, O-02).
##   2. Zaaksysteem migration — per-permit outbound migration of metadata +
##      original documents to the zaaksysteem (FR-12, NFR-07, A-04, UJ-4).
##
## The third judge check aligns with the research-based architect: external
## connections are re-usable by default in Druppie — the TD must explicitly
## pick REUSE / EXTEND / NEW MODULE / project-specific per connection.

check:
  name: architect-vergunningzoeker-integrations
  description: "Vergunningzoeker TD must explicitly design bronsystemen ETL + zaaksysteem migration and decide how each connection is realised in Druppie"
  tags: [architect, vergunningzoeker, integrations, judge]

  assert:
    - agent: architect
      completed: true
    - agent: architect
      tool: coding:make_design

  judge:
    context: architect
    checks:
      # 1. Bronsystemen — ETL pipeline
      - "The technical-design.md must contain an explicit design for the bronsystemen ETL integration: how metadata is EXTRACTED from the multiple legacy permit databases (each with its own numbering scheme — K/L-nummer, post-2018 location search, etc.), TRANSFORMED/unified into a common data model covering the FD's metadata fields (aanvrager, vergunninghouder, uitgever, locatie, datums, vergunningnummer, toepasselijke wet, type werk, type oppervlaktewater, type waterkering), and LOADED into the search index that powers FR-01..FR-05. A vague 'ingest from source systems' sentence is NOT enough — the TD must describe the ETL shape (at minimum: per-source adapter, transform/unify step, index load), the reindexing cadence or trigger (O-01/O-02), and how the originating bronsysteem is preserved on each record so FR-06 works. Missing any of the three ETL stages, the reindex cadence, or bronsysteem-tracking is a FAIL."

      # 2. Zaaksysteem — outbound migration interface
      - "The technical-design.md must contain an explicit design for the zaaksysteem integration used to migrate a selected permit's metadata AND its original document(s) to the zaaksysteem (FR-12, User Journey 4). The TD must: (a) name the zaaksysteem as an integration point, (b) state the direction (outbound from vergunningzoeker to zaaksysteem), (c) specify that BOTH the metadata and the original PDF/scan are transferred, (d) describe the trigger (per-permit, user-initiated — NOT bulk), and (e) address data-integrity verification consistent with NFR-07 (metadata + documents must arrive complete and correct, with some form of confirmation/verification mechanism). Missing any of (a)–(e) is a FAIL."

      # 3. Module decision per external connection (research-based architect)
      - "For BOTH the bronsystemen ETL integration and the zaaksysteem migration integration, the technical-design.md must take an explicit position on HOW the connection is realised inside Druppie: REUSE of an existing MCP module, EXTEND of an existing module, a NEW proposed module, or project-specific code — each with a short rationale. Just listing the connection in an Integration Points table without naming the chosen module (or explicitly justifying project-specific code) is a FAIL. Default stance in Druppie is that external connections become re-usable MCP modules — deviating from that requires an explicit reason in the TD."
