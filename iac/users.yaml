# Druppie Governance Platform - Users & Roles Configuration
# This file defines users, roles, and MCP permissions

# =============================================================================
# REALM ROLES (Governance Roles)
# =============================================================================
roles:
  # Core governance roles
  - name: admin
    description: Platform administrator with full access
    composite: true
    composites:
      - developer
      - architect
      - infra-engineer
      - product-owner
      - compliance-officer

  - name: developer
    description: Software developer - can create/modify code
    mcpPermissions:
      - filesystem.read
      - filesystem.write
      - shell.run
      - git.clone
      - git.commit
      - git.push

  - name: architect
    description: System architect - can approve technical designs
    mcpPermissions:
      - filesystem.read
      - filesystem.write
      - shell.run
      - git.*
      - docker.build

  - name: infra-engineer
    description: Infrastructure engineer - can approve deployments
    mcpPermissions:
      - docker.*
      - shell.run
      - git.*

  - name: product-owner
    description: Product owner - can approve features and priorities
    mcpPermissions:
      - filesystem.read
      - git.read

  - name: compliance-officer
    description: Compliance officer - can approve regulatory changes
    mcpPermissions:
      - filesystem.read

  - name: viewer
    description: Read-only access to view plans and status
    mcpPermissions: []

# =============================================================================
# APPROVAL WORKFLOWS
# =============================================================================
approvalWorkflows:
  # Deployment requires infra engineer approval
  deployment:
    name: Deployment Approval
    description: Deploy code to production
    requiredApprovals:
      - role: infra-engineer
        count: 1
      - role: product-owner
        count: 1
    mcpTools:
      - docker.deploy
      - docker.run

  # Code changes require developer + architect approval
  codeChange:
    name: Code Change Approval
    description: Merge code changes to main branch
    requiredApprovals:
      - role: developer
        count: 1
      - role: architect
        count: 1
        optional: true
    mcpTools:
      - git.push
      - git.merge

  # Compliance changes require compliance officer
  complianceChange:
    name: Compliance Change Approval
    description: Changes affecting compliance/regulatory
    requiredApprovals:
      - role: compliance-officer
        count: 1
    mcpTools:
      - filesystem.write

# =============================================================================
# MCP PERMISSION LEVELS
# =============================================================================
mcpPermissionLevels:
  # Auto-approve: Tool runs immediately without approval
  auto:
    - filesystem.read
    - git.status
    - git.log
    - git.diff
    - docker.ps
    - docker.logs

  # User-approve: User who triggered must approve (confirmation)
  userApprove:
    - filesystem.write
    - shell.run
    - git.commit

  # Role-approve: Specific role must approve
  roleApprove:
    - git.push
    - git.merge
    - docker.build
    - docker.run
    - docker.deploy

