# =============================================================================
# CLIENT APPLICATIONS
# =============================================================================
clients:
  - clientId: druppie-frontend
    name: Druppie Frontend
    description: Druppie Web Application
    publicClient: true
    standardFlowEnabled: true
    directAccessGrantsEnabled: true
    rootUrl: http://localhost:5273
    redirectUris:
      - http://localhost:5173/*
      - http://localhost:5273/*
      - http://${EXTERNAL_HOST}:5173/*
      - http://${EXTERNAL_HOST}:5273/*
    webOrigins:
      - http://localhost:5173
      - http://localhost:5273
      - http://${EXTERNAL_HOST}:5173
      - http://${EXTERNAL_HOST}:5273

  - clientId: druppie-backend
    name: Druppie Backend API
    description: Druppie Backend Service
    publicClient: false
    standardFlowEnabled: false
    serviceAccountsEnabled: true
    directAccessGrantsEnabled: true

  - clientId: gitea
    name: Gitea Git Server
    description: Gitea OAuth2 Integration
    publicClient: false
    standardFlowEnabled: true
    rootUrl: http://localhost:3100
    redirectUris:
      - http://localhost:3000/*
      - http://localhost:3100/*
      - http://${EXTERNAL_HOST}:3000/*
      - http://${EXTERNAL_HOST}:3100/*
