# =============================================================================
# CLIENT APPLICATIONS
# =============================================================================
clients:
  - clientId: druppie-frontend
    name: Druppie Frontend
    description: Druppie Web Application
    publicClient: true
    standardFlowEnabled: true
    directAccessGrantsEnabled: true
    rootUrl: http://${EXTERNAL_HOST}:${FRONTEND_PORT}
    redirectUris:
      - http://localhost:${FRONTEND_PORT}/*
      - http://${EXTERNAL_HOST}:${FRONTEND_PORT}/*
    webOrigins:
      - http://localhost:${FRONTEND_PORT}
      - http://${EXTERNAL_HOST}:${FRONTEND_PORT}

  - clientId: druppie-backend
    name: Druppie Backend API
    description: Druppie Backend Service
    publicClient: false
    standardFlowEnabled: false
    serviceAccountsEnabled: true
    directAccessGrantsEnabled: true

  - clientId: gitea
    name: Gitea Git Server
    description: Gitea OAuth2 Integration
    publicClient: false
    standardFlowEnabled: true
    rootUrl: http://${EXTERNAL_HOST}:${GITEA_PORT}
    redirectUris:
      - http://localhost:${GITEA_PORT}/*
      - http://${EXTERNAL_HOST}:${GITEA_PORT}/*
    webOrigins:
      - http://localhost:${GITEA_PORT}
      - http://${EXTERNAL_HOST}:${GITEA_PORT}
