# Druppie Governance Platform - Users & Roles Configuration
# This file defines users, roles, and MCP permissions
#
# SIMPLIFIED ROLE SYSTEM (per goal.md):
# - user: Can make requests, triggers workflow
# - architect: Approves architecture/design decisions
# - developer: Approves builds and deployments
# - admin: Full access (reserved for future)

# =============================================================================
# REALM ROLES (Simplified Governance Roles)
# =============================================================================
roles:
  # Basic user role - can make requests
  - name: user
    description: Regular user - can make requests and trigger workflows

  # Architect role - approves architecture decisions
  - name: architect
    description: System architect - approves architecture/design decisions

  # Developer role - approves builds and deployments
  - name: developer
    description: Developer - approves builds and deployments

  # Business analyst role - approves functional requirements and designs
  - name: business_analyst
    description: Business analyst - approves functional requirements and designs

  # Admin role - full access (reserved)
  - name: admin
    description: Platform administrator with full access
    composite: true
    composites:
      - user
      - developer
      - architect
      - business_analyst

  # Legacy roles kept for backwards compatibility
  - name: infra-engineer
    description: Infrastructure engineer - can approve deployments

  - name: product-owner
    description: Product owner - can approve features and priorities

  - name: compliance-officer
    description: Compliance officer - can approve regulatory changes

  - name: viewer
    description: Read-only access to view plans and status

# =============================================================================
# APPROVAL WORKFLOWS
# =============================================================================
approvalWorkflows:
  # Deployment requires infra engineer approval
  deployment:
    name: Deployment Approval
    description: Deploy code to production
    requiredApprovals:
      - role: infra-engineer
        count: 1
      - role: product-owner
        count: 1
    mcpTools:
      - docker.deploy
      - docker.run

  # Code changes require developer + architect approval
  codeChange:
    name: Code Change Approval
    description: Merge code changes to main branch
    requiredApprovals:
      - role: developer
        count: 1
      - role: architect
        count: 1
        optional: true
    mcpTools:
      - git.push
      - git.merge

  # Compliance changes require compliance officer
  complianceChange:
    name: Compliance Change Approval
    description: Changes affecting compliance/regulatory
    requiredApprovals:
      - role: compliance-officer
        count: 1
    mcpTools:
      - filesystem.write

# =============================================================================
# MCP PERMISSION LEVELS
# =============================================================================
mcpPermissionLevels:
  # Auto-approve: Tool runs immediately without approval
  auto:
    - filesystem.read
    - git.status
    - git.log
    - git.diff
    - docker.ps
    - docker.logs

  # User-approve: User who triggered must approve (confirmation)
  userApprove:
    - filesystem.write
    - shell.run
    - git.commit

  # Role-approve: Specific role must approve
  roleApprove:
    - git.push
    - git.merge
    - docker.build
    - docker.run
    - docker.deploy

# =============================================================================
