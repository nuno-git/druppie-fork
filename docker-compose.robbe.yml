# Druppie Platform - Robbe's Dev Environment
# =============================================
# Standalone compose file with unique ports, container names, network, and volumes.
# Runs alongside other Druppie instances without conflicts.
#
# Usage:
#   docker compose -f docker-compose.robbe.yml --profile dev --profile init up -d
#   docker compose -f docker-compose.robbe.yml --profile dev down
#   docker compose -f docker-compose.robbe.yml logs -f robbe-backend
#
# Ports:
#   PostgreSQL:     5733
#   Keycloak:       8380
#   Gitea:          3300
#   Backend:        8300
#   Frontend:       5473
#   MCP Coding:     9201
#   MCP Docker:     9202
#   MCP File Search:9204
#   MCP Testing:    9206
#   MCP Web:        9205
#   Adminer:        8281

services:
  # ===========================================================================
  # DATABASES
  # ===========================================================================

  druppie-db:
    image: postgres:15-alpine
    container_name: robbe-db
    profiles: [infra, dev, prod, reset-db]
    environment:
      POSTGRES_DB: druppie
      POSTGRES_USER: druppie
      POSTGRES_PASSWORD: ${DRUPPIE_DB_PASSWORD:-druppie_secret}
    volumes:
      - robbe_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "druppie"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${DRUPPIE_DB_PORT:-5733}:5432"
    networks:
      - robbe-network

  keycloak-db:
    image: postgres:15-alpine
    container_name: robbe-keycloak-db
    profiles: [infra, dev, prod]
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak_secret}
    volumes:
      - robbe_keycloak_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "keycloak"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - robbe-network

  gitea-db:
    image: postgres:15-alpine
    container_name: robbe-gitea-db
    profiles: [infra, dev, prod]
    environment:
      POSTGRES_DB: gitea
      POSTGRES_USER: gitea
      POSTGRES_PASSWORD: ${GITEA_DB_PASSWORD:-gitea_secret}
    volumes:
      - robbe_gitea_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "gitea"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - robbe-network

  # ===========================================================================
  # KEYCLOAK (Identity Provider)
  # ===========================================================================

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: robbe-keycloak
    profiles: [infra, dev, prod]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak_secret}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HOSTNAME: ${EXTERNAL_HOST:-localhost}
      KC_HOSTNAME_PORT: ${KEYCLOAK_PORT:-8380}
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY: edge
      KC_HEALTH_ENABLED: "true"
      JAVA_OPTS_APPEND: "-Xms256m -Xmx512m -XX:MaxGCPauseMillis=100 -Djava.net.preferIPv4Stack=true"
      KC_CACHE: local
      KC_CACHE_STACK: udp
    command: start-dev
    ports:
      - "${KEYCLOAK_PORT:-8380}:8080"
    depends_on:
      keycloak-db:
        condition: service_healthy
    mem_limit: 768m
    mem_reservation: 384m
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080;echo -e 'GET /health/ready HTTP/1.1\r\nhost: localhost\r\nConnection: close\r\n\r\n' >&3;if [ $? -eq 0 ]; then echo 'Healthcheck Successful';exit 0;else echo 'Healthcheck Failed';exit 1;fi;"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 60s
    networks:
      - robbe-network

  # ===========================================================================
  # GITEA (Git Server)
  # ===========================================================================

  gitea:
    image: gitea/gitea:1.21
    container_name: robbe-gitea
    profiles: [infra, dev, prod]
    environment:
      USER_UID: 1000
      USER_GID: 1000
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: gitea-db:5432
      GITEA__database__NAME: gitea
      GITEA__database__USER: gitea
      GITEA__database__PASSWD: ${GITEA_DB_PASSWORD:-gitea_secret}
      GITEA__server__ROOT_URL: http://${EXTERNAL_HOST:-localhost}:${GITEA_PORT:-3300}/
      GITEA__server__HTTP_PORT: 3000
      GITEA__server__DOMAIN: ${EXTERNAL_HOST:-localhost}
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__service__DISABLE_REGISTRATION: "false"
      GITEA__oauth2_client__ACCOUNT_LINKING: auto
      GITEA__oauth2_client__ENABLE_AUTO_REGISTRATION: "true"
      GITEA__oauth2_client__USERNAME: email
    volumes:
      - robbe_gitea:/data
    ports:
      - "${GITEA_PORT:-3300}:3000"
      - "${GITEA_SSH_PORT:-2423}:22"
    depends_on:
      gitea-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - robbe-network

  # ===========================================================================
  # MCP SERVERS (Microservices)
  # ===========================================================================

  mcp-coding:
    build:
      context: ./druppie/mcp-servers/coding
      dockerfile: Dockerfile
    container_name: robbe-mcp-coding
    profiles: [infra, dev, prod]
    environment:
      WORKSPACE_ROOT: /workspaces
      MCP_PORT: "9001"
      GITEA_INTERNAL_URL: http://gitea:3000
      GITEA_ORG: druppie
      GITEA_TOKEN: ${GITEA_TOKEN:-}
      GITEA_USER: ${GITEA_ADMIN_USER:-gitea_admin}
      GITEA_PASSWORD: ${GITEA_ADMIN_PASSWORD:-GiteaAdmin123}
    volumes:
      - robbe_workspace:/workspaces
    ports:
      - "${MCP_CODING_PORT:-9201}:9001"
    depends_on:
      gitea:
        condition: service_healthy
    networks:
      - robbe-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mcp-docker:
    build:
      context: ./druppie/mcp-servers/docker
      dockerfile: Dockerfile
    container_name: robbe-mcp-docker
    profiles: [infra, dev, prod]
    environment:
      MCP_PORT: "9002"
      WORKSPACE_ROOT: /workspaces
      DOCKER_NETWORK: robbe-network
    volumes:
      - robbe_workspace:/workspaces
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "${MCP_DOCKER_PORT:-9202}:9002"
    networks:
      - robbe-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mcp-filesearch:
    build:
      context: ./druppie/mcp-servers/filesearch
      dockerfile: Dockerfile
    container_name: robbe-mcp-filesearch
    profiles: [infra, dev, prod]
    environment:
      SEARCH_ROOT: /dataset
      MCP_PORT: "9004"
    volumes:
      - robbe_dataset:/dataset
    ports:
      - "${MCP_FILESEARCH_PORT:-9204}:9004"
    networks:
      - robbe-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9004/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mcp-web:
    build:
      context: ./druppie/mcp-servers/web
      dockerfile: Dockerfile
    container_name: robbe-mcp-web
    profiles: [infra, dev, prod]
    environment:
      SEARCH_ROOT: /dataset
      MCP_PORT: "9005"
    volumes:
      - robbe_dataset:/dataset
    ports:
      - "${MCP_WEB_PORT:-9205}:9005"
    networks:
      - robbe-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9005/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mcp-testing:
    build:
      context: ./druppie/mcp-servers/testing
      dockerfile: Dockerfile
    container_name: robbe-mcp-testing
    profiles: [infra, dev, prod]
    environment:
      WORKSPACE_ROOT: /workspaces
      MCP_PORT: "9006"
    volumes:
      - robbe_workspace:/workspaces
    ports:
      - "${MCP_TESTING_PORT:-9206}:9006"
    networks:
      - robbe-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9006/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ===========================================================================
  # DATABASE ADMIN
  # ===========================================================================

  adminer:
    image: adminer:latest
    container_name: robbe-adminer
    profiles: [infra, dev, prod]
    ports:
      - "${ADMINER_PORT:-8281}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: druppie-db
      ADMINER_DESIGN: pepa-linha-dark
    depends_on:
      druppie-db:
        condition: service_healthy
    networks:
      - robbe-network

  # ===========================================================================
  # INITIALIZATION CONTAINER (one-time setup)
  # ===========================================================================

  druppie-init:
    build:
      context: .
      dockerfile: Dockerfile.init
    container_name: robbe-init
    profiles: [init, dev, prod]
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      EXTERNAL_HOST: ${EXTERNAL_HOST:-localhost}
      FRONTEND_PORT: ${FRONTEND_PORT:-5473}
      GITEA_PORT: ${GITEA_PORT:-3300}
      GITEA_URL: http://gitea:3000
      GITEA_ADMIN_USER: ${GITEA_ADMIN_USER:-gitea_admin}
      GITEA_ADMIN_PASSWORD: ${GITEA_ADMIN_PASSWORD:-GiteaAdmin123}
      GITEA_ADMIN_EMAIL: ${GITEA_ADMIN_EMAIL:-admin@druppie.local}
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080
      KEYCLOAK_REALM: druppie
      ENV_FILE: /project/.env
    volumes:
      - robbe_init_marker:/init-marker
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/project
    depends_on:
      keycloak:
        condition: service_healthy
      gitea:
        condition: service_healthy
    networks:
      - robbe-network
    restart: "no"

  # ===========================================================================
  # BACKEND - Development Mode (hot reload)
  # ===========================================================================

  druppie-backend-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: robbe-backend
    profiles: [dev]
    command: ["uvicorn", "druppie.api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      DATABASE_URL: postgresql://druppie:${DRUPPIE_DB_PASSWORD:-druppie_secret}@druppie-db:5432/druppie
      DEV_MODE: ${DEV_MODE:-false}
      KEYCLOAK_SERVER_URL: http://keycloak:8080
      KEYCLOAK_ISSUER_URL: http://${EXTERNAL_HOST:-localhost}:${KEYCLOAK_PORT:-8380}
      KEYCLOAK_REALM: druppie
      KEYCLOAK_CLIENT_ID: druppie-backend
      LLM_PROVIDER: ${LLM_PROVIDER:-auto}
      ZAI_API_KEY: ${ZAI_API_KEY:-}
      ZAI_MODEL: ${ZAI_MODEL:-GLM-4.7}
      ZAI_BASE_URL: ${ZAI_BASE_URL:-https://api.z.ai/api/coding/paas/v4}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      DEEPINFRA_API_KEY: ${DEEPINFRA_API_KEY:-}
      DEEPINFRA_MODEL: ${DEEPINFRA_MODEL:-Qwen/Qwen3-Next-80B-A3B-Instruct}
      DEEPINFRA_BASE_URL: ${DEEPINFRA_BASE_URL:-https://api.deepinfra.com/v1/openai}
      CORS_ORIGINS: http://${EXTERNAL_HOST:-localhost}:${FRONTEND_PORT:-5473},http://localhost:5173
      API_CORS_ORIGINS: http://${EXTERNAL_HOST:-localhost}:${FRONTEND_PORT:-5473},http://localhost:5173
      GITEA_URL: http://${EXTERNAL_HOST:-localhost}:${GITEA_PORT:-3300}
      GITEA_INTERNAL_URL: http://gitea:3000
      GITEA_ADMIN_USER: ${GITEA_ADMIN_USER:-gitea_admin}
      GITEA_ADMIN_PASSWORD: ${GITEA_ADMIN_PASSWORD:-GiteaAdmin123}
      GITEA_ADMIN_EMAIL: ${GITEA_ADMIN_EMAIL:-admin@druppie.local}
      GITEA_ORG: druppie
      WORKSPACE_PATH: /app/workspace
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-druppie-internal-secret-key}
      USE_MCP_MICROSERVICES: "true"
      MCP_CODING_URL: http://mcp-coding:9001
      MCP_DOCKER_URL: http://mcp-docker:9002
      MCP_FILESEARCH_URL: http://mcp-filesearch:9004
      MCP_WEB_URL: http://mcp-web:9005
      MCP_TESTING_URL: http://mcp-testing:9006
    volumes:
      - ./druppie:/app/druppie
      - robbe_workspace:/app/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "${BACKEND_PORT:-8300}:8000"
    depends_on:
      druppie-db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      gitea:
        condition: service_healthy
      mcp-testing:
        condition: service_healthy
    networks:
      - robbe-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ===========================================================================
  # BACKEND - Production Mode
  # ===========================================================================

  druppie-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: robbe-backend
    profiles: [prod]
    environment:
      DATABASE_URL: postgresql://druppie:${DRUPPIE_DB_PASSWORD:-druppie_secret}@druppie-db:5432/druppie
      DEV_MODE: ${DEV_MODE:-false}
      KEYCLOAK_SERVER_URL: http://keycloak:8080
      KEYCLOAK_ISSUER_URL: http://${EXTERNAL_HOST:-localhost}:${KEYCLOAK_PORT:-8380}
      KEYCLOAK_REALM: druppie
      KEYCLOAK_CLIENT_ID: druppie-backend
      LLM_PROVIDER: ${LLM_PROVIDER:-auto}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-}
      DEEPINFRA_API_KEY: ${DEEPINFRA_API_KEY:-}
      ZAI_API_KEY: ${ZAI_API_KEY:-}
      ZAI_MODEL: ${ZAI_MODEL:-GLM-4.7}
      ZAI_BASE_URL: ${ZAI_BASE_URL:-https://api.z.ai/api/coding/paas/v4}
      DEEPINFRA_MODEL: ${DEEPINFRA_MODEL:-Qwen/Qwen3-Next-80B-A3B-Instruct}
      DEEPINFRA_BASE_URL: ${DEEPINFRA_BASE_URL:-https://api.deepinfra.com/v1/openai}
      CORS_ORIGINS: http://${EXTERNAL_HOST:-localhost}:${FRONTEND_PORT:-5473},http://localhost:5173
      API_CORS_ORIGINS: http://${EXTERNAL_HOST:-localhost}:${FRONTEND_PORT:-5473},http://localhost:5173
      GITEA_URL: http://${EXTERNAL_HOST:-localhost}:${GITEA_PORT:-3300}
      GITEA_INTERNAL_URL: http://gitea:3000
      GITEA_ADMIN_USER: ${GITEA_ADMIN_USER:-gitea_admin}
      GITEA_ADMIN_PASSWORD: ${GITEA_ADMIN_PASSWORD:-GiteaAdmin123}
      GITEA_ADMIN_EMAIL: ${GITEA_ADMIN_EMAIL:-admin@druppie.local}
      GITEA_ORG: druppie
      WORKSPACE_PATH: /app/workspace
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-druppie-internal-secret-key}
      USE_MCP_MICROSERVICES: "true"
      MCP_CODING_URL: ${MCP_CODING_URL:-http://mcp-coding:9001}
      MCP_DOCKER_URL: ${MCP_DOCKER_URL:-http://mcp-docker:9002}
      MCP_FILESEARCH_URL: ${MCP_FILESEARCH_URL:-http://mcp-filesearch:9004}
      MCP_WEB_URL: ${MCP_WEB_URL:-http://mcp-web:9005}
      MCP_TESTING_URL: ${MCP_TESTING_URL:-http://mcp-testing:9006}
    volumes:
      - robbe_workspace:/app/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "${BACKEND_PORT:-8300}:8000"
    depends_on:
      druppie-db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      gitea:
        condition: service_healthy
    networks:
      - robbe-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ===========================================================================
  # FRONTEND - Development Mode (Vite HMR)
  # ===========================================================================

  druppie-frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: robbe-frontend
    profiles: [dev]
    ports:
      - "${FRONTEND_PORT:-5473}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://${EXTERNAL_HOST:-localhost}:${BACKEND_PORT:-8300}
      VITE_KEYCLOAK_URL: http://${EXTERNAL_HOST:-localhost}:${KEYCLOAK_PORT:-8380}
      VITE_KEYCLOAK_REALM: druppie
      VITE_KEYCLOAK_CLIENT_ID: druppie-frontend
    depends_on:
      druppie-backend-dev:
        condition: service_healthy
    networks:
      - robbe-network

  # ===========================================================================
  # FRONTEND - Production Mode
  # ===========================================================================

  druppie-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://${EXTERNAL_HOST:-localhost}:${BACKEND_PORT:-8300}
        VITE_KEYCLOAK_URL: http://${EXTERNAL_HOST:-localhost}:${KEYCLOAK_PORT:-8380}
        VITE_KEYCLOAK_REALM: druppie
        VITE_KEYCLOAK_CLIENT_ID: druppie-frontend
        VITE_GITEA_URL: http://${EXTERNAL_HOST:-localhost}:${GITEA_PORT:-3300}
    container_name: robbe-frontend
    profiles: [prod]
    ports:
      - "${FRONTEND_PORT:-5473}:5173"
    depends_on:
      druppie-backend:
        condition: service_healthy
    networks:
      - robbe-network

  # ===========================================================================
  # RESET SERVICES
  # ===========================================================================

  reset-db:
    image: docker:cli
    container_name: robbe-reset-db
    profiles: [reset-db]
    environment:
      PGPASSWORD: ${DRUPPIE_DB_PASSWORD:-druppie_secret}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: ["sh", "-c"]
    command:
      - |
        echo "=== Resetting Druppie Application Database ==="
        echo "Preserving user tables (users, user_roles, user_tokens)"
        echo ""
        echo "Waiting for database..."
        until docker exec robbe-db pg_isready -U druppie; do sleep 1; done
        echo "Dropping application tables..."
        docker exec robbe-db psql -U druppie -d druppie -c "
          DROP TABLE IF EXISTS questions CASCADE;
          DROP TABLE IF EXISTS approvals CASCADE;
          DROP TABLE IF EXISTS llm_calls CASCADE;
          DROP TABLE IF EXISTS tool_calls CASCADE;
          DROP TABLE IF EXISTS messages CASCADE;
          DROP TABLE IF EXISTS agent_runs CASCADE;
          DROP TABLE IF EXISTS sessions CASCADE;
          DROP TABLE IF EXISTS projects CASCADE;
        "
        echo ""
        echo "Restarting backend to recreate tables..."
        docker restart robbe-backend 2>/dev/null || echo "Backend not running"
        echo ""
        echo "=== Database reset complete ==="
        echo "Application tables dropped. User accounts preserved."
        echo "Backend restarted - tables will be recreated automatically."
    networks:
      - robbe-network

  reset-hard:
    build:
      context: .
      dockerfile: Dockerfile.reset
    container_name: robbe-reset-hard
    profiles: [reset-hard]
    network_mode: host
    environment:
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-cleaner-druppie-docker-compose}
      KEYCLOAK_URL: http://localhost:8380
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      EXTERNAL_HOST: ${EXTERNAL_HOST:-localhost}
      GITEA_URL: http://localhost:3300
      GITEA_ADMIN_USER: ${GITEA_ADMIN_USER:-gitea_admin}
      GITEA_ADMIN_PASSWORD: ${GITEA_ADMIN_PASSWORD:-GiteaAdmin123}
      GITEA_ADMIN_EMAIL: ${GITEA_ADMIN_EMAIL:-admin@druppie.local}
      KEYCLOAK_INTERNAL_URL: http://localhost:8380
      KEYCLOAK_REALM: druppie
      ENV_FILE: /project/.env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/project

# =============================================================================
# VOLUMES
# =============================================================================

volumes:
  robbe_postgres:
    name: robbe_postgres
  robbe_keycloak_postgres:
    name: robbe_keycloak_postgres
  robbe_gitea_postgres:
    name: robbe_gitea_postgres
  robbe_gitea:
    name: robbe_gitea
  robbe_workspace:
    name: robbe_workspace
  robbe_dataset:
    name: robbe_dataset
  robbe_init_marker:
    name: robbe_init_marker

# =============================================================================
# NETWORKS
# =============================================================================

networks:
  robbe-network:
    name: robbe-network
    driver: bridge
