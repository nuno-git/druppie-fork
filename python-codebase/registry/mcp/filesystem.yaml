# Filesystem MCP Server
# Provides file operations for workflows

id: filesystem
name: Filesystem
description: File system operations (read, write, move, delete)
transport: stdio
command: python
args:
  - -m
  - druppie.mcp.servers.filesystem

tools:
  - name: discover_files
    description: Scan a directory for files matching patterns
    input_schema:
      type: object
      properties:
        path:
          type: string
          description: Directory path to scan
        patterns:
          type: array
          items:
            type: string
          description: Glob patterns to match (e.g., "*.pdf")
        recursive:
          type: boolean
          default: true
          description: Whether to scan subdirectories
      required:
        - path

  - name: read_file
    description: Read the contents of a file
    input_schema:
      type: object
      properties:
        path:
          type: string
          description: Path to the file
      required:
        - path

  - name: write_file
    description: Write content to a file
    input_schema:
      type: object
      properties:
        path:
          type: string
          description: Path to the file
        content:
          type: string
          description: Content to write
      required:
        - path
        - content

  - name: move_file
    description: Move a file to a new location
    input_schema:
      type: object
      properties:
        source:
          type: string
          description: Source file path
        destination:
          type: string
          description: Destination path
      required:
        - source
        - destination

  - name: delete_file
    description: Delete a file
    input_schema:
      type: object
      properties:
        path:
          type: string
          description: Path to the file
      required:
        - path
