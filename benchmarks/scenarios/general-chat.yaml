scenario:
  name: general_chat
  description: >
    Tests the general_chat intent path where the router answers directly
    without spawning downstream agents.

  input:
    user_message: "what agents do you have?"
    user: admin

  mocked_agents:
    - agent_id: router
      status: completed
      tool_calls:
        - tool: "builtin:set_intent"
          arguments:
            intent: general_chat
          status: completed
          result: "Intent set to general_chat"
        - tool: "builtin:done"
          arguments:
            summary: "Handled as general chat — no project agents needed."
          status: completed
          result: "Agent completed"

  agents_under_test: []

  evaluations: []

  assertions:
    - agent: router
      assert: completed
    - agent: router
      assert: tool_called
      tool: "builtin:set_intent"

  user_simulator:
    mode: scripted
    scripted_answers: []
    default_answer: "Thanks!"
    max_interactions: 3

  timeout_minutes: 5
