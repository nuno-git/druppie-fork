scenario:
  name: ambiguous_request
  description: >
    Tests how the business_analyst handles a vague, ambiguous user request.
    Router and planner are mocked; only business_analyst runs under test.

  input:
    user_message: "make me something cool"
    user: admin

  mocked_agents:
    - agent_id: router
      status: completed
      tool_calls:
        - tool: "builtin:set_intent"
          arguments:
            intent: create_project
            project_name: cool-project
          status: completed
          result: "Intent set to create_project"
        - tool: "builtin:done"
          arguments:
            summary: "Routed to create_project for cool-project"
          status: completed
          result: "Agent completed"

    - agent_id: planner
      status: completed
      tool_calls:
        - tool: "builtin:make_plan"
          arguments:
            plan:
              - agent: business_analyst
                prompt: "Clarify the user's vague request and gather concrete requirements."
          status: completed
          result: "Plan created"
        - tool: "builtin:done"
          arguments:
            summary: "Plan created with business_analyst only."
          status: completed
          result: "Agent completed"

  agents_under_test:
    - business_analyst

  evaluations: []

  assertions:
    - agent: business_analyst
      assert: completed

  user_simulator:
    mode: scripted
    scripted_answers: []
    default_answer: "I want a simple web app"
    max_interactions: 5

  timeout_minutes: 10
