# Druppie Platform - Docker Compose Setup
# =========================================
#
# Profiles:
#   infra   - Infrastructure only (databases, Keycloak, Gitea, MCP servers)
#   dev     - Development mode with hot reload (backend + frontend with volume mounts)
#   prod    - Production mode (backend + frontend without hot reload)
#   init    - Initialization container (Keycloak + Gitea setup)
#
# Usage:
#   docker compose --profile infra --profile init up -d      # Infrastructure + init
#   docker compose --profile dev --profile init up -d        # Full dev environment
#   docker compose --profile prod --profile init up -d       # Full production
#   docker compose --profile reset-db run --rm reset-db      # Reset app database
#   docker compose --profile reset-hard run --rm reset-hard  # Full reset + re-init
#   docker compose --profile nuke run --rm nuke              # Full nuke & rebuild from scratch
#   docker compose down                                       # Stop everything
#
# Ports:
#   PostgreSQL:     5533
#   Keycloak:       8180
#   Gitea:          3100
#   Backend:        8100
#   Frontend:       5273
#   MCP Coding:     9001
#   MCP Docker:     9002
#   MCP File Search:9004
#   MCP Web:        9005
#   MCP Azure DataLake: 9008
#   MCP Registry:   9007
#   Adminer:        8081

services:
  # ===========================================================================
  # DATABASES
  # ===========================================================================

  druppie-db:
    image: postgres:15-alpine
    container_name: druppie-new-db
    profiles: [infra, dev, prod, reset-db]
    environment:
      POSTGRES_DB: druppie
      POSTGRES_USER: druppie
      POSTGRES_PASSWORD: ${DRUPPIE_DB_PASSWORD:-druppie_secret}
    volumes:
      - druppie_new_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "druppie"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${DRUPPIE_DB_PORT:-5533}:5432"
    networks:
      - druppie-new-network

  keycloak-db:
    image: postgres:15-alpine
    container_name: druppie-new-keycloak-db
    profiles: [infra, dev, prod]
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak_secret}
    volumes:
      - druppie_new_keycloak_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "keycloak"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - druppie-new-network

  gitea-db:
    image: postgres:15-alpine
    container_name: druppie-new-gitea-db
    profiles: [infra, dev, prod]
    environment:
      POSTGRES_DB: gitea
      POSTGRES_USER: gitea
      POSTGRES_PASSWORD: ${GITEA_DB_PASSWORD:-gitea_secret}
    volumes:
      - druppie_new_gitea_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "gitea"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - druppie-new-network

  # ===========================================================================
  # KEYCLOAK (Identity Provider)
  # ===========================================================================

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: druppie-new-keycloak
    profiles: [infra, dev, prod]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak_secret}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HOSTNAME: ${EXTERNAL_HOST:-localhost}
      KC_HOSTNAME_PORT: ${KEYCLOAK_PORT:-8180}
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY: edge
      KC_HEALTH_ENABLED: "true"
      JAVA_OPTS_APPEND: "-Xms256m -Xmx512m -XX:MaxGCPauseMillis=100 -Djava.net.preferIPv4Stack=true"
      KC_CACHE: local
      KC_CACHE_STACK: udp
    command: start-dev
    ports:
      - "${KEYCLOAK_PORT:-8180}:8080"
    depends_on:
      keycloak-db:
        condition: service_healthy
    mem_limit: 768m
    mem_reservation: 384m
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080;echo -e 'GET /health/ready HTTP/1.1\r\nhost: localhost\r\nConnection: close\r\n\r\n' >&3;if [ $? -eq 0 ]; then echo 'Healthcheck Successful';exit 0;else echo 'Healthcheck Failed';exit 1;fi;"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 60s
    networks:
      - druppie-new-network

  # ===========================================================================
  # GITEA (Git Server)
  # ===========================================================================

  gitea:
    image: gitea/gitea:1.21
    container_name: druppie-new-gitea
    profiles: [infra, dev, prod]
    environment:
      USER_UID: 1000
      USER_GID: 1000
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: gitea-db:5432
      GITEA__database__NAME: gitea
      GITEA__database__USER: gitea
      GITEA__database__PASSWD: ${GITEA_DB_PASSWORD:-gitea_secret}
      GITEA__server__ROOT_URL: http://${EXTERNAL_HOST:-localhost}:${GITEA_PORT:-3100}/
      GITEA__server__HTTP_PORT: 3000
      GITEA__server__DOMAIN: ${EXTERNAL_HOST:-localhost}
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__service__DISABLE_REGISTRATION: "false"
      GITEA__oauth2_client__ACCOUNT_LINKING: auto
      GITEA__oauth2_client__ENABLE_AUTO_REGISTRATION: "true"
      GITEA__oauth2_client__USERNAME: email
    volumes:
      - druppie_new_gitea:/data
    ports:
      - "${GITEA_PORT:-3100}:3000"
      - "${GITEA_SSH_PORT:-2223}:22"
    depends_on:
      gitea-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - druppie-new-network

  # ===========================================================================
  # MCP SERVERS (Microservices)
  # ===========================================================================

  module-coding:
    build:
      context: ./druppie/mcp-servers
      dockerfile: module-coding/Dockerfile
    container_name: druppie-module-coding
    profiles: [infra, dev, prod]
    environment:
      WORKSPACE_ROOT: /workspaces
      MCP_PORT: "9001"
      GITEA_INTERNAL_URL: http://gitea:3000
      GITEA_ORG: druppie
      GITEA_USER: ${GITEA_ADMIN_USER:-gitea_admin}
      GITEA_PASSWORD: ${GITEA_ADMIN_PASSWORD:-GiteaAdmin123}
      SANDBOX_CONTROL_PLANE_URL: ${SANDBOX_CONTROL_PLANE_URL:-http://sandbox-control-plane:8787}
      SANDBOX_API_SECRET: ${SANDBOX_API_SECRET:-sandbox-dev-secret}
      BACKEND_URL: http://druppie-backend:8000
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-druppie-internal-secret-key}
    volumes:
      - druppie_new_workspace:/workspaces
    ports:
      - "${MCP_CODING_PORT:-9001}:9001"
    depends_on:
      gitea:
        condition: service_healthy
      sandbox-control-plane:
        condition: service_healthy
    networks:
      - druppie-new-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  module-docker:
    build:
      context: ./druppie/mcp-servers
      dockerfile: module-docker/Dockerfile
    container_name: druppie-module-docker
    profiles: [infra, dev, prod]
    environment:
      MCP_PORT: "9002"
      WORKSPACE_ROOT: /workspaces
      DOCKER_NETWORK: druppie-new-network
      DEEPINFRA_API_KEY: ${DEEPINFRA_API_KEY:-}
    volumes:
      - druppie_new_workspace:/workspaces
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock
    ports:
      - "${MCP_DOCKER_PORT:-9002}:9002"
    networks:
      - druppie-new-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  module-azure-datalake:
    build:
      context: ./druppie/mcp-servers/module-azure-datalake
      dockerfile: Dockerfile
    container_name: druppie-module-azure-datalake
    profiles: [infra, dev, prod]
    environment:
      MCP_PORT: "9008"
      AZURE_DATA_LAKE_1: ${AZURE_DATA_LAKE_1:-}
      AZURE_DATA_LAKE_2: ${AZURE_DATA_LAKE_2:-}
      AZURE_DATA_LAKE_3: ${AZURE_DATA_LAKE_3:-}
    volumes:
      - druppie_new_workspace:/workspaces
    ports:
      - "${MCP_AZURE_DATALAKE_PORT:-9008}:9008"
    networks:
      - druppie-new-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9008/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  module-filesearch:
    build:
      context: ./druppie/mcp-servers
      dockerfile: module-filesearch/Dockerfile
    container_name: druppie-module-filesearch
    profiles: [infra, dev, prod]
    environment:
      SEARCH_ROOT: /dataset
      MCP_PORT: "9004"
    volumes:
      - druppie_new_dataset:/dataset
    ports:
      - "${MCP_FILESEARCH_PORT:-9004}:9004"
    networks:
      - druppie-new-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9004/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  module-archimate:
    build:
      context: ./druppie/mcp-servers
      dockerfile: module-archimate/Dockerfile
    container_name: druppie-module-archimate
    profiles: [infra, dev, prod]
    environment:
      MODELS_DIR: /models
      MCP_PORT: "9006"
    volumes:
      - ./druppie/mcp-servers/module-archimate/models:/models:ro
    ports:
      - "${MCP_ARCHIMATE_PORT:-9006}:9006"
    networks:
      - druppie-new-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9006/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  module-web:
    build:
      context: ./druppie/mcp-servers
      dockerfile: module-web/Dockerfile
    container_name: druppie-module-web
    profiles: [infra, dev, prod]
    environment:
      SEARCH_ROOT: /dataset
      MCP_PORT: "9005"
    volumes:
      - druppie_new_dataset:/dataset
    ports:
      - "${MCP_WEB_PORT:-9005}:9005"
    networks:
      - druppie-new-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9005/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  module-registry:
    build:
      context: ./druppie/mcp-servers
      dockerfile: module-registry/Dockerfile
    container_name: druppie-module-registry
    profiles: [infra, dev, prod]
    environment:
      DATA_DIR: /data
      MCP_PORT: "9007"
    volumes:
      - ./druppie/agents/definitions:/data/agents:ro
      - ./druppie/core/mcp_config.yaml:/data/mcp_config.yaml:ro
      - ./druppie/skills:/data/skills:ro
      - ./druppie/agents/builtin_tools.py:/data/builtin_tools.py:ro
      - ./druppie/mcp-servers:/data/mcp-servers:ro
    ports:
      - "${MCP_REGISTRY_PORT:-9007}:9007"
    networks:
      - druppie-new-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9007/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ===========================================================================
  # SANDBOX INFRASTRUCTURE (background-agents)
  # ===========================================================================

  sandbox-control-plane:
    build:
      context: ./background-agents
      dockerfile: packages/local-control-plane/Dockerfile
    container_name: druppie-sandbox-control-plane
    profiles: [infra, dev, prod]
    environment:
      PORT: 8787
      DATA_DIR: /data
      SANDBOX_MANAGER_URL: http://sandbox-manager:8000
      WORKER_URL: http://sandbox-control-plane:8787
      MODAL_API_SECRET: ${SANDBOX_API_SECRET:-sandbox-dev-secret}
      INTERNAL_CALLBACK_SECRET: ${SANDBOX_API_SECRET:-sandbox-dev-secret}
      # Credentials are now sent per-session from Druppie and proxied through the control plane.
      # No LLM API keys or proxy URLs needed here.
    volumes:
      - sandbox_data:/data
    networks:
      - druppie-new-network
      - druppie-sandbox-network  # Dual-network: sandbox containers reach control plane here
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8787/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  sandbox-manager:
    build:
      context: ./background-agents
      dockerfile: packages/local-sandbox-manager/Dockerfile
    container_name: druppie-sandbox-manager
    profiles: [infra, dev, prod]
    environment:
      MODAL_API_SECRET: ${SANDBOX_API_SECRET:-sandbox-dev-secret}
      SANDBOX_RUNTIME: ${SANDBOX_RUNTIME:-docker}
      SANDBOX_IMAGE: open-inspect-sandbox:latest
      KATA_RUNTIME: ${KATA_RUNTIME:-io.containerd.kata.v2}
      CONTAINERD_NAMESPACE: ${CONTAINERD_NAMESPACE:-default}
      DOCKER_NETWORK: druppie-sandbox-network  # Isolated network — sandboxes can only reach control plane
      DOCKER_MEMORY_LIMIT: ${SANDBOX_MEMORY_LIMIT:-4g}
      DOCKER_CPU_LIMIT: ${SANDBOX_CPU_LIMIT:-}
      SANDBOX_CACHE_VOLUME: druppie_sandbox_dep_cache
      # LLM API keys and proxy URLs no longer needed here.
      # Credentials flow per-session from Druppie -> Control Plane -> Sandbox.
    volumes:
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock
      - sandbox_snapshots:/data/snapshots
    networks:
      - druppie-new-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      sandbox-control-plane:
        condition: service_healthy
      sandbox-image-builder:
        condition: service_completed_successfully

  # Builds the sandbox base image, then exits. Docker caches it — only rebuilds when Dockerfile changes.
  sandbox-image-builder:
    build:
      context: ./background-agents
      dockerfile: packages/local-sandbox-manager/Dockerfile.sandbox
    image: open-inspect-sandbox:latest
    profiles: [infra, dev, prod]
    command: ["echo", "Sandbox image built successfully"]

  # ===========================================================================
  # DATABASE ADMIN
  # ===========================================================================

  adminer:
    image: adminer:latest
    container_name: druppie-adminer
    profiles: [infra, dev, prod]
    ports:
      - "${ADMINER_PORT:-8081}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: druppie-db
      ADMINER_DESIGN: pepa-linha-dark
    depends_on:
      druppie-db:
        condition: service_healthy
    networks:
      - druppie-new-network

  # ===========================================================================
  # INITIALIZATION CONTAINER (one-time setup)
  # ===========================================================================
  # Runs setup_keycloak.py and setup_gitea.py on first launch.
  # Uses init-marker volume to track if setup was already completed.
  # Exits after completion - does not stay running.

  druppie-init:
    build:
      context: .
      dockerfile: Dockerfile.init
    container_name: druppie-init
    profiles: [init, dev, prod]
    environment:
      # Keycloak config (internal Docker URLs)
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      EXTERNAL_HOST: ${EXTERNAL_HOST:-localhost}
      # Port configuration (passed to setup scripts for Keycloak client URIs)
      FRONTEND_PORT: ${FRONTEND_PORT:-5273}
      KEYCLOAK_PORT: ${KEYCLOAK_PORT:-8180}
      GITEA_PORT: ${GITEA_PORT:-3100}
      BACKEND_PORT: ${BACKEND_PORT:-8100}
      # Gitea config (internal Docker URLs)
      GITEA_URL: http://gitea:3000
      GITEA_ADMIN_USER: ${GITEA_ADMIN_USER:-gitea_admin}
      GITEA_ADMIN_PASSWORD: ${GITEA_ADMIN_PASSWORD:-GiteaAdmin123}
      GITEA_ADMIN_EMAIL: ${GITEA_ADMIN_EMAIL:-admin@druppie.local}
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080
      KEYCLOAK_REALM: druppie
      # Override .env path for setup_gitea.py token writing
      ENV_FILE: /project/.env
    volumes:
      - druppie_init_marker:/init-marker
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock
      - .:/project
    depends_on:
      keycloak:
        condition: service_healthy
      gitea:
        condition: service_healthy
    networks:
      - druppie-new-network
    restart: "no"

  # ===========================================================================
  # BACKEND - Development Mode (hot reload)
  # ===========================================================================

  druppie-backend-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: druppie-new-backend
    profiles: [dev]
    command: ["uvicorn", "druppie.api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-exclude", "workspace"]
    environment:
      DATABASE_URL: postgresql://druppie:${DRUPPIE_DB_PASSWORD:-druppie_secret}@druppie-db:5432/druppie
      DEV_MODE: ${DEV_MODE:-false}
      KEYCLOAK_SERVER_URL: http://keycloak:8080
      KEYCLOAK_ISSUER_URL: http://${EXTERNAL_HOST:-localhost}:${KEYCLOAK_PORT:-8180}
      KEYCLOAK_REALM: druppie
      KEYCLOAK_CLIENT_ID: druppie-backend
      LLM_PROVIDER: ${LLM_PROVIDER:-zai}
      LLM_FORCE_PROVIDER: ${LLM_FORCE_PROVIDER:-}
      LLM_FORCE_MODEL: ${LLM_FORCE_MODEL:-}
      ZAI_API_KEY: ${ZAI_API_KEY:-}
      ZAI_MODEL: ${ZAI_MODEL:-glm-4.7}
      ZAI_BASE_URL: ${ZAI_BASE_URL:-https://api.z.ai/api/coding/paas/v4}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      DEEPINFRA_API_KEY: ${DEEPINFRA_API_KEY:-}
      DEEPINFRA_MODEL: ${DEEPINFRA_MODEL:-Qwen/Qwen3-32B}
      DEEPINFRA_BASE_URL: ${DEEPINFRA_BASE_URL:-https://api.deepinfra.com/v1}
      FOUNDRY_API_KEY: ${FOUNDRY_API_KEY:-}
      FOUNDRY_MODEL: ${FOUNDRY_MODEL:-GPT-5-MINI}
      FOUNDRY_API_URL: ${FOUNDRY_API_URL:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-}
      CORS_ORIGINS: http://${EXTERNAL_HOST:-localhost}:${FRONTEND_PORT:-5273},http://localhost:5173
      GITEA_URL: http://${EXTERNAL_HOST:-localhost}:${GITEA_PORT:-3100}
      GITEA_INTERNAL_URL: http://gitea:3000
      GITEA_ADMIN_USER: ${GITEA_ADMIN_USER:-gitea_admin}
      GITEA_ADMIN_PASSWORD: ${GITEA_ADMIN_PASSWORD:-GiteaAdmin123}
      GITEA_ADMIN_EMAIL: ${GITEA_ADMIN_EMAIL:-admin@druppie.local}
      GITEA_ORG: druppie
      WORKSPACE_PATH: /app/workspace
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-druppie-internal-secret-key}
      USE_MCP_MICROSERVICES: "true"
      MCP_CODING_URL: ${MCP_CODING_URL:-http://module-coding:9001}
      MCP_DOCKER_URL: ${MCP_DOCKER_URL:-http://module-docker:9002}
      MCP_FILESEARCH_URL: ${MCP_FILESEARCH_URL:-http://module-filesearch:9004}
      MCP_WEB_URL: ${MCP_WEB_URL:-http://module-web:9005}
      MCP_ARCHIMATE_URL: ${MCP_ARCHIMATE_URL:-http://module-archimate:9006}
      MCP_REGISTRY_URL: ${MCP_REGISTRY_URL:-http://module-registry:9007}
      SANDBOX_CONTROL_PLANE_URL: http://sandbox-control-plane:8787
      SANDBOX_MANAGER_URL: http://sandbox-manager:8000
      SANDBOX_API_SECRET: ${SANDBOX_API_SECRET:-sandbox-dev-secret}
      SANDBOX_MODEL: ${SANDBOX_MODEL:-}
      BACKEND_URL: http://druppie-backend-dev:8000
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_APP_PRIVATE_KEY_PATH: ${GITHUB_APP_PRIVATE_KEY_PATH:-}
      GITHUB_APP_INSTALLATION_ID: ${GITHUB_APP_INSTALLATION_ID:-}
      DRUPPIE_REPO_OWNER: ${DRUPPIE_REPO_OWNER:-}
      DRUPPIE_REPO_NAME: ${DRUPPIE_REPO_NAME:-}
    volumes:
      - ./druppie:/app/druppie
      - ./secrets:/app/secrets:ro
      - druppie_new_workspace:/app/workspace
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock
    ports:
      - "${BACKEND_PORT:-8100}:8000"
    depends_on:
      druppie-db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      gitea:
        condition: service_healthy
    networks:
      - druppie-new-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ===========================================================================
  # BACKEND - Production Mode
  # ===========================================================================

  druppie-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: druppie-new-backend
    profiles: [prod]
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DATABASE_URL: postgresql://druppie:${DRUPPIE_DB_PASSWORD:-druppie_secret}@druppie-db:5432/druppie
      DEV_MODE: ${DEV_MODE:-false}
      KEYCLOAK_SERVER_URL: http://keycloak:8080
      KEYCLOAK_ISSUER_URL: http://${EXTERNAL_HOST:-localhost}:${KEYCLOAK_PORT:-8180}
      KEYCLOAK_REALM: druppie
      KEYCLOAK_CLIENT_ID: druppie-backend
      LLM_PROVIDER: ${LLM_PROVIDER:-zai}
      LLM_FORCE_PROVIDER: ${LLM_FORCE_PROVIDER:-}
      LLM_FORCE_MODEL: ${LLM_FORCE_MODEL:-}
      ZAI_API_KEY: ${ZAI_API_KEY:-}
      ZAI_MODEL: ${ZAI_MODEL:-glm-4.7}
      ZAI_BASE_URL: ${ZAI_BASE_URL:-https://api.z.ai/api/coding/paas/v4}
      DEEPINFRA_API_KEY: ${DEEPINFRA_API_KEY:-}
      DEEPINFRA_MODEL: ${DEEPINFRA_MODEL:-Qwen/Qwen3-32B}
      DEEPINFRA_BASE_URL: ${DEEPINFRA_BASE_URL:-https://api.deepinfra.com/v1}
      FOUNDRY_API_KEY: ${FOUNDRY_API_KEY:-}
      FOUNDRY_MODEL: ${FOUNDRY_MODEL:-GPT-5-MINI}
      FOUNDRY_API_URL: ${FOUNDRY_API_URL:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-}
      CORS_ORIGINS: http://${EXTERNAL_HOST:-localhost}:${FRONTEND_PORT:-5273},http://localhost:5173
      GITEA_URL: http://${EXTERNAL_HOST:-localhost}:${GITEA_PORT:-3100}
      GITEA_INTERNAL_URL: http://gitea:3000
      GITEA_ADMIN_USER: ${GITEA_ADMIN_USER:-gitea_admin}
      GITEA_ADMIN_PASSWORD: ${GITEA_ADMIN_PASSWORD:-GiteaAdmin123}
      GITEA_ADMIN_EMAIL: ${GITEA_ADMIN_EMAIL:-admin@druppie.local}
      GITEA_ORG: druppie
      WORKSPACE_PATH: /app/workspace
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-druppie-internal-secret-key}
      USE_MCP_MICROSERVICES: "true"
      MCP_CODING_URL: ${MCP_CODING_URL:-http://module-coding:9001}
      MCP_DOCKER_URL: ${MCP_DOCKER_URL:-http://module-docker:9002}
      MCP_FILESEARCH_URL: ${MCP_FILESEARCH_URL:-http://module-filesearch:9004}
      MCP_WEB_URL: ${MCP_WEB_URL:-http://module-web:9005}
      MCP_ARCHIMATE_URL: ${MCP_ARCHIMATE_URL:-http://module-archimate:9006}
      MCP_REGISTRY_URL: ${MCP_REGISTRY_URL:-http://module-registry:9007}
      SANDBOX_CONTROL_PLANE_URL: http://sandbox-control-plane:8787
      SANDBOX_API_SECRET: ${SANDBOX_API_SECRET:-sandbox-dev-secret}
      SANDBOX_MODEL: ${SANDBOX_MODEL:-}
      BACKEND_URL: http://druppie-backend:8000
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_APP_PRIVATE_KEY_PATH: ${GITHUB_APP_PRIVATE_KEY_PATH:-}
      GITHUB_APP_INSTALLATION_ID: ${GITHUB_APP_INSTALLATION_ID:-}
      DRUPPIE_REPO_OWNER: ${DRUPPIE_REPO_OWNER:-}
      DRUPPIE_REPO_NAME: ${DRUPPIE_REPO_NAME:-}
    volumes:
      - ./secrets:/app/secrets:ro
      - druppie_new_workspace:/app/workspace
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock
    ports:
      - "${BACKEND_PORT:-8100}:8000"
    depends_on:
      druppie-db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      gitea:
        condition: service_healthy
    networks:
      - druppie-new-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ===========================================================================
  # FRONTEND - Development Mode (Vite HMR)
  # ===========================================================================

  druppie-frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: druppie-new-frontend
    profiles: [dev]
    ports:
      - "${FRONTEND_PORT:-5273}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://${EXTERNAL_HOST:-localhost}:${BACKEND_PORT:-8100}
      VITE_KEYCLOAK_URL: http://${EXTERNAL_HOST:-localhost}:${KEYCLOAK_PORT:-8180}
      VITE_KEYCLOAK_REALM: druppie
      VITE_KEYCLOAK_CLIENT_ID: druppie-frontend
    depends_on:
      druppie-backend-dev:
        condition: service_healthy
    networks:
      - druppie-new-network

  # ===========================================================================
  # FRONTEND - Production Mode
  # ===========================================================================

  druppie-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://${EXTERNAL_HOST:-localhost}:${BACKEND_PORT:-8100}
        VITE_KEYCLOAK_URL: http://${EXTERNAL_HOST:-localhost}:${KEYCLOAK_PORT:-8180}
        VITE_KEYCLOAK_REALM: druppie
        VITE_KEYCLOAK_CLIENT_ID: druppie-frontend
        VITE_GITEA_URL: http://${EXTERNAL_HOST:-localhost}:${GITEA_PORT:-3100}
    container_name: druppie-new-frontend
    profiles: [prod]
    ports:
      - "${FRONTEND_PORT:-5273}:5173"
    depends_on:
      druppie-backend:
        condition: service_healthy
    networks:
      - druppie-new-network

  # ===========================================================================
  # RESET SERVICES
  # ===========================================================================

  # Reset application database only (preserves Keycloak, Gitea, and user accounts)
  # Drops: projects, sessions, agent_runs, messages, tool_calls, llm_calls, approvals, questions
  # Keeps: users, user_roles, user_tokens (synced from Keycloak)
  reset-db:
    image: docker:cli
    container_name: druppie-reset-db
    profiles: [reset-db]
    environment:
      PGPASSWORD: ${DRUPPIE_DB_PASSWORD:-druppie_secret}
    volumes:
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock
    entrypoint: ["sh", "-c"]
    command:
      - |
        echo "=== Resetting Druppie Application Database ==="
        echo "Preserving user tables (users, user_roles, user_tokens)"
        echo ""
        echo "Waiting for database..."
        until docker exec druppie-new-db pg_isready -U druppie; do sleep 1; done
        echo "Dropping application tables..."
        docker exec druppie-new-db psql -U druppie -d druppie -c "
          DROP TABLE IF EXISTS sandbox_sessions CASCADE;
          DROP TABLE IF EXISTS tool_call_normalizations CASCADE;
          DROP TABLE IF EXISTS llm_retries CASCADE;
          DROP TABLE IF EXISTS questions CASCADE;
          DROP TABLE IF EXISTS approvals CASCADE;
          DROP TABLE IF EXISTS llm_calls CASCADE;
          DROP TABLE IF EXISTS tool_calls CASCADE;
          DROP TABLE IF EXISTS messages CASCADE;
          DROP TABLE IF EXISTS agent_runs CASCADE;
          DROP TABLE IF EXISTS sessions CASCADE;
          DROP TABLE IF EXISTS projects CASCADE;
        "
        echo ""
        echo "Restarting backend to recreate tables..."
        docker restart druppie-new-backend 2>/dev/null || echo "Backend not running"
        echo ""
        echo "=== Database reset complete ==="
        echo "Application tables dropped. User accounts preserved."
        echo "Backend restarted - tables will be recreated automatically."
    networks:
      - druppie-new-network

  # Full reset - removes ALL volumes and re-initializes
  # NOTE: This service runs with network_mode: host to avoid being stopped by docker compose down
  reset-hard:
    build:
      context: .
      dockerfile: Dockerfile.reset
    container_name: druppie-reset-hard
    profiles: [reset-hard]
    network_mode: host
    environment:
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-cleaner-druppie-docker-compose}
      # Host project directory for Docker volume mount resolution (required for rootless Docker)
      HOST_PROJECT_DIR: ${PWD}
      # Init container env vars for re-initialization (use localhost since we're on host network)
      KEYCLOAK_URL: http://localhost:${KEYCLOAK_PORT:-8180}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      EXTERNAL_HOST: ${EXTERNAL_HOST:-localhost}
      # Port configuration
      FRONTEND_PORT: ${FRONTEND_PORT:-5273}
      KEYCLOAK_PORT: ${KEYCLOAK_PORT:-8180}
      GITEA_PORT: ${GITEA_PORT:-3100}
      BACKEND_PORT: ${BACKEND_PORT:-8100}
      GITEA_URL: http://localhost:${GITEA_PORT:-3100}
      GITEA_ADMIN_USER: ${GITEA_ADMIN_USER:-gitea_admin}
      GITEA_ADMIN_PASSWORD: ${GITEA_ADMIN_PASSWORD:-GiteaAdmin123}
      GITEA_ADMIN_EMAIL: ${GITEA_ADMIN_EMAIL:-admin@druppie.local}
      KEYCLOAK_INTERNAL_URL: http://localhost:${KEYCLOAK_PORT:-8180}
      KEYCLOAK_REALM: druppie
      ENV_FILE: /project/.env
    volumes:
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock
      - .:/project

  # Full nuke & rebuild - destroys EVERYTHING (containers, volumes, images) and rebuilds from scratch
  # Usage: docker compose --profile nuke run --rm nuke
  # Stop only: START_AFTER=false docker compose --profile nuke run --rm nuke
  nuke:
    build:
      context: .
      dockerfile: Dockerfile.reset
    container_name: druppie-nuke
    profiles: [nuke]
    network_mode: host
    environment:
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-cleaner-druppie-docker-compose}
      START_AFTER: ${START_AFTER:-true}
      FRONTEND_PORT: ${FRONTEND_PORT:-5273}
      BACKEND_PORT: ${BACKEND_PORT:-8100}
      KEYCLOAK_PORT: ${KEYCLOAK_PORT:-8180}
      GITEA_PORT: ${GITEA_PORT:-3100}
    volumes:
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock
      - .:/project
    entrypoint: ["/app/scripts/nuke.sh"]

  # Emergency purge of the shared sandbox dependency cache
  # Usage: docker compose --profile reset-cache run --rm reset-cache
  # With reason: PURGE_REASON="suspected compromise" docker compose --profile reset-cache run --rm reset-cache
  reset-cache:
    image: docker:cli
    container_name: druppie-reset-cache
    profiles: [reset-cache]
    entrypoint: ["sh", "-c"]
    command:
      - |
        echo "=== Emergency Cache Purge ==="
        echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
        echo "Reason: ${PURGE_REASON:-manual}"
        echo ""
        echo "Step 1: Stopping running sandbox containers..."
        sandbox_ids=$(docker ps --filter "network=druppie-sandbox-network" -q)
        if [ -n "$sandbox_ids" ]; then
          echo "  Stopping sandbox(es)..."
          if ! docker stop -t 5 $sandbox_ids 2>/dev/null; then
            echo "  WARNING: Graceful stop failed, forcing..."
            docker kill $sandbox_ids 2>/dev/null || true
          fi
          docker rm -f $sandbox_ids 2>/dev/null || true
          echo "  Stopped."
        else
          echo "  None running."
        fi
        echo ""
        echo "Step 2: Removing cache volume..."
        if docker volume inspect druppie_sandbox_dep_cache >/dev/null 2>&1; then
          if ! docker volume rm druppie_sandbox_dep_cache; then
            echo "  ERROR: Failed to remove volume. Is it still in use?"
            echo "  Check: docker ps --filter volume=druppie_sandbox_dep_cache"
            exit 1
          fi
          echo "  Removed."
        else
          echo "  Volume does not exist (already removed)."
        fi
        echo ""
        echo "Step 3: Recreating empty volume..."
        docker volume create druppie_sandbox_dep_cache
        if ! docker volume inspect druppie_sandbox_dep_cache >/dev/null 2>&1; then
          echo "  ERROR: Volume creation failed."
          exit 1
        fi
        echo "  Created."
        echo ""
        echo "=== Purge Complete ==="
    volumes:
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock

  # OSV vulnerability scanner for the shared dependency cache
  # Usage: docker compose --profile scan-cache run --rm cache-scanner
  cache-scanner:
    build:
      context: ./background-agents/packages/local-sandbox-manager
      dockerfile: Dockerfile.cache-scanner
    container_name: druppie-cache-scanner
    profiles: [scan-cache]
    volumes:
      - sandbox_dep_cache:/cache:ro
      - cache_scan_results:/scan-results

# =============================================================================
# VOLUMES
# =============================================================================

volumes:
  druppie_new_postgres:
    name: druppie_new_postgres
  druppie_new_keycloak_postgres:
    name: druppie_new_keycloak_postgres
  druppie_new_gitea_postgres:
    name: druppie_new_gitea_postgres
  druppie_new_gitea:
    name: druppie_new_gitea
  druppie_new_workspace:
    name: druppie_new_workspace
  druppie_new_dataset:
    name: druppie_new_dataset
  druppie_init_marker:
    name: druppie_init_marker
  sandbox_data:
    name: druppie_sandbox_data
  sandbox_snapshots:
    name: druppie_sandbox_snapshots
  sandbox_dep_cache:
    name: druppie_sandbox_dep_cache
  cache_scan_results:
    name: druppie_cache_scan_results

# =============================================================================
# NETWORKS
# =============================================================================

networks:
  druppie-new-network:
    name: druppie-new-network
    driver: bridge
  druppie-sandbox-network:
    name: druppie-sandbox-network
    driver: bridge
    # Isolated network for sandbox containers — only the control plane bridges both networks.
    # Prevents compromised sandboxes from reaching the database, Keycloak, Gitea, or backend directly.
