# Druppie Governance Platform - Unified Docker Compose
# Services: Keycloak, Gitea, Redis, Druppie Backend, Druppie Frontend

version: '3.9'

services:
  # =============================================================================
  # DATABASE LAYER
  # =============================================================================

  # Keycloak Postgres Database
  keycloak-db:
    image: postgres:15-alpine
    container_name: druppie-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak_secret}
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - druppie-network
    restart: unless-stopped

  # Gitea Postgres Database
  gitea-db:
    image: postgres:15-alpine
    container_name: druppie-gitea-db
    environment:
      POSTGRES_DB: gitea
      POSTGRES_USER: gitea
      POSTGRES_PASSWORD: ${GITEA_DB_PASSWORD:-gitea_secret}
    volumes:
      - gitea_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "gitea"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - druppie-network
    restart: unless-stopped

  # Druppie Postgres Database (Plans, Tasks, MCP Permissions)
  druppie-db:
    image: postgres:15-alpine
    container_name: druppie-app-db
    environment:
      POSTGRES_DB: druppie
      POSTGRES_USER: druppie
      POSTGRES_PASSWORD: ${DRUPPIE_DB_PASSWORD:-druppie_secret}
    volumes:
      - druppie_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "druppie"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - druppie-network
    restart: unless-stopped

  # Redis for caching and session management
  redis:
    image: redis:7-alpine
    container_name: druppie-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - druppie-network
    restart: unless-stopped

  # =============================================================================
  # AUTHENTICATION LAYER
  # =============================================================================

  # Keycloak Identity Provider
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: druppie-keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak_secret}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin_password}
      KC_HOSTNAME: ${EXTERNAL_HOST:-localhost}
      KC_HOSTNAME_PORT: 8080
      KC_HOSTNAME_STRICT: false
      KC_HOSTNAME_STRICT_HTTPS: false
      KC_HTTP_ENABLED: true
      KC_PROXY: edge
      KC_HEALTH_ENABLED: true
    command: start-dev
    ports:
      - "8080:8080"
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - druppie-network
    restart: unless-stopped

  # =============================================================================
  # GIT LAYER
  # =============================================================================

  # Gitea Git Server
  gitea:
    image: gitea/gitea:1.21.11
    container_name: druppie-gitea
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=gitea-db:5432
      - GITEA__database__NAME=gitea
      - GITEA__database__USER=gitea
      - GITEA__database__PASSWD=${GITEA_DB_PASSWORD:-gitea_secret}
      - GITEA__server__DOMAIN=${EXTERNAL_HOST:-localhost}
      - GITEA__server__SSH_DOMAIN=${EXTERNAL_HOST:-localhost}
      - GITEA__server__HTTP_PORT=3000
      - GITEA__server__ROOT_URL=http://${EXTERNAL_HOST:-localhost}:3000/
      - GITEA__security__INSTALL_LOCK=true
      - GITEA__security__SECRET_KEY=${GITEA_SECRET_KEY:-auto_generated_secret}
      - GITEA__service__DISABLE_REGISTRATION=false
      - GITEA__service__REQUIRE_SIGNIN_VIEW=false
      - GITEA__service__ENABLE_CAPTCHA=false
      - GITEA__oauth2_client__ENABLE_AUTO_REGISTRATION=true
    volumes:
      - gitea_data:/data
    ports:
      - "3000:3000"
      - "2222:22"
    depends_on:
      gitea-db:
        condition: service_healthy
    networks:
      - druppie-network
    restart: unless-stopped

  # Docker Registry for builds
  registry:
    image: registry:2
    container_name: druppie-registry
    ports:
      - "5000:5000"
    volumes:
      - registry_data:/var/lib/registry
    networks:
      - druppie-network
    restart: unless-stopped

  # =============================================================================
  # APPLICATION LAYER
  # =============================================================================

  # Druppie Backend (Flask API with Keycloak Auth)
  druppie-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: druppie-backend
    environment:
      # Database
      DATABASE_URL: postgresql://druppie:${DRUPPIE_DB_PASSWORD:-druppie_secret}@druppie-db:5432/druppie
      REDIS_URL: redis://redis:6379/0

      # Keycloak Auth
      KEYCLOAK_SERVER_URL: http://keycloak:8080
      KEYCLOAK_ISSUER_URL: http://${EXTERNAL_HOST:-localhost}:8080
      KEYCLOAK_REALM: druppie
      KEYCLOAK_CLIENT_ID: druppie-backend
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-}

      # LLM Configuration
      # Set LLM_PROVIDER=zai and provide ZAI_API_KEY for cloud LLM
      # Set LLM_PROVIDER=ollama for local LLM (requires Ollama running on host)
      # Set LLM_PROVIDER=auto to auto-detect (uses Z.AI if key present, else Ollama)
      LLM_PROVIDER: ${LLM_PROVIDER:-auto}
      ZAI_API_KEY: ${ZAI_API_KEY:-}
      ZAI_MODEL: ${ZAI_MODEL:-GLM-4.7}
      ZAI_BASE_URL: ${ZAI_BASE_URL:-https://api.z.ai/api/coding/paas/v4}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}

      # App Config
      FLASK_ENV: ${FLASK_ENV:-development}
      DEV_MODE: "false"
      CORS_ORIGINS: http://localhost:5173,http://${EXTERNAL_HOST:-localhost}:5173
      WORKSPACE_PATH: /app/workspace

      # Builder Config (Docker-in-Docker)
      PROJECTS_NETWORK: druppie-projects
      HOST_PORT_START: "9001"
      HOST_PORT_END: "9100"
      EXTERNAL_HOST: ${EXTERNAL_HOST:-localhost}

      # Gitea Config (for project repos)
      GITEA_URL: http://${EXTERNAL_HOST:-localhost}:3000
      GITEA_INTERNAL_URL: http://gitea:3000
      GITEA_ADMIN_USER: gitea_admin
      GITEA_ADMIN_PASSWORD: GiteaAdmin123
      GITEA_ORG: druppie
    volumes:
      - druppie_workspace:/app/workspace
      # Docker socket for building/running user projects
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"
    depends_on:
      druppie-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - druppie-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # Druppie Frontend (Vite + React)
  druppie-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://${EXTERNAL_HOST:-localhost}:8000
        VITE_KEYCLOAK_URL: http://${EXTERNAL_HOST:-localhost}:8080
        VITE_KEYCLOAK_REALM: druppie
        VITE_KEYCLOAK_CLIENT_ID: druppie-frontend
        VITE_GITEA_URL: http://${EXTERNAL_HOST:-localhost}:3000
    container_name: druppie-frontend
    ports:
      - "5173:5173"
    depends_on:
      - druppie-backend
    networks:
      - druppie-network
    restart: unless-stopped

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  keycloak_postgres_data:
    name: druppie_keycloak_db
  gitea_postgres_data:
    name: druppie_gitea_db
  druppie_postgres_data:
    name: druppie_app_db
  gitea_data:
    name: druppie_gitea_data
  registry_data:
    name: druppie_registry
  redis_data:
    name: druppie_redis
  druppie_workspace:
    name: druppie_workspace

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  druppie-network:
    name: druppie-network
    driver: bridge
